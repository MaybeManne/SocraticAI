    var val = inp.value.trim();
    if (!val) return;
    if (FillIn.validate(val, data.answer || [])) {
      inp.classList.add("correct"); inp.disabled = true;
      success.textContent = data.explanation || "Correct!";
      success.classList.add("visible");
      if (onResolve) setTimeout(function() { onResolve(true); }, 1500);
    } else {
      attempts++;
      inp.classList.add("wrong");
      setTimeout(function() { inp.classList.remove("wrong"); }, 400);
      hint.classList.add("visible");
      if (attempts >= 3) {
        inp.value = (data.answer || [""])[0];
        inp.classList.add("correct"); inp.disabled = true;
        success.textContent = data.explanation || "Answer: " + (data.answer || [""])[0];
        success.classList.add("visible");
        // v2 FIX: trigger wrongPath
        if (onResolve) setTimeout(function() { onResolve(false); }, 2000);
      }
    }
  });
  setTimeout(function() { inp.focus(); }, 300);
  return el;
};

EX.GateSystem = GateSystem;

})();

/* ═══════════════════════════════════════════════════════════════════
   Player Controls v2 — Scrubber, milestone dots, keyboard navigation

   Fixes from v1:
   - Bug 1 fix: proper `this` binding (no stale `self` reference)
   - Bug 3 fix: scrubber locked during gate state
   - Scrubber maps to default path only (branch acts don't shift it)
   - Milestone dots use correct closure binding
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var $ = EX.$;

var PlayerControls = {
  playing: false,
  speeds: [0.5, 0.75, 1, 1.25, 1.5, 2],
  speedIdx: 2,
  firstDone: false,
  _scrubberLocked: false,
  _isDragging: false,
  _graph: null,
  _state: null,

  init: function(graph, state) {
    this._graph = graph;
    this._state = state;
    var self = this; // v2: properly scoped self for all closures in this method

    var pb = $("playBtn");
    var sb = $("speedBtn");

    pb.addEventListener("click", function(e) { e.stopPropagation(); self.toggle(); });

    sb.addEventListener("click", function() {
      self.speedIdx = (self.speedIdx + 1) % self.speeds.length;
      var rate = self.speeds[self.speedIdx];
      sb.textContent = rate + "x";
      EventBus.emit("audio:setRate", { rate: rate });
      EX.ActRunner.setTimeScale(rate);
    });

    $("subToggle").addEventListener("click", function() {
      var on = EX.Subtitles.enabled;
      EX.Subtitles.setEnabled(!on);
      this.classList.toggle("off", on);
    });

    $("narToggle").addEventListener("click", function() {
      var off = this.classList.contains("off");
      EventBus.emit("audio:setEnabled", { enabled: off });
      this.classList.toggle("off", !off);
      this.textContent = off ? "\u{1F50A}" : "\u{1F507}";
    });

    // Light/dark theme toggle
    var themeBtn = $("themeToggle");
    if (themeBtn) {
      var sunIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      var moonIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
      themeBtn.addEventListener("click", function() {
        document.body.classList.toggle("light-mode");
        var isLight = document.body.classList.contains("light-mode");
        themeBtn.innerHTML = isLight ? moonIcon : sunIcon;
      });
    }

    // Print notebook
    var printBtn = $("printBtn");
    if (printBtn) {
      printBtn.addEventListener("click", function() {
        window.print();
      });
    }

    // Scrubber: maps to default path global time
    var scrubber = $("scrubber");

    // Single recovery function used by all user interactions
    function doRecover() {
      console.log("[controls] triggering recovery from user interaction");
      EX.Orchestrator.recoverState(graph, state);
      self.playing = false;
      self._scrubberLocked = false;
      self._isDragging = false;
      pb.innerHTML = "\u25B6";
    }

    // Check if stuck and recover. Returns true if recovery was needed.
    function ensureReady() {
      if (self.firstDone && EX.Orchestrator.isStuck(state)) {
        doRecover();
        return true;
      }
      return false;
    }

    // Watchdog: every 1s, check if phase is "playing" but nothing is moving.
    // This catches stuck states that happen between user interactions.
    setInterval(function() {
      if (!self.firstDone) return;
      if (EX.Orchestrator.isStuck(state)) {
        console.log("[watchdog] stuck state detected, auto-recovering");
        doRecover();
      }
    }, 1000);

    function doSeek(pct) {
      ensureReady();
      if (self._scrubberLocked) return;
      // If at a gate, unlock scrubber — user wants to seek away from the gate
      if (state.phase === "gate") self._scrubberLocked = false;

      if (!self.firstDone) {
        self.firstDone = true;
        self.playing = true;
        pb.innerHTML = "\u23F8";
        if (window._collapseHero) window._collapseHero();
      }

      var totalDur = graph.totalDefaultDuration;
      EX.Orchestrator.seekToGlobalTime(pct * totalDur, graph, state);
      self.playing = true;
      pb.innerHTML = "\u23F8";
    }

    scrubber.addEventListener("mousedown", function() { self._isDragging = true; });
    scrubber.addEventListener("touchstart", function() { self._isDragging = true; }, { passive: true });
    document.addEventListener("mouseup", function() { self._isDragging = false; });
    document.addEventListener("touchend", function() { self._isDragging = false; });

    scrubber.addEventListener("input", function() {
      if (!self._isDragging) return;
      doSeek(parseInt(this.value) / 1000);
    });

    scrubber.addEventListener("click", function(e) {
      self._isDragging = false;
      var rect = scrubber.getBoundingClientRect();
      var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      scrubber.value = Math.round(pct * 1000);
      doSeek(pct);
    });

    // Keyboard navigation
    document.addEventListener("keydown", function(e) {
      if (e.target.tagName === "INPUT") return;
      if (e.code === "Space") {
        e.preventDefault();
        if (!self.firstDone) { self.firstDone = true; self.start(); return; }
        self.toggle();
      } else if (e.code === "ArrowRight") {
        e.preventDefault();
        if (!self.firstDone) { self.firstDone = true; self.start(); }
        var curTime = state.getScrubberTime();
        EX.Orchestrator.seekToGlobalTime(curTime + 5, graph, state);
      } else if (e.code === "ArrowLeft") {
        e.preventDefault();
        if (!self.firstDone) { self.firstDone = true; self.start(); }
        var curTime = state.getScrubberTime();
        EX.Orchestrator.seekToGlobalTime(curTime - 5, graph, state);
      }
    });

    // First click to start
    document.addEventListener("click", function handler(e) {
      if (self.firstDone) return;
      if (e.target.closest("#controls")) return;
      if (e.target.closest(".quiz-opt")) return;
      self.firstDone = true;
      self.start();
      document.removeEventListener("click", handler);
    });

    // Build milestone dots
    this._buildMilestoneDots();

    // Listen for state changes
    EventBus.on("state:change", function(data) {
      if (data.to === "gate") self.onGateEnter();
      else if (data.from === "gate") self.onGateExit();
      else if (data.to === "ended") self.onLessonEnd();
    });

    // Hard reset clears our lock flags too
    EventBus.on("recover:reset", function() {
      self._scrubberLocked = false;
      self._isDragging = false;
    });

    // Listen for tick updates
    EventBus.on("playback:tick", function() {
      self.updateProgress();
    });

    // Show total duration immediately so "0:00 / 5:24" is visible before play
    var totalDur = graph.totalDefaultDuration;
    if (totalDur > 0) {
      $("timeD").textContent = "0:00 / " + formatTime(totalDur);
    }
  },

  start: function() {
    this.playing = true;
    $("playBtn").innerHTML = "\u23F8";
    if (window._collapseHero) window._collapseHero();
    EX.Orchestrator.start(this._graph, this._state);
  },

  toggle: function() {
    if (!this.firstDone) { this.firstDone = true; this.start(); return; }
    var state = this._state;
    var graph = this._graph;

    // Recover from any stuck state before inspecting phase
    if (EX.Orchestrator.isStuck(state)) {
      console.log("[controls] toggle detected stuck, recovering");
      EX.Orchestrator.recoverState(graph, state);
      this.playing = false;
      this._scrubberLocked = false;
      $("playBtn").innerHTML = "\u25B6";
      return; // leave paused — next click will resume
    }

    // If waiting for gate audio to finish, don't toggle — let it complete
    if (EX.Orchestrator._pendingGateTimer) return;

    // Use actual state phase as the source of truth
    var isActive = (state.phase === "playing");
    if (isActive) {
      this.playing = false;
      $("playBtn").innerHTML = "\u25B6";
      EX.ActRunner.pause();
      EventBus.emit("audio:pause", {});
      state.transition("paused");
    } else if (state.phase === "gate") {
      // Dismiss the gate and advance to the next act
      console.log("[controls] play pressed during gate — dismissing gate, advancing");
      state.phase = "playing"; // force out of gate
      this.playing = true;
      this._scrubberLocked = false;
      $("playBtn").innerHTML = "\u23F8";
      EX.Orchestrator._gatePausedAudio = null;
      EX.Orchestrator._advanceToNext(graph, state);
    } else {
      // If state is "ended" or "idle", reset to beginning
      if (state.phase === "ended" || state.phase === "idle") {
        this.start();
        return;
      }
      this.playing = true;
      $("playBtn").innerHTML = "\u23F8";
      state.transition("playing");
      EX.ActRunner.play();
      EventBus.emit("audio:resume", {});
    }
  },

  onGateEnter: function() {
    this.playing = false;
    // Don't lock scrubber — user should be able to seek away from a gate
    this._scrubberLocked = false;
    $("playBtn").innerHTML = "\u25B6";
  },

  onGateExit: function() {
    this.playing = true;
    this._scrubberLocked = false;
    $("playBtn").innerHTML = "\u23F8";
  },

  onLessonEnd: function() {
    this.playing = false;
    $("playBtn").innerHTML = "\u25B6";
  },

  updateProgress: function() {
    var graph = this._graph;
    var state = this._state;
    var totalDur = graph.totalDefaultDuration;
    var cumTime = state.getScrubberTime();

    // Don't fight the user's drag — only update scrubber position when idle
    if (!this._isDragging) {
      var pct = totalDur > 0 ? Math.round(cumTime / totalDur * 1000) : 0;
      $("scrubber").value = pct;
    }
    $("timeD").textContent = formatTime(cumTime) + " / " + formatTime(totalDur);

    var fillPct = totalDur > 0 ? (cumTime / totalDur * 100) : 0;
    var fill = $("progress-fill");
    if (fill) fill.style.height = fillPct + "%";
  },

  /* v2 fix: milestone dots use proper closure binding */
  _buildMilestoneDots: function() {
    var dotsContainer = $("milestone-dots");
    if (!dotsContainer) return;
    dotsContainer.innerHTML = "";

    var graph = this._graph;
    var state = this._state;
    var self = this; // v2: properly bound

    var positions = graph.getMilestonePositions();
    positions.forEach(function(ms) {
      var dot = document.createElement("div");
      dot.className = "milestone-dot" + (ms.type === "gate" ? " gate" : "");
      dot.style.left = (ms.position * 100) + "%";
      dot.title = ms.label || ("Act " + (ms.defaultIndex + 1));
      dot.addEventListener("click", function(e) {
        e.stopPropagation();
        e.preventDefault();
        // Recover from stuck state before jumping
        if (self.firstDone && EX.Orchestrator.isStuck(state)) {
          console.log("[controls] milestone click detected stuck, recovering");
          EX.Orchestrator.recoverState(graph, state);
          self.playing = false;
          self._scrubberLocked = false;
          $("playBtn").innerHTML = "\u25B6";
        }
        self._scrubberLocked = true;
        setTimeout(function() { self._scrubberLocked = false; }, 300);
        if (!self.firstDone) {
          self.firstDone = true;
          if (window._collapseHero) window._collapseHero();
        }
        if (ms.type === "gate") {
          // Jump to the act just before the gate and seek to its end so the
          // gate fires immediately and playback pauses at the question.
          var gateActDur = graph.defaultDurations[ms.defaultIndex] || 9999;
          EX.Orchestrator.jumpToDefaultIndex(ms.defaultIndex, gateActDur, graph, state);
          // onGateEnter will set playing=false and update the button
        } else {
          // Marker — jump to the act immediately after it
          EX.Orchestrator.jumpToDefaultIndex(ms.defaultIndex + 1, 0, graph, state);
          self.playing = true;
          $("playBtn").innerHTML = "\u23F8";
        }
      });
      dotsContainer.appendChild(dot);
    });
  },

  rebuildProgress: function() {
    this._buildMilestoneDots();
  }
};

function formatTime(seconds) {
  var m = Math.floor(seconds / 60);
  var s = Math.floor(seconds % 60);
  return m + ":" + (s < 10 ? "0" : "") + s;
}

EX.PlayerControls = PlayerControls;

})();

/* ═══════════════════════════════════════════════════════════════════
   ScrollSync v2 — Bidirectional scroll ↔ timeline synchronization
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var $ = EX.$;

var ScrollSync = {
  observer: null,
  scrollLocked: false,
  timelineLocked: false,
  _lockTimeout: null,
  _intersectTimeout: null,

  init: function() {
    var nb = $("notebook");
    if (!nb) return;
    this.observer = new IntersectionObserver(
      this._onIntersect.bind(this),
      {
        root: nb,
        threshold: [0.5],
        rootMargin: "-20% 0px -20% 0px"
      }
    );

    var self = this;
    nb.addEventListener("wheel", function() {
      var state = window._state;
      if (!state || state.phase !== "playing") return;
      self.timelineLocked = true;
      clearTimeout(self._lockTimeout);
      self._lockTimeout = setTimeout(function() { self.timelineLocked = false; }, 800);
    }, { passive: true });

    // Listen for events
    EventBus.on("scroll:observe", function(data) {
      if (self.observer && data.element) self.observer.observe(data.element);
    });

    EventBus.on("scroll:toBeat", function(data) {
      self.scrollToBeat(data.beatId);
    });

    // Cancel any pending debounced seek when acts change or gates enter,
    // so a stale seek can't fire into a new context and corrupt state.
    EventBus.on("act:start", function() { self.cancelPendingSeek(); });
    EventBus.on("gate:enter", function() { self.cancelPendingSeek(); });
    EventBus.on("state:change", function() { self.cancelPendingSeek(); });

    // Hard reset: clear ALL locks and pending timeouts
    EventBus.on("recover:reset", function() {
      self.cancelPendingSeek();
      clearTimeout(self._lockTimeout);
      self._lockTimeout = null;
      self.scrollLocked = false;
      self.timelineLocked = false;
    });
  },

  cancelPendingSeek: function() {
    clearTimeout(this._intersectTimeout);
    this._intersectTimeout = null;
  },

  _onIntersect: function(entries) {
    if (this.scrollLocked) return;
    var state = window._state;
    if (!state || (state.phase !== "playing" && state.phase !== "paused")) return;

    var best = null, bestRatio = 0;
    entries.forEach(function(entry) {
      if (entry.isIntersecting && entry.intersectionRatio > bestRatio) {
        best = entry.target;
        bestRatio = entry.intersectionRatio;
      }
    });
    if (best && this.timelineLocked) {
      var beatId = best.dataset.beatId || best.dataset.milestoneId;
      if (!beatId) return;
      var self = this;
      // Capture the act that was playing when the scroll happened
      var actIdAtSchedule = EX.ActRunner._currentActId;
      clearTimeout(this._intersectTimeout);
      this._intersectTimeout = setTimeout(function() {
        self._intersectTimeout = null;
        // Re-check state: don't seek if act changed, state left playing, or timeline died
        var st = window._state;
        if (!st || (st.phase !== "playing" && st.phase !== "paused")) return;
        if (EX.ActRunner._currentActId !== actIdAtSchedule) return;
        if (!EX.ActRunner.masterTl) return;

        var cues = EX.ActRunner.beatCues;
        for (var i = 0; i < cues.length; i++) {
          if (cues[i].beatId === beatId) {
            self.scrollLocked = true;
            EX.ActRunner.seek(cues[i].startTime);
            self.scrollLocked = false;
            break;
          }
        }
      }, 50);
    }
  },

  scrollToBeat: function(beatId) {
    if (this.timelineLocked) return;
    this.scrollLocked = true;
    EX.Notebook.scrollTo(beatId);
    var self = this;
    setTimeout(function() { self.scrollLocked = false; }, 500);
  }
};

EX.ScrollSync = ScrollSync;

})();

/* ═══════════════════════════════════════════════════════════════════
   Init v2 — Wires all modules together and boots the lesson

   Load order: core → notebook → viz-panel → audio → subtitles →
               cards → gates → controls → scroll-sync → init
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var $ = EX.$;
var K = EX.K;

var L = window.LESSON;
if (!L) { console.error("No LESSON data found"); return; }

// Apply language/direction from lesson metadata
if (L.meta && L.meta.lang) {
  document.documentElement.lang = L.meta.lang;
}
if (L.meta && L.meta.dir) {
  document.documentElement.dir = L.meta.dir;
}

// ── Build the LessonGraph ──
var graph = new EX.LessonGraph(L);
window._graph = graph;

// ── Build the PlaybackState ──
var state = new EX.PlaybackState(graph);
window._state = state;

// ── Viz Plugin management ──
var VizManager = {
  plugin: null,
  init: function() {
    var V = window.EXPLAINER_VIZ;
    if (V && graph.vizConfig) {
      var config = graph.vizConfig.config || graph.vizConfig;
      V.init($("viz"), config);
      this.plugin = V;
    }
  },
  reinit: function() {
    var V = window.EXPLAINER_VIZ;
    if (V && graph.vizConfig) {
      var config = graph.vizConfig.config || graph.vizConfig;
      V.init($("viz"), config);
      this.plugin = V;
    }
  }
};

// Wire viz action events
EventBus.on("viz:runActions", function(data) {
  if (!VizManager.plugin) return;
  var actions = data.actions;
  var plugin = VizManager.plugin;
  if (!plugin.timelineAction) {
    console.warn("[Viz] Plugin has no timelineAction method — .do() calls will be ignored");
    return;
  }
  function runAction(a, tl, baseTime) {
    var offset = a.offset || a.delay || 0;
    if (typeof offset === "string" && offset.charAt(0) === "+") offset = parseFloat(offset.substring(1));
    var before = tl.getChildren().length;
    plugin.timelineAction(tl, a.method, a.params || {}, baseTime + offset);
    if (tl.getChildren().length === before) {
      console.warn("[Viz] Method \"" + a.method + "\" added no tweens — is the method name correct?");
    }
  }
  if (data.instant) {
    var instantTl = gsap.timeline();
    actions.forEach(function(a) { runAction(a, instantTl, 0); });
    instantTl.progress(1);
  } else {
    var tl = data.timeline;
    var baseTime = data.time || 0;
    actions.forEach(function(a) { runAction(a, tl, baseTime); });
  }
});

EventBus.on("viz:reset", function() {
  // Kill ALL tweens targeting old SVG elements BEFORE removing them,
  // so GSAP doesn't hold stale references from previous play sessions.
  var oldEls = Array.prototype.slice.call($("viz").querySelectorAll("*"));
  oldEls.forEach(function(el) {
    gsap.killTweensOf(el);
  });

  // Clear SVG, THEN rebuild from scratch
  EX.VizPanel.reset();
  VizManager.reinit();

  // Flush any GSAP entry animations the plugin started during init so that
  // snapshotAct() captures the correct final state rather than opacity:0.
  var newEls = Array.prototype.slice.call($("viz").querySelectorAll("*"));
  newEls.forEach(function(el) {
    gsap.getTweensOf(el).forEach(function(t) { t.progress(1); });
  });
});

// ── Initialize all modules ──
document.title = (L.meta.source || "") + " \u2014 " + (L.meta.title || "Math Explainer");

EX.Notebook.init();
EX.VizPanel.init(graph.vizConfig);
EX.Subtitles.init(graph);
EX.AudioManager.init(graph);
VizManager.init();
if (window.EXPLAINER_VIZ_3D && EX.VizPanel3D) {
  EX.VizPanel3D.init();
}
EX.ScrollSync.init();
EX.CardSystem.init();
EX.GateSystem.init();
EX.Orchestrator.init(graph, state);
EX.PlayerControls.init(graph, state);

// ── Render problem bar ──
if (L.problem) {
  var bar = $("problem-bar");
  bar.innerHTML = "";
  bar.classList.add("hero");

  if (L.meta && L.meta.source) {
    var src = document.createElement("div");
    src.className = "problem-source";
    src.textContent = L.meta.source;
    bar.appendChild(src);
  }

  var textDiv = document.createElement("div");
  textDiv.className = "problem-text";
  K.mixed(L.problem.text, textDiv);
  bar.appendChild(textDiv);

  if (L.problem.highlight) {
    var hl = document.createElement("span");
    hl.className = "problem-highlight";
    hl.textContent = L.problem.highlight;
    bar.appendChild(hl);
  }

  gsap.fromTo(bar, { opacity: 0 }, { opacity: 1, duration: 0.6 });

  window._collapseHero = function() {
    if (!bar.classList.contains("hero")) return;
    bar.classList.remove("hero");
    bar.innerHTML = "";
    K.mixed(L.problem.text, bar);
    if (L.problem.highlight) {
      var hl2 = document.createElement("span");
      hl2.className = "problem-highlight";
      hl2.textContent = " " + L.problem.highlight;
      bar.appendChild(hl2);
    }
    gsap.fromTo(bar, { opacity: 0.5, y: -8 }, { opacity: 1, y: 0, duration: 0.4 });
  };
}

// ── Script export (for TTS pipeline) ──
window.exportScripts = function() {
  var scripts = [];
  function processAct(act, isBranch) {
    var fullScript = act.beats.map(function(b) { return b.say; }).filter(Boolean).join(" ");
    if (fullScript) {
      scripts.push({
        actId: act.id,
        title: act.title,
        text: fullScript,
        branch: isBranch || false,
        beatScripts: act.beats.map(function(b) { return { beatId: b.id, say: b.say || "" }; })
      });
    }
  }
  L.acts.forEach(function(a) { processAct(a, false); });
  for (var k in L.branchActs) { processAct(L.branchActs[k], true); }
  console.log("=== NARRATION SCRIPTS ===");
  console.log(JSON.stringify(scripts, null, 2));
  return scripts;
};

})();


</script>
</body>
</html>
