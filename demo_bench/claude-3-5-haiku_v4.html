/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box}

/* ── Theme Variables ── */
:root{
  --bg:#0f0e17;
  --bg-surface:rgba(15,14,23,0.97);
  --bg-controls:rgba(0,0,0,0.6);
  --text:#e2e8f0;
  --text-secondary:rgba(255,255,255,0.8);
  --text-muted:rgba(255,255,255,0.4);
  --text-dim:rgba(255,255,255,0.2);
  --accent:#818cf8;
  --accent-light:#c4b5fd;
  --accent-bg:rgba(129,140,248,0.08);
  --success:#34d399;
  --warning:#f59e0b;
  --error:#f87171;
  --border:rgba(129,140,248,0.18);
  --border-subtle:rgba(255,255,255,0.06);
  --card-bg:rgba(255,255,255,0.02);
  --card-bg-hover:rgba(255,255,255,0.03);
  --card-bg-accent:rgba(99,102,241,0.04);
  --card-border-accent:rgba(99,102,241,0.12);
  --btn-bg:rgba(255,255,255,0.1);
  --btn-border:rgba(255,255,255,0.1);
  --btn-text:rgba(255,255,255,0.6);
  --scrollbar:rgba(129,140,248,0.3);
  --subtitle-bg:rgba(0,0,0,0.75);
  --title-gradient-from:#c4b5fd;
  --title-gradient-to:#818cf8;
  --track-bg:rgba(255,255,255,0.08);
  --track-fill:rgba(255,255,255,0.1)
}
.light-mode{
  --bg:#f8fafc;
  --bg-surface:rgba(248,250,252,0.97);
  --bg-controls:rgba(241,245,249,0.95);
  --text:#1e293b;
  --text-secondary:rgba(30,41,59,0.75);
  --text-muted:rgba(30,41,59,0.4);
  --text-dim:rgba(30,41,59,0.2);
  --accent:#6366f1;
  --accent-light:#7c3aed;
  --accent-bg:rgba(99,102,241,0.08);
  --success:#059669;
  --warning:#d97706;
  --error:#dc2626;
  --border:rgba(99,102,241,0.2);
  --border-subtle:rgba(0,0,0,0.08);
  --card-bg:rgba(0,0,0,0.02);
  --card-bg-hover:rgba(0,0,0,0.04);

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'SF Pro Display','Segoe UI',system-ui,sans-serif}
#app{height:100%;display:flex;flex-direction:column}

/* ── Problem Bar (pinned at top) ── */
#problem-bar{padding:14px 24px;background:var(--bg-surface);border-bottom:1px solid var(--border);z-index:30;flex-shrink:0;font-size:1.05rem;line-height:1.7;color:var(--text-secondary);backdrop-filter:blur(12px)}
#problem-bar .problem-highlight{color:var(--accent);font-weight:600;font-size:1.08em}
#problem-bar .katex{font-size:1em}
#problem-bar.hero{position:absolute;inset:0;z-index:35;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:1.2rem;line-height:1.9;padding:40px 60px;border-bottom:none;background:var(--bg)}
#problem-bar.hero .problem-source{font-size:.85rem;text-transform:uppercase;letter-spacing:3px;color:var(--accent);font-weight:500;margin-bottom:20px}
#problem-bar.hero .problem-highlight{display:block;margin-top:18px;font-size:1.15em}

/* ── Title Overlay ── */
#title-overlay{position:absolute;inset:0;z-index:20;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:60px;opacity:0;pointer-events:none}
#title-overlay.active{opacity:1;pointer-events:auto}
#title-overlay .title-content{max-width:720px;text-align:center}
#title-overlay h1{font-size:1rem;text-transform:uppercase;letter-spacing:4px;color:var(--accent);margin-bottom:20px;font-weight:500}
#title-overlay h2{font-size:2.2rem;font-weight:600;margin-bottom:36px;line-height:1.3;background:linear-gradient(135deg,var(--title-gradient-from),var(--title-gradient-to));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#title-overlay p{font-size:1.12rem;line-height:1.85;color:var(--text-secondary);margin-top:14px}

/* ── Main Stage ── */
#stage{flex:1;display:flex;overflow:hidden;position:relative;min-height:0}

/* ── Viz Panel (left) ── */
#viz-wrap{flex:0 0 50%;display:flex;align-items:center;justify-content:center;padding:10px;min-height:0;position:relative}
#viz-wrap svg{width:100%;height:100%}

/* ── Subtitle Track ── */
#subtitle-track{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:18;max-width:90%;padding:6px 18px;background:var(--subtitle-bg);border-radius:8px;color:var(--text);font-size:.92rem;text-align:center;line-height:1.5;opacity:0;transition:opacity .3s;pointer-events:none}
#subtitle-track.visible{opacity:1}
#subtitle-track .active-word{color:var(--accent);font-weight:600}

/* ── Notebook Panel (right, scrollable) ── */
#notebook{flex:0 0 50%;padding:16px 20px 80px;display:flex;flex-direction:column;gap:0;background:var(--card-bg);border-left:1px solid var(--border-subtle);overflow-y:auto;scroll-behavior:smooth;min-height:0}
#notebook::-webkit-scrollbar{width:4px}
#notebook::-webkit-scrollbar-track{background:transparent}
#notebook::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}

/* ── Beat Card (base) ── */
.slide-card,.beat-card{padding:14px 16px;margin-bottom:4px;border-radius:10px;opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s}
.slide-card.entered,.beat-card.entered{opacity:0.55;transform:translateY(0)}
.slide-card.active,.beat-card.active,.beat-card.current{opacity:1;border-left:3px solid var(--accent);padding-left:13px}
.beat-card.past{opacity:0.55;transform:translateY(0)}
.beat-card.milestone-card{border:1px solid rgba(129,140,248,0.15);background:var(--card-bg-accent)}

/* ── Viz Overlay (full-panel figure/chart overlay inside viz-wrap) ── */
#viz-overlay{background:var(--bg-surface);backdrop-filter:blur(12px)}
.viz-overlay-inner{background:var(--bg-surface);border-radius:8px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.viz-overlay-title{font-size:.85rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.viz-overlay-caption{font-size:.88rem;color:var(--text-muted);margin-top:10px;text-align:center;font-style:italic}
.viz-overlay-bar-val{font-size:.7rem;color:var(--accent-light);font-weight:600}
.viz-overlay-bar-label{font-size:.6rem;color:var(--text-muted)}
.viz-overlay-pattern{font-size:.88rem;color:var(--text-secondary);margin-top:16px;text-align:center}

/* ── Inline Viz Card (migrated from viz panel) ── */
.viz-inline{padding:8px;border-radius:10px;background:rgba(15,14,23,0.6);border:1px solid var(--card-border-accent);overflow:visible;max-width:480px;width:100%;margin:4px auto;flex-shrink:0;position:relative;z-index:1}
.light-mode .viz-inline{background:rgba(241,245,249,0.8)}
.beat-card.viz-inline,
.beat-card.past.viz-inline,
.beat-card.entered.viz-inline{opacity:1 !important;transform:none !important;transition:none !important}
.viz-inline img{width:100%;height:auto;display:block;border-radius:6px}
.viz-inline svg{width:100%;height:auto;display:block}
.viz-inline .viz-inline-content{width:100%}
.viz-inline .viz-inline-content svg{max-width:100%;height:auto}

/* ── Slide: text ── */
.slide-card--text .slide-text{font-size:.98rem;line-height:1.7;color:var(--text-secondary)}
.slide-card--text .slide-text .katex{font-size:.95em}

/* ── Slide: derivation ── */
.slide-card--derivation .derivation-title{color:var(--accent);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-card--derivation .deriv-step{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s ease,opacity .4s,padding .3s;padding:0 10px}
.slide-card--derivation .deriv-step.visible{max-height:60px;opacity:1;padding:5px 10px}
.slide-card--derivation .deriv-step.highlight{background:rgba(52,211,153,0.08);border-left:3px solid var(--success);border-radius:6px}
.slide-card--derivation .deriv-step.wrong{background:rgba(248,113,113,0.08);border-left:3px solid var(--error);border-radius:6px}
.slide-card--derivation .deriv-step .katex-display{margin:0}

/* ── Slide: fill-in ── */
.slide-card--fill-in .fill-prompt{font-size:1rem;line-height:2;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.fill-blank{width:70px;padding:4px 8px;font-size:1.1rem;font-family:'SF Mono','Fira Code',monospace;background:transparent;border:none;border-bottom:2px solid rgba(129,140,248,0.5);color:var(--text);outline:none;text-align:center;transition:border-color .3s}
.fill-blank:focus{border-color:var(--accent)}
.fill-blank.correct{border-color:var(--success);color:var(--success)}
.fill-blank.wrong{border-color:var(--error);animation:shake .4s}
.fill-hint{font-size:.85rem;color:var(--text-muted);margin-top:4px;font-style:italic;opacity:0;transition:opacity .3s}
.fill-hint.visible{opacity:1}
.fill-success{font-size:.9rem;color:var(--success);margin-top:4px;opacity:0;transition:opacity .3s}
.fill-success.visible{opacity:1}

/* ── Slide: quiz ── */
.slide-card--quiz .quiz-question{font-size:1.1rem;font-weight:500;line-height:1.5;margin-bottom:12px}
.slide-card--quiz .quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:10px 16px;border-radius:10px;border:2px solid var(--btn-border);background:var(--card-bg-hover);color:var(--text);font-size:1rem;cursor:pointer;transition:all .25s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px}
.quiz-opt:hover{border-color:var(--accent);background:var(--accent-bg)}
.quiz-opt .opt-letter{width:26px;height:26px;border-radius:50%;background:var(--btn-bg);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;flex-shrink:0}
.quiz-opt.correct{border-color:var(--success);background:rgba(52,211,153,0.12);color:var(--success)}
.quiz-opt.correct .opt-letter{background:var(--success);color:var(--bg)}
.quiz-opt.wrong-pick{border-color:var(--error);background:rgba(248,113,113,0.08);color:var(--error)}
.quiz-opt.dimmed{opacity:0.3;pointer-events:none}
.quiz-explain{margin-top:10px;font-size:.9rem;color:var(--accent-light);line-height:1.5;opacity:0;transition:opacity .3s}
.quiz-explain.visible{opacity:1}

/* ── Slide: recap ── */
.slide-card--recap{background:var(--card-bg-accent);border:1px solid var(--card-border-accent)}
.recap-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0}
.recap-header h4{font-size:.88rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.recap-chevron{color:var(--accent);transition:transform .3s;font-size:.8rem}
.recap-chevron.open{transform:rotate(180deg)}
.recap-body{max-height:0;overflow:hidden;transition:max-height .4s ease;line-height:1.7;font-size:.95rem}
.recap-body.open{max-height:400px;padding-top:8px}
.recap-body .katex-display{margin:8px 0}

/* ── Slide: bar-chart ── */
.slide-card--bar-chart .chart-title{font-size:.78rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.bar-row{display:flex;gap:6px;height:100px;margin-bottom:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .6s cubic-bezier(.34,1.56,.64,1)}
.bar-val{font-size:.7rem;color:var(--accent-light);font-weight:600}
.bar-label{font-size:.65rem;color:var(--text-muted)}
.bar-diff{flex:0 0 auto;display:flex;align-items:center;font-size:.55rem;color:var(--warning);font-weight:600;padding-bottom:18px}
.chart-pattern{font-size:.88rem;color:var(--text-muted);margin-top:4px}
.chart-pattern b{color:var(--success)}

/* ── Slide: number-line ── */
.slide-card--number-line .nl-title{font-size:.78rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.nl-container{position:relative;height:100px;margin:8px 0}
.nl-track{position:absolute;top:36px;left:0;right:0;height:6px;background:var(--track-bg);border-radius:3px}
.nl-fill{position:absolute;top:36px;left:0;height:6px;background:linear-gradient(90deg,var(--success),#22c55e);border-radius:3px;width:0;transition:width .8s ease}
.nl-threshold{position:absolute;top:20px;width:2px;background:var(--warning);height:36px;z-index:2}
.nl-threshold-label{position:absolute;top:2px;transform:translateX(-50%);font-size:.7rem;color:var(--warning);white-space:nowrap}
.nl-marker{position:absolute;top:48px;transform:translateX(-50%);font-size:.65rem;color:var(--text-muted);white-space:nowrap;opacity:0;transition:opacity .3s}
.nl-marker:nth-child(even){top:62px}
.nl-marker.visible{opacity:1}
.nl-marker.highlight{color:var(--success);font-weight:600;font-size:.75rem}
.nl-ticks{position:absolute;top:28px;left:0;right:0;display:flex;justify-content:space-between}
.nl-tick{font-size:.6rem;color:var(--text-dim)}

/* ── Slide: plot-2d ── */
.slide-card--plot-2d .plot-title{font-size:.78rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.plot-svg{width:100%;max-width:380px;display:block;margin:0 auto}
.plot-grid-line{stroke:var(--border-subtle);stroke-width:1}
.plot-axis-text{fill:var(--text-muted);font-size:9px;font-family:system-ui}
.plot-label-text{fill:var(--text-muted);font-size:10px;font-family:system-ui}
.plot-threshold-line{stroke:var(--warning);stroke-width:1.5;stroke-dasharray:6,3}
.plot-threshold-text{fill:var(--warning);font-size:9px;font-family:system-ui}
.plot-curve{fill:none;stroke:var(--success);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.plot-dot{fill:var(--success)}
.plot-dot.highlight{fill:var(--warning);stroke:rgba(245,158,11,0.4);stroke-width:4}
.plot-dot-text{fill:var(--text-secondary);font-size:8px;font-family:system-ui}
.plot-dot-text.highlight{fill:var(--warning);font-size:9px;font-weight:600}
.plot-note{font-size:.85rem;color:var(--text-muted);margin-top:6px;text-align:center}
.plot-note b,.plot-note strong{color:var(--success)}

/* ── Slide: graph (JSXGraph interactive) ── */
.beat-card--graph{padding:8px 0}
.beat-card--graph .jxgbox{border-radius:8px;border:1px solid rgba(99,102,241,0.25) !important}
.beat-card--graph .jxgbox text{fill:rgba(224,231,255,0.65) !important}

/* ── Slide: code-runner (p5.js sandbox) ── */
.beat-card--code-runner{padding:8px 0}
.code-runner-editor{width:100%;font-family:'SF Mono','Fira Code',monospace;font-size:12px;padding:8px;background:#1e1e2e;color:#cdd6f4;border:1px solid rgba(99,102,241,0.25);border-radius:6px;resize:vertical;box-sizing:border-box;line-height:1.5;display:block}
.code-runner-run-btn{background:var(--accent);color:#fff;border:none;padding:6px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .2s;flex-shrink:0}
.code-runner-run-btn:hover{opacity:.85}

/* ── Slide: proof-builder ── */
.slide-card--proof-builder .pb-instruction{font-size:.92rem;color:var(--text-secondary);margin-bottom:12px}
.pb-slots{display:flex;gap:6px;min-height:50px;padding:8px;background:var(--card-bg-hover);border:2px dashed rgba(129,140,248,0.2);border-radius:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.pb-slot{min-width:50px;min-height:40px;border:2px dashed var(--btn-border);border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:4px 8px}
.pb-slot.over{border-color:var(--accent);background:var(--accent-bg)}
.pb-slot.filled{border-style:solid;border-color:rgba(129,140,248,0.3);background:var(--accent-bg);cursor:pointer}
.pb-slot.correct{border-color:var(--success);background:rgba(52,211,153,0.1)}
.pb-slot.wrong{border-color:var(--error);animation:shake .4s}
.pb-tray{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pb-piece{padding:6px 14px;border-radius:8px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);cursor:grab;user-select:none;transition:all .2s}
.pb-piece:hover{background:rgba(99,102,241,0.2);border-color:rgba(99,102,241,0.4)}
.pb-piece.dragging{opacity:0.4}
.pb-piece.used{opacity:0.2;pointer-events:none}
.pb-check{padding:8px 20px;border-radius:8px;border:1px solid rgba(129,140,248,0.3);background:rgba(129,140,248,0.1);color:var(--accent);cursor:pointer;font-size:.9rem;font-family:inherit;transition:all .2s}
.pb-check:hover{background:rgba(129,140,248,0.2)}
.pb-hint{font-size:.85rem;color:var(--text-muted);margin-top:6px;font-style:italic;opacity:0;transition:opacity .3s}
.pb-hint.visible{opacity:1}

/* ── Slide: interactive ── */
.slide-card--interactive .int-title{font-size:1rem;font-weight:500;color:var(--accent-light);margin-bottom:10px}
.int-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--track-fill);outline:none;margin:10px 0}
.int-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#6366f1;cursor:pointer;border:2px solid #fff}
.int-info{font-size:.98rem;line-height:2}
.int-info .iv{color:var(--accent);font-weight:600}
.int-info .av{color:var(--success);font-weight:700;font-size:1.3rem}
.int-challenge{margin-top:10px;font-size:.88rem;color:var(--accent);font-style:italic}
.int-continue{margin-top:12px;padding:8px 20px;border-radius:8px;border:1px solid rgba(129,140,248,0.3);background:rgba(129,140,248,0.1);color:var(--accent);cursor:pointer;font-family:inherit;font-size:.9rem}

/* ── Slide: practice ── */
.slide-card--practice{background:rgba(52,211,153,0.04);border:1px solid rgba(52,211,153,0.12)}
.slide-card--practice .practice-label{font-size:.75rem;color:var(--success);font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.slide-card--practice .practice-problem{font-size:.98rem;line-height:1.7;margin-bottom:10px}

/* ── Playback Controls ── */
#controls{height:48px;display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--bg-controls);border-top:1px solid var(--border-subtle);z-index:40;flex-shrink:0;position:relative}
#playBtn{width:36px;height:36px;border-radius:50%;border:none;background:var(--btn-bg);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#playBtn:hover{background:rgba(255,255,255,0.15)}
.light-mode #playBtn:hover{background:rgba(0,0,0,0.1)}
.scrubber-wrap{flex:1;position:relative;display:flex;align-items:center}
#scrubber{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--track-fill);outline:none;cursor:pointer}
#scrubber::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;position:relative;z-index:2}
#milestone-dots{position:absolute;top:50%;left:0;right:0;height:0;pointer-events:none;z-index:1}
.milestone-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);transform:translate(-50%,-50%);cursor:pointer;pointer-events:auto;transition:all .25s;z-index:2}
.light-mode .milestone-dot{background:rgba(0,0,0,0.1);border-color:rgba(0,0,0,0.2)}
.milestone-dot::before{content:"";position:absolute;inset:-8px;border-radius:50%}
.milestone-dot:hover{background:rgba(129,140,248,0.4);border-color:var(--accent);transform:translate(-50%,-50%) scale(1.3)}
.milestone-dot.active{background:var(--accent);border-color:var(--accent);transform:translate(-50%,-50%) scale(1.3)}
.milestone-dot.visited{background:rgba(129,140,248,0.4);border-color:var(--accent)}
#timeD{font-size:.72rem;color:var(--text-muted);min-width:86px;text-align:right;font-variant-numeric:tabular-nums}
.ctrl-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--btn-border);background:none;color:var(--btn-text);font-size:.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:system-ui}
.ctrl-btn:hover{background:var(--btn-bg)}
.ctrl-btn.off{color:var(--text-dim)}
#speedBtn{min-width:34px;padding:2px 6px}

/* ── Animations ── */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}50%{box-shadow:0 0 12px 4px rgba(52,211,153,0.3)}}

/* ── Slide: hint system ── */
.hint-container{margin-top:8px}
.hint-btn{padding:4px 12px;border-radius:6px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.06);color:var(--warning);cursor:pointer;font-size:.82rem;font-family:inherit;transition:all .2s}
.hint-btn:hover{background:rgba(245,158,11,0.12)}
.hint-btn:disabled{opacity:0.3;cursor:default}
.hint-text{font-size:.88rem;color:var(--text-muted);line-height:1.6;margin-top:6px;padding:6px 10px;border-left:2px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.03);border-radius:0 6px 6px 0;opacity:0;max-height:0;overflow:hidden;transition:opacity .3s,max-height .4s ease}
.hint-text.visible{opacity:1;max-height:120px}
.hint-text .katex{font-size:.92em}

/* ── Scroll-driven mode ── */
.scroll-mode #stage{flex-direction:column;overflow:visible}
.scroll-mode #viz-wrap{position:sticky;top:0;z-index:10;height:50vh;flex:none}
.scroll-mode #notebook{flex:none;overflow:visible;padding-bottom:40vh}
.scroll-mode .slide-card{min-height:40vh;display:flex;flex-direction:column;justify-content:center}
.scroll-mode #controls{position:sticky;bottom:0;z-index:25}

/* ── Progress indicator (scroll mode) ── */
#progress-bar{position:fixed;left:0;top:0;height:100%;width:4px;z-index:50;pointer-events:none}
#progress-fill{width:100%;background:linear-gradient(180deg,var(--accent),var(--success));border-radius:0 2px 2px 0;height:0%;transition:height .3s ease}
.progress-dots{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:45;display:flex;flex-direction:column;gap:6px}
.progress-dot{width:8px;height:8px;border-radius:50%;background:var(--btn-bg);border:1px solid rgba(255,255,255,0.15);cursor:pointer;transition:all .25s}
.light-mode .progress-dot{border-color:rgba(0,0,0,0.15)}
.progress-dot.active{background:var(--accent);border-color:var(--accent);transform:scale(1.3)}
.progress-dot.visited{background:rgba(129,140,248,0.4);border-color:var(--accent)}

/* ── Error-specific feedback ── */
.feedback-msg{font-size:.85rem;line-height:1.5;margin-top:6px;padding:6px 10px;border-radius:6px;opacity:0;transition:opacity .3s}
.feedback-msg.visible{opacity:1}
.feedback-msg.wrong{color:var(--error);background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.12)}
.feedback-msg.correct{color:var(--success);background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.12)}

/* ── MX Tex rendering ── */
.mx-tex .katex{color:inherit;font-size:inherit}
.mx-tex .katex-display{margin:0!important}

/* ── KaTeX overrides ── */
.katex{color:var(--text)}
.katex-display{margin:6px 0!important;overflow-x:auto;overflow-y:hidden}
.katex-display>.katex{text-align:left}

/* ═══════════════════════════════════════════════════════════════════
   RTL (Right-to-Left) Overrides
   ═══════════════════════════════════════════════════════════════════ */
[dir="rtl"] #problem-bar{text-align:right}
[dir="rtl"] #notebook{border-left:none;border-right:1px solid var(--border-subtle);text-align:right}
[dir="rtl"] .slide-card.active,[dir="rtl"] .beat-card.active,[dir="rtl"] .beat-card.current{border-left:none;border-right:3px solid var(--accent);padding-left:16px;padding-right:13px}
[dir="rtl"] .slide-card--derivation .deriv-step.highlight{border-left:none;border-right:3px solid var(--success)}
[dir="rtl"] .slide-card--derivation .deriv-step.wrong{border-left:none;border-right:3px solid var(--error)}
[dir="rtl"] .hint-text{border-left:none;border-right:2px solid rgba(245,158,11,0.3);border-radius:6px 0 0 6px}
[dir="rtl"] .quiz-opt{text-align:right}
[dir="rtl"] #subtitle-track{direction:rtl}
[dir="rtl"] .katex-display>.katex{text-align:right}
[dir="rtl"] .feedback-msg.wrong,[dir="rtl"] .feedback-msg.correct{text-align:right}
[dir="rtl"] .slide-card--text .slide-text{text-align:right}
[dir="rtl"] .recap-header{flex-direction:row-reverse}
[dir="rtl"] #title-overlay h1,[dir="rtl"] #title-overlay h2,[dir="rtl"] #title-overlay p{direction:rtl}
[dir="rtl"] .fill-prompt{direction:rtl}
[dir="rtl"] #controls{direction:ltr}

/* ═══════════════════════════════════════════════════════════════════
   Print Stylesheet
   ═══════════════════════════════════════════════════════════════════ */
@media print{
  #controls,#viz-wrap,#subtitle-track,#progress-bar,.progress-dots,#title-overlay{display:none!important}
  html,body{height:auto;overflow:visible;background:#fff;color:#111}
  #app{height:auto;display:block}
  #stage{display:block;overflow:visible}
  #problem-bar{background:#fff;color:#111;border-bottom:2px solid #6366f1;position:static;padding:16px 20px;font-size:1rem}
  #problem-bar.hero{position:static;font-size:1rem;padding:16px 20px;display:block;text-align:left}
  #problem-bar .problem-highlight{color:#4f46e5}
  #notebook{flex:none;width:100%;max-width:100%;overflow:visible;padding:0 20px;background:#fff;border:none}
  .beat-card,.slide-card{opacity:1!important;transform:none!important;page-break-inside:avoid;margin-bottom:8px;border-left:2px solid #6366f1;padding-left:14px;color:#111}
  .beat-card.past{opacity:1!important}
  .slide-text,.quiz-question,.fill-prompt,.recap-body,.derivation-title,.chart-title,.pb-instruction,.int-title{color:#111}
  .katex{color:#111!important}
  .recap-body{max-height:none!important;overflow:visible;padding-top:8px}
  .viz-inline{max-width:300px;margin:8px auto;page-break-inside:avoid}
  .viz-inline img,.viz-inline svg{max-width:100%}
  .int-slider,.int-continue,.pb-tray,.pb-check,.hint-btn,.hint-container{display:none}
  .quiz-opt{pointer-events:none;border-color:#ccc;color:#111}
  .quiz-opt.correct{border-color:#059669;color:#059669}
  .fill-blank{border-bottom-color:#6366f1;color:#111}
  [dir="rtl"] #problem-bar.hero{text-align:right}
  [dir="rtl"] .beat-card,[dir="rtl"] .slide-card{border-left:none;border-right:2px solid #6366f1;padding-left:0;padding-right:14px}
  @page{margin:1.5cm}
}

</style>
</head>
<body>
<div id="app">
  <div id="problem-bar"></div>
  <div id="title-overlay"><div class="title-content"></div></div>
  <div id="stage">
    <div id="viz-wrap">
      <!-- v2: viewBox set dynamically by JS from LESSON.viz.viewBox -->
      <svg id="viz" aria-label="Lesson visualization"></svg>
    </div>
    <div id="notebook" role="log" aria-label="Lesson content"></div>
    <div id="subtitle-track" role="status" aria-live="polite"></div>

    this.el.appendChild(this._shape);
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }
  get radius() { return parseFloat(this._shape.getAttribute("r")); }
  set radius(v) { this._shape.setAttribute("r", v); }
}

/* ── Dot ── */
class DotMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    this._shape = svgEl("circle", {
      cx: 0, cy: 0, r: opts.radius || 4,
      fill: opts.fill || opts.color || MX.C.WHITE,
      stroke: "none"
    });
    this.el.appendChild(this._shape);
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }
}

/* ── Rectangle ── */
class RectMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    var w = opts.width || 100, h = opts.height || 60;
    var rx = opts.cornerRadius || opts.rx || 0;
    this._shape = svgEl("rect", {
      x: -w / 2, y: -h / 2, width: w, height: h,
      rx: rx, ry: rx,
      fill: opts.fill || "none",
      stroke: opts.stroke || MX.C.INDIGO,
      "stroke-width": opts.strokeWidth || 2
    });
    this.el.appendChild(this._shape);
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }
  get width()  { return parseFloat(this._shape.getAttribute("width")); }
  set width(v) { this._shape.setAttribute("width", v); this._shape.setAttribute("x", -v / 2); }
  get height() { return parseFloat(this._shape.getAttribute("height")); }
  set height(v){ this._shape.setAttribute("height", v); this._shape.setAttribute("y", -v / 2); }
}

/* ── Line ── */
class LineMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    var from = opts.from || [0, 0], to = opts.to || [100, 0];
    this._shape = svgEl("line", {
      x1: from[0], y1: from[1], x2: to[0], y2: to[1],
      stroke: opts.stroke || opts.color || MX.C.WHITE,
      "stroke-width": opts.strokeWidth || 2,
      "stroke-linecap": "round"
    });
    if (opts.dash) this._shape.setAttribute("stroke-dasharray", opts.dash);
    this.el.appendChild(this._shape);
  }
  setPoints(from, to) {
    this._shape.setAttribute("x1", from[0]); this._shape.setAttribute("y1", from[1]);
    this._shape.setAttribute("x2", to[0]);   this._shape.setAttribute("y2", to[1]);
    return this;
  }
  get length() {
    var dx = parseFloat(this._shape.getAttribute("x2")) - parseFloat(this._shape.getAttribute("x1"));
    var dy = parseFloat(this._shape.getAttribute("y2")) - parseFloat(this._shape.getAttribute("y1"));
    return Math.sqrt(dx * dx + dy * dy);
  }
}

/* ── Arrow ── */
class ArrowMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    var from = opts.from || [0, 0], to = opts.to || [100, 0];
    var color = opts.stroke || opts.color || MX.C.WHITE;
    var sw = opts.strokeWidth || 2;
    var tipSize = opts.tipSize || 10;

    // Arrowhead marker
    var markerId = _id();
    var defs = svgEl("defs");
    var marker = svgEl("marker", {
      id: markerId, markerWidth: tipSize, markerHeight: tipSize,
      refX: tipSize - 1, refY: tipSize / 2, orient: "auto", markerUnits: "userSpaceOnUse"
    });
    var path = svgEl("path", {
      d: "M0,0 L" + tipSize + "," + (tipSize / 2) + " L0," + tipSize + " Z",
      fill: color
    });
    marker.appendChild(path);
    defs.appendChild(marker);
    this.el.appendChild(defs);
    this._marker = path;

    this._shape = svgEl("line", {
      x1: from[0], y1: from[1], x2: to[0], y2: to[1],
      stroke: color, "stroke-width": sw, "stroke-linecap": "round",
      "marker-end": "url(#" + markerId + ")"
    });
    this.el.appendChild(this._shape);
  }
  setPoints(from, to) {
    this._shape.setAttribute("x1", from[0]); this._shape.setAttribute("y1", from[1]);
    this._shape.setAttribute("x2", to[0]);   this._shape.setAttribute("y2", to[1]);
    return this;
  }
}

/* ── Arc ── */
class ArcMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    var r = opts.radius || 50;
    var start = (opts.startAngle || 0) * Math.PI / 180;
    var end = (opts.endAngle || 90) * Math.PI / 180;
    var x1 = r * Math.cos(start), y1 = r * Math.sin(start);
    var x2 = r * Math.cos(end),   y2 = r * Math.sin(end);
    var large = (end - start > Math.PI) ? 1 : 0;
    this._r = r; this._start = opts.startAngle || 0; this._end = opts.endAngle || 90;
    this._shape = svgEl("path", {
      d: "M" + x1 + "," + y1 + " A" + r + "," + r + " 0 " + large + " 1 " + x2 + "," + y2,
      fill: opts.fill || "none",
      stroke: opts.stroke || MX.C.INDIGO,
      "stroke-width": opts.strokeWidth || 2,
      "stroke-linecap": "round"
    });
    this.el.appendChild(this._shape);
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }
}

/* ── Polygon ── */
class PolygonMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    var points = opts.points || [[0, -40], [40, 40], [-40, 40]]; // default triangle
    var ptStr = points.map(function(p) { return p[0] + "," + p[1]; }).join(" ");
    this._shape = svgEl("polygon", {
      points: ptStr,
      fill: opts.fill || "none",
      stroke: opts.stroke || MX.C.INDIGO,
      "stroke-width": opts.strokeWidth || 2,
      "stroke-linejoin": "round"
    });
    this.el.appendChild(this._shape);
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }
}

/* ── Regular Polygon ── */
class RegularPolygonMobject extends PolygonMobject {
  constructor(opts) {
    opts = opts || {};
    var n = opts.sides || opts.n || 6;
    var r = opts.radius || 50;
    var pts = [];
    for (var i = 0; i < n; i++) {
      var a = (2 * Math.PI * i / n) - Math.PI / 2;
      pts.push([r * Math.cos(a), r * Math.sin(a)]);
    }
    opts.points = pts;
    super(opts);
  }
}

/* ── Star ── */
class StarMobject extends PolygonMobject {
  constructor(opts) {
    opts = opts || {};
    var n = opts.points || opts.n || 5;
    var outer = opts.outerRadius || 50;
    var inner = opts.innerRadius || outer * 0.4;
    var pts = [];
    for (var i = 0; i < n * 2; i++) {
      var a = (Math.PI * i / n) - Math.PI / 2;
      var r = i % 2 === 0 ? outer : inner;
      pts.push([r * Math.cos(a), r * Math.sin(a)]);
    }
    opts.points = pts;
    super(opts);
  }
}

/* ── Path (arbitrary SVG path) ── */
class PathMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    this._shape = svgEl("path", {
      d: opts.d || opts.path || "",
      fill: opts.fill || "none",
      stroke: opts.stroke || MX.C.INDIGO,
      "stroke-width": opts.strokeWidth || 2,
      "stroke-linecap": "round",
      "stroke-linejoin": "round"
    });
    this.el.appendChild(this._shape);
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }
  get pathLength() { try { return this._shape.getTotalLength(); } catch(e) { return 0; } }
}

/* ── Brace (curly bracket annotation) ── */
class BraceMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    var from = opts.from || [0, 0], to = opts.to || [100, 0];
    var dx = to[0] - from[0], dy = to[1] - from[1];
    var len = Math.sqrt(dx * dx + dy * dy);
    var angle = Math.atan2(dy, dx) * 180 / Math.PI;
    var bump = opts.bump || 12;
    var mid = len / 2;
    // Curly brace shape pointing downward (away from the line from→to)
    var d = "M0,0 C" + (mid * 0.15) + "," + bump + " " + (mid * 0.4) + "," + bump + " " + mid + "," + (bump * 1.8) +
            " C" + (mid * 0.6 + mid) + "," + bump + " " + (mid * 0.85 + mid * 0.3) + "," + bump + " " + len + ",0";
    this._shape = svgEl("path", {
      d: d,
      fill: "none",
      stroke: opts.stroke || opts.color || MX.C.LAVENDER,
      "stroke-width": opts.strokeWidth || 1.5,
      "stroke-linecap": "round"
    });
    this.el.appendChild(this._shape);
    this.moveTo(from[0], from[1]);
    this._rot = angle; this._sync();

    // Optional label
    if (opts.label) {
      var labelEl = svgEl("text", {
        x: mid, y: bump * 2.4,
        "text-anchor": "middle", "dominant-baseline": "hanging",
        fill: opts.labelColor || MX.C.LAVENDER,
        "font-size": opts.labelSize || 12,
        "font-family": "system-ui, sans-serif"
      });
      labelEl.textContent = opts.label;
      this.el.appendChild(labelEl);
      this._label = labelEl;
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════
   Text Mobjects
   ═══════════════════════════════════════════════════════════════════ */

/* ── Plain Text ── */
class TextMobject extends Mobject {
  constructor(text, opts) {
    super();
    opts = opts || {};
    this._text = text;
    this._shape = svgEl("text", {
      x: 0, y: 0,
      "text-anchor": opts.anchor || "middle",
      "dominant-baseline": opts.baseline || "central",
      fill: opts.fill || opts.color || MX.C.WHITE,
      "font-size": opts.fontSize || 18,
      "font-weight": opts.fontWeight || "normal",
      "font-family": opts.fontFamily || "'SF Pro Display','Segoe UI',system-ui,sans-serif",
      "letter-spacing": opts.letterSpacing || "normal"
    });
    this._shape.textContent = text;
    this.el.appendChild(this._shape);
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }
  get text() { return this._text; }
  set text(v) { this._text = v; this._shape.textContent = v; }
}

/* ── KaTeX Math ── */
class TexMobject extends Mobject {
  constructor(latex, opts) {
    super();
    opts = opts || {};
    this._latex = latex;
    this._display = opts.display !== false;
    // Use foreignObject to embed KaTeX-rendered HTML
    var fo = svgEl("foreignObject", {
      x: 0, y: 0, width: opts.width || 400, height: opts.height || 80,
      overflow: "visible"
    });
    var div = document.createElement("div");
    div.style.cssText = "color:" + (opts.color || MX.C.WHITE) +
      ";font-size:" + (opts.fontSize || "1.2em") +
      ";white-space:nowrap;display:inline-block;";
    div.className = "mx-tex";
    fo.appendChild(div);
    this._div = div;
    this._fo = fo;
    this.el.appendChild(fo);
    // Render after DOM insertion via a microtask
    this._render();
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }

  _render() {
    var self = this;
    if (typeof katex !== "undefined") {
      try {
        katex.render(this._latex, this._div, {
          throwOnError: false,
          displayMode: this._display
        });
        // Auto-size foreignObject after render
        requestAnimationFrame(function() { self._autoSize(); });
      } catch(e) {
        this._div.textContent = this._latex;
      }
    } else {
      this._div.textContent = this._latex;
    }
  }

  _autoSize() {
    var rect = this._div.getBoundingClientRect();
    if (rect.width > 0) {
      this._fo.setAttribute("width", Math.ceil(rect.width) + 10);
      this._fo.setAttribute("height", Math.ceil(rect.height) + 10);
    }
  }

  get latex() { return this._latex; }
  set latex(v) { this._latex = v; this._render(); }

  /* Return sub-expression mobjects for individual animation */
  parts(selector) {
    var els = this._div.querySelectorAll(selector || ".katex-html > .base > *");
    return Array.from(els);
  }
}

/* ── Code Block ── */
class CodeMobject extends Mobject {
  constructor(code, opts) {
    super();
    opts = opts || {};
    var lines = code.split("\n");
    var lineHeight = opts.lineHeight || 18;
    var fontSize = opts.fontSize || 13;
    var fontFamily = opts.fontFamily || "'SF Mono','Fira Code',monospace";
    var colors = opts.colors || {};

    var bg = svgEl("rect", {
      x: -8, y: -8,
      width: opts.width || 350,
      height: lines.length * lineHeight + 16,
      rx: 8, fill: opts.bgFill || "rgba(255,255,255,0.04)",
      stroke: "rgba(255,255,255,0.08)", "stroke-width": 1
    });
    this.el.appendChild(bg);

    this._lines = [];
    for (var i = 0; i < lines.length; i++) {
      var t = svgEl("text", {
        x: 0, y: i * lineHeight,
        fill: opts.fill || MX.C.LIGHT_GRAY,
        "font-size": fontSize,
        "font-family": fontFamily,
        "dominant-baseline": "hanging"
      });
      t.textContent = lines[i];
      this.el.appendChild(t);
      this._lines.push(t);
    }
    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }

  highlightLine(idx, color) {
    if (this._lines[idx]) {
      this._lines[idx].setAttribute("fill", color || MX.C.INDIGO);
      this._lines[idx].setAttribute("font-weight", "600");
    }
    return this;
  }

  resetLine(idx) {
    if (this._lines[idx]) {
      this._lines[idx].setAttribute("fill", MX.C.LIGHT_GRAY);
      this._lines[idx].setAttribute("font-weight", "normal");
    }
    return this;
  }
}


/* ═══════════════════════════════════════════════════════════════════
   Group
   ═══════════════════════════════════════════════════════════════════ */
class Group extends Mobject {
  constructor(items) {
    super();
    this._children = [];
    if (items) {
      var arr = Array.isArray(items) ? items : Array.from(arguments);
      for (var i = 0; i < arr.length; i++) this.add(arr[i]);
    }
  }

  add(mob) {
    if (!(mob instanceof Mobject)) return this;
    this._children.push(mob);
    mob.parent = this;
    this.el.appendChild(mob.el);
    return this;
  }

  remove(mob) {
    var idx = this._children.indexOf(mob);
    if (idx >= 0) {
      this._children.splice(idx, 1);
      mob.parent = null;
      if (mob.el.parentNode === this.el) this.el.removeChild(mob.el);
    }
    return this;
  }

  get children() { return this._children.slice(); }
  get length()   { return this._children.length; }
  at(i)          { return this._children[i]; }

  /* Bulk operations */
  forEach(fn) { this._children.forEach(fn); return this; }
  map(fn)     { return this._children.map(fn); }

  /* Layout helpers */
  arrangeInRow(gap) {
    gap = gap || 20;
    var x = 0;
    this._children.forEach(function(c) {
      c.moveTo(x, 0);
      x += c.getWidth() + gap;
    });
    // Center the whole row
    this.shift(-x / 2, 0);
    return this;
  }

  arrangeInColumn(gap) {
    gap = gap || 20;
    var y = 0;
    this._children.forEach(function(c) {
      c.moveTo(0, y);
      y += c.getHeight() + gap;
    });
    this.shift(0, -y / 2);
    return this;
  }

  arrangeInGrid(cols, gapX, gapY) {
    cols = cols || 3; gapX = gapX || 20; gapY = gapY || 20;
    this._children.forEach(function(c, i) {
      var col = i % cols, row = Math.floor(i / cols);
      c.moveTo(col * gapX, row * gapY);
    });
    return this;
  }
}

MX.Group = Group;

/* ═══════════════════════════════════════════════════════════════════
   Coordinate Systems
   ═══════════════════════════════════════════════════════════════════ */

/* ── NumberLine ── */
class NumberLineMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    this._range = opts.range || [0, 10];
    this._length = opts.length || 400;
    this._step = opts.step || 1;
    this._showTicks = opts.ticks !== false;
    this._showLabels = opts.labels !== false;
    this._tickHeight = opts.tickHeight || 8;
    this._color = opts.color || MX.C.WHITE;

    // Main line
    this._line = svgEl("line", {
      x1: 0, y1: 0, x2: this._length, y2: 0,
      stroke: this._color, "stroke-width": 2, "stroke-linecap": "round"
    });
    this.el.appendChild(this._line);

    // Ticks + labels
    this._tickEls = [];
    this._labelEls = [];
    if (this._showTicks) this._drawTicks(opts);

    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }

  _drawTicks(opts) {
    var min = this._range[0], max = this._range[1];
    var step = this._step;
    var scale = this._length / (max - min);
    for (var v = min; v <= max; v += step) {
      var px = (v - min) * scale;
      var tick = svgEl("line", {
        x1: px, y1: -this._tickHeight / 2, x2: px, y2: this._tickHeight / 2,
        stroke: this._color, "stroke-width": 1.5
      });
      this.el.appendChild(tick);
      this._tickEls.push(tick);

      if (this._showLabels) {
        var label = svgEl("text", {
          x: px, y: this._tickHeight / 2 + 14,
          "text-anchor": "middle", fill: "rgba(255,255,255,0.5)",
          "font-size": opts.labelSize || 11, "font-family": "system-ui"
        });
        label.textContent = v;
        this.el.appendChild(label);
        this._labelEls.push(label);
      }
    }
  }

  /* Convert value → pixel x */
  valToX(v) {
    var min = this._range[0], max = this._range[1];
    return (v - min) / (max - min) * this._length;
  }

  /* Add a dot marker at a value */
  addPoint(v, opts) {
    opts = opts || {};
    var px = this.valToX(v);
    var dot = new DotMobject({ x: px, y: 0, radius: opts.radius || 5, fill: opts.color || MX.C.INDIGO });
    this.el.appendChild(dot.el);
    this._children.push(dot);
    return dot;
  }
}

/* ── Axes (2D coordinate system) ── */
class AxesMobject extends Mobject {
  constructor(opts) {
    super();
    opts = opts || {};
    this._xRange = opts.xRange || [-5, 5];
    this._yRange = opts.yRange || [-5, 5];
    this._width  = opts.width  || 400;
    this._height = opts.height || 400;
    this._xStep  = opts.xStep  || 1;
    this._yStep  = opts.yStep  || 1;
    this._color  = opts.color  || "rgba(255,255,255,0.3)";
    this._axisColor = opts.axisColor || MX.C.WHITE;
    this._showGrid = opts.grid !== false;

    var xMin = this._xRange[0], xMax = this._xRange[1];
    var yMin = this._yRange[0], yMax = this._yRange[1];
    var w = this._width, h = this._height;
    var sx = w / (xMax - xMin), sy = h / (yMax - yMin);
    this._sx_coord = sx; this._sy_coord = sy;
    this._ox = -xMin * sx; this._oy = yMax * sy; // origin in pixel coords

    // Grid
    if (this._showGrid) {
      for (var xv = Math.ceil(xMin); xv <= xMax; xv += this._xStep) {
        if (xv === 0) continue;
        var px = (xv - xMin) * sx;
        this.el.appendChild(svgEl("line", {
          x1: px, y1: 0, x2: px, y2: h,
          stroke: "rgba(255,255,255,0.05)", "stroke-width": 1
        }));
      }
      for (var yv = Math.ceil(yMin); yv <= yMax; yv += this._yStep) {
        if (yv === 0) continue;
        var py = (yMax - yv) * sy;
        this.el.appendChild(svgEl("line", {
          x1: 0, y1: py, x2: w, y2: py,
          stroke: "rgba(255,255,255,0.05)", "stroke-width": 1
        }));
      }
    }

    // X axis
    var xAxisY = this._oy;
    this.el.appendChild(svgEl("line", {
      x1: 0, y1: xAxisY, x2: w, y2: xAxisY,
      stroke: this._axisColor, "stroke-width": 1.5
    }));
    // Y axis
    var yAxisX = this._ox;
    this.el.appendChild(svgEl("line", {
      x1: yAxisX, y1: 0, x2: yAxisX, y2: h,
      stroke: this._axisColor, "stroke-width": 1.5
    }));

    // Tick labels
    for (var xv = Math.ceil(xMin); xv <= xMax; xv += this._xStep) {
      if (xv === 0) continue;
      var px = (xv - xMin) * sx;
      var t = svgEl("text", {
        x: px, y: xAxisY + 16, "text-anchor": "middle",
        fill: "rgba(255,255,255,0.4)", "font-size": 10, "font-family": "system-ui"
      });
      t.textContent = xv;
      this.el.appendChild(t);
    }
    for (var yv = Math.ceil(yMin); yv <= yMax; yv += this._yStep) {
      if (yv === 0) continue;
      var py = (yMax - yv) * sy;
      var t = svgEl("text", {
        x: yAxisX - 10, y: py + 3, "text-anchor": "end",
        fill: "rgba(255,255,255,0.4)", "font-size": 10, "font-family": "system-ui"
      });
      t.textContent = yv;
      this.el.appendChild(t);
    }

    // Axis labels
    if (opts.xLabel) {
      var xl = svgEl("text", {
        x: w + 10, y: xAxisY + 4, "text-anchor": "start", "dominant-baseline": "central",
        fill: MX.C.WHITE, "font-size": 14, "font-family": "system-ui", "font-style": "italic"
      });
      xl.textContent = opts.xLabel;
      this.el.appendChild(xl);
    }
    if (opts.yLabel) {
      var yl = svgEl("text", {
        x: yAxisX - 4, y: -10, "text-anchor": "end",
        fill: MX.C.WHITE, "font-size": 14, "font-family": "system-ui", "font-style": "italic"
      });
      yl.textContent = opts.yLabel;
      this.el.appendChild(yl);
    }

    if (opts.x !== undefined || opts.y !== undefined) this.moveTo(opts.x || 0, opts.y || 0);
  }

  /* Convert data coords → pixel coords */
  c2p(xv, yv) {
    var xMin = this._xRange[0], yMax = this._yRange[1];
    return {
      x: (xv - xMin) * this._sx_coord,
      y: (yMax - yv) * this._sy_coord
    };
  }

  /* Convert pixel → data coords */
  p2c(px, py) {
    var xMin = this._xRange[0], yMax = this._yRange[1];
    return {
      x: px / this._sx_coord + xMin,

/* ── FunctionGraph (plots a function on Axes) ── */
class FunctionGraphMobject extends Mobject {
  constructor(fn, axes, opts) {
    super();
    opts = opts || {};

    this._axes = axes;
    this._color = opts.color || opts.stroke || MX.C.INDIGO;
    this._sw = opts.strokeWidth || 2.5;
    this._xRange = opts.xRange || axes._xRange;
    this._samples = opts.samples || 200;

    this._shape = svgEl("path", {
      d: this._computePath(),
      fill: "none",
      stroke: this._color,
      "stroke-width": this._sw,
      "stroke-linecap": "round",
      "stroke-linejoin": "round"

    this.el.appendChild(this._shape);
  }

  _computePath(endX) {
    var ax = this._axes;
    var xMin = this._xRange[0], xMax = endX !== undefined ? endX : this._xRange[1];
    var step = (xMax - xMin) / this._samples;
    var parts = [];
    for (var xv = xMin; xv <= xMax; xv += step) {
      var yv = this._fn(xv);
      if (!isFinite(yv)) continue;
      var p = ax.c2p(xv, yv);
      // Clip to axes bounds
      if (p.x < 0 || p.x > ax._width || p.y < 0 || p.y > ax._height) continue;
      parts.push((parts.length === 0 ? "M" : "L") + p.x.toFixed(2) + "," + p.y.toFixed(2));
    }
    return parts.join(" ");
  }

  /* Recompute for new function or parameter change */
  update(fn) {

    this._shape.setAttribute("d", this._computePath());

  get pathLength() { try { return this._shape.getTotalLength(); } catch(e) { return 0; } }

/* ── ParametricCurve ── */

  constructor(xFn, yFn, axes, opts) {

    this._yFn = yFn;
    this._axes = axes;
    this._tRange = opts.tRange || [0, 2 * Math.PI];
    this._samples = opts.samples || 200;

    var tMin = this._tRange[0], tMax = this._tRange[1];
    var step = (tMax - tMin) / this._samples;
    var parts = [];
    for (var t = tMin; t <= tMax; t += step) {
      var p = axes.c2p(xFn(t), yFn(t));
      parts.push((parts.length === 0 ? "M" : "L") + p.x.toFixed(2) + "," + p.y.toFixed(2));
    }

    this._shape = svgEl("path", {
      d: parts.join(" "),
      fill: opts.fill || "none",
      stroke: opts.stroke || opts.color || MX.C.INDIGO,
      "stroke-width": opts.strokeWidth || 2.5,

  }

}

  return animDef(function(tl, at) {
    tl.to({ a: startAngle }, {
      a: endAngle, duration: dur, ease: opts.ease || "none",
      onUpdate: function() {
        var a = this.targets()[0].a;
        mob.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
      }
    }, at);
  }, dur);
};

/* ─── Generic property animation ─── */

MX.animate = function(mob, props, opts) {
  opts = opts || {};
  var dur = props.duration || opts.duration || 0.8;
  return animDef(function(tl, at) {
    var tweenProps = Object.assign({}, props, { duration: dur, ease: opts.ease || "power2.inOut" });
    tl.to(mob, tweenProps, at);
  }, dur);
};

/* ─── Wait / Pause ─── */

MX.wait = function(dur) {
  dur = dur || 1;
  return animDef(function(tl, at) {
    tl.to({}, { duration: dur }, at);
  }, dur);
};


/* ═══════════════════════════════════════════════════════════════════
   Composition — sequence, parallel, stagger
   ═══════════════════════════════════════════════════════════════════ */

MX.sequence = function() {
  var anims = Array.isArray(arguments[0]) ? arguments[0] : Array.from(arguments);
  var total = anims.reduce(function(s, a) { return s + (a.duration || 0); }, 0);
  return animDef(function(tl, at) {
    var cursor = at;
    for (var i = 0; i < anims.length; i++) {
      anims[i].apply(tl, cursor);
      cursor += anims[i].duration || 0;
    }
  }, total);
};

MX.parallel = function() {
  var anims = Array.isArray(arguments[0]) ? arguments[0] : Array.from(arguments);
  var maxDur = Math.max.apply(null, anims.map(function(a) { return a.duration || 0; }));
  return animDef(function(tl, at) {
    for (var i = 0; i < anims.length; i++) {
      anims[i].apply(tl, at);
    }
  }, maxDur);
};

MX.stagger = function(items, animFn, opts) {
  opts = opts || {};
  var lag = opts.lag || 0.15;
  var total = items.length * lag + (opts.duration || 0.6);
  return animDef(function(tl, at) {
    for (var i = 0; i < items.length; i++) {
      var anim = animFn(items[i], opts);
      anim.apply(tl, at + i * lag);
    }
  }, total);
};


/* ═══════════════════════════════════════════════════════════════════
   Scene — container that manages Mobjects, plays animations, Camera
   ═══════════════════════════════════════════════════════════════════ */

class Scene {
  constructor(svgElement, opts) {
    opts = opts || {};
    this.svg = typeof svgElement === "string" ? document.getElementById(svgElement) : svgElement;
    this._objects = [];
    this._timelines = [];

    // Camera state
    this._camX = 0;
    this._camY = 0;
    this._camScale = 1;
    this._camRotation = 0;

    // Scene layer (all objects render into this group, camera transforms it)
    this._sceneGroup = MX._svgEl("g", { id: "mx-scene" });
    this.svg.appendChild(this._sceneGroup);

    // Background — v2: reads viewBox dynamically
    if (opts.background) {
      var vb = this._getViewBox();
      this._bg = MX._svgEl("rect", {
        x: vb[0], y: vb[1], width: vb[2], height: vb[3],
        fill: opts.background
      });
      this.svg.insertBefore(this._bg, this._sceneGroup);
    }
  }

  /* v2: read viewBox from SVG element dynamically */
  _getViewBox() {
    return (this.svg.getAttribute("viewBox") || "0 0 500 500").split(/[\s,]+/).map(Number);
  }

  /* ── Object management ── */
  add() {
    var args = Array.isArray(arguments[0]) ? arguments[0] : Array.from(arguments);
    for (var i = 0; i < args.length; i++) {
      var mob = args[i];
      if (this._objects.indexOf(mob) < 0) {
        this._objects.push(mob);
        mob.scene = this;
        this._sceneGroup.appendChild(mob.el);
      }
    }
    return this;
  }

  remove() {
    var args = Array.isArray(arguments[0]) ? arguments[0] : Array.from(arguments);
    for (var i = 0; i < args.length; i++) {
      var mob = args[i];
      var idx = this._objects.indexOf(mob);
      if (idx >= 0) {
        this._objects.splice(idx, 1);
        mob.scene = null;
        if (mob.el.parentNode) mob.el.parentNode.removeChild(mob.el);
      }
    }
    return this;
  }

  _unregister(mob) {
    var idx = this._objects.indexOf(mob);
    if (idx >= 0) { this._objects.splice(idx, 1); mob.scene = null; }
  }

  clear() {
    while (this._objects.length) this.remove(this._objects[0]);
    return this;
  }

  /* ── Play animations ──
     scene.play(anim1, anim2)  — plays in parallel
     Returns a Promise that resolves when done.  */
  play() {
    var anims = Array.from(arguments);
    var tl = gsap.timeline();
    // If multiple anims passed, play in parallel (all start at 0)
    for (var i = 0; i < anims.length; i++) {
      if (anims[i] && anims[i].apply) {
        anims[i].apply(tl, 0);
      }
    }
    this._timelines.push(tl);
    return new Promise(function(resolve) {
      tl.eventCallback("onComplete", resolve);
    });
  }

  /* Play in sequence */
  playSequence() {
    return this.play(MX.sequence(Array.from(arguments)));
  }

  /* Shorthand: add + animate in one call */
  addWithAnim(mob, animFn, opts) {
    this.add(mob);
    return this.play(animFn(mob, opts));
  }

  /* ── Camera ── */

  get camera() {
    var self = this;
    return {
      /* Pan to absolute position */
      panTo: function(opts) {
        opts = opts || {};
        var dur = opts.duration || 0.8;
        return animDef(function(tl, at) {
          var tx = -(opts.x || 0);
          var ty = -(opts.y || 0);
          tl.to(self, {
            _camX: tx, _camY: ty,
            duration: dur, ease: opts.ease || "power2.inOut",
            onUpdate: function() { self._syncCamera(); }
          }, at);
        }, dur);
      },

      /* Zoom to a scale level, optionally centering on a point or mobject */
      zoomTo: function(opts) {
        opts = opts || {};
        var dur = opts.duration || 0.8;
        var s = opts.scale || 2;
        return animDef(function(tl, at) {
          var tx = self._camX, ty = self._camY;
          // Center on a mobject if provided
          if (opts.target) {
            var c = opts.target.getCenter();
            var vb = self._getViewBox();
            tx = -(c.x * s - vb[2] / 2);
            ty = -(c.y * s - vb[3] / 2);
          } else if (opts.x !== undefined) {
            var vb = self._getViewBox();
            tx = -(opts.x * s - vb[2] / 2);
            ty = -(opts.y * s - vb[3] / 2);
          }
          tl.to(self, {
            _camScale: s, _camX: tx, _camY: ty,
            duration: dur, ease: opts.ease || "power2.inOut",
            onUpdate: function() { self._syncCamera(); }
          }, at);
        }, dur);
      },

      /* Reset camera to default */
      reset: function(opts) {
        opts = opts || {};
        var dur = opts.duration || 0.8;
        return animDef(function(tl, at) {
          tl.to(self, {
            _camX: 0, _camY: 0, _camScale: 1, _camRotation: 0,
            duration: dur, ease: opts.ease || "power2.inOut",
            onUpdate: function() { self._syncCamera(); }
          }, at);
        }, dur);
      },

      /* Focus on a mobject (zoom + pan to center it) */
      focusOn: function(mob, opts) {
        opts = opts || {};
        opts.target = mob;
        opts.scale = opts.scale || 2;
        return this.zoomTo(opts);
      },

      /* Follow a mobject continuously */
      follow: function(mob, opts) {
        opts = opts || {};
        var dur = opts.duration || 0;
        return animDef(function(tl, at) {
          tl.to({}, {
            duration: dur || 2,
            onUpdate: function() {
              var c = mob.getCenter();
              var vb = self._getViewBox();
              self._camX = -(c.x * self._camScale - vb[2] / 2);
              self._camY = -(c.y * self._camScale - vb[3] / 2);
              self._syncCamera();
            }
          }, at);
        }, dur || 2);
      }
    };
  }

  _syncCamera() {
    var t = "translate(" + this._camX + "," + this._camY + ") " +
            "scale(" + this._camScale + ") " +
            "rotate(" + this._camRotation + ")";
    this._sceneGroup.setAttribute("transform", t);
  }

  /* ── Utility ── */

  /* Get center of viewport in scene coordinates */
  getViewCenter() {
    var vb = this._getViewBox();
    return { x: vb[2] / 2, y: vb[3] / 2 };
  }

  /* Kill all active timelines */
  killAll() {
    this._timelines.forEach(function(tl) { tl.kill(); });
    this._timelines = [];
  }
}

MX.Scene = Scene;
MX.scene = function(svgEl, opts) { return new Scene(svgEl, opts); };


/* ═══════════════════════════════════════════════════════════════════
   Viz Plugin Adapter — makes MX scenes work as EXPLAINER_VIZ plugins
   so lessons can use the new Mobject system within the existing engine.

   Usage in viz file:
     window.EXPLAINER_VIZ = MX.vizPlugin(function(scene, config) {
       // build viz using scene.add(), MX.circle(), etc.
       return {
         drawCircle: function(tl, params, t) { ... },
         ...
       };
     });
   ═══════════════════════════════════════════════════════════════════ */
MX.vizPlugin = function(setupFn) {
  var scene = null;
  var methods = null;

  return {
    name: "mx-viz-plugin",
    init: function(svgElement, config) {
      scene = new Scene(svgElement, { background: config.background || MX.C.BG });
      methods = setupFn(scene, config) || {};
    },
    timelineAction: function(tl, method, params, t) {
      if (methods && methods[method]) {
        var result = methods[method](tl, params, t);
        // If the method returns an AnimDef, apply it
        if (result && result.apply) result.apply(tl, t);
      }
    },
    drawInteractive: function(n) {
      if (methods && methods.drawInteractive) methods.drawInteractive(n);
    },
    getScene: function() { return scene; },
    getMethods: function() { return methods; }
  };
};

/* ═══════════════════════════════════════════════════════════════════

   - vizConfig supports viewBox: "0 0 800 400" for custom SVG sizes
   - Educators have full freedom over SVG dimensions

   Usage:
     MX.lesson("Nested Circles", function(L) {
       L.source("AMC 10A 2023 #15");
       L.vizConfig({ viewBox: "0 0 800 400" }); // custom SVG size
       L.problem("Find $x$ given $x^2 + 3 = 7$.");

       L.act("Introduction", function(A) {
         A.say("Welcome to this lesson.")
          .title("AMC 2023", "Nested Circles");
         A.say("Let's start by visualizing.")
          .do("showGrid");
       });

       L.marker("derivation");

       L.act("Ring Area", function(A) {
         A.say("The k-th green ring has area...")
          .show("$A_k = \\pi(4k - 1)$")
          .do("highlightRing", { k: 2 });
       });

       L.ask({
         question: "Area of a circle with radius $r$?",
         options: ["$2\\pi r$", "$\\pi r^2$"],
         correct: 1,
         explain: { correct: "Exactly!", 0: "That's circumference." },
         wrongPath: function(B) {
           B.act("Recap", function(A) {
             A.say("Area is pi r squared.").show("$A = \\pi r^2$");
           });

(function() {
"use strict";

var MX = window.MX;
if (!MX) throw new Error("explainer-mobject.js must be loaded before explainer-dsl.js");

/* ── Internal ID generators ── */
var _actN = 0, _beatN = 0, _msN = 0;
function actId(prefix) { return (prefix || "act") + "-" + (++_actN); }
function beatId() { return "b" + (++_beatN); }
function msId() { return "ms" + (++_msN); }


/* ═══════════════════════════════════════════════════════════════════
   BeatRef — returned by A.say(), supports chaining
   ═══════════════════════════════════════════════════════════════════ */
class BeatRef {
  constructor(actBuilder, idx) {
    this._act = actBuilder;
    this._idx = idx;
  }

  _beat() { return this._act._beats[this._idx]; }

  /* Attach a notebook card. Content can be:
     - string: rendered as rich text (KaTeX + bold)
     - {type: "derivation", title, steps: [...]}
     - {type: "bar-chart", title, bars: [...], ...}
     - {type: "figure", svg, caption}
     - {type: "recap", title, content: [...]}
     - etc.
     A plain string becomes {type: "text", content: str} */
  show(content, opts) {
    var card;
    if (typeof content === "string") {
      card = { type: "text", content: content };
    } else if (Array.isArray(content)) {
      // Array of strings/objects → recap-style content list
      card = { type: "recap", content: content.map(function(item) {
        return typeof item === "string" ? { type: "text", value: item } : item;
      })};
    } else {
      card = content;
    }
    if (opts) {
      for (var k in opts) card[k] = opts[k];
    }
    this._beat().card = card;
    return this;
  }

  /* Shorthand: title card */
  title(heading, subheading) {
    this._beat().card = { type: "title", heading: heading, subheading: subheading || "" };
    return this;
  }

  /* Explicit typed card */
  card(type, data) {
    data = data || {};
    data.type = type;
    this._beat().card = data;
    return this;
  }

  /* Append a viz action.
     offset: GSAP-style position string like "+1.0" for sub-beat delay,
             or a number (seconds after beat start). Default: 0 */
  do(method, params, offset) {
    this._beat().vizActions.push({
      method: method,
      params: params || {},
      offset: offset || 0
    });
    return this;
  }

  /* Set the viz panel mode for this beat's duration */
  vizPanel(mode) {
    this._beat().vizPanel = mode;
    this._beat()._explicitVizPanel = mode;
    return this;
  }

  /* Override estimated duration for this beat (seconds) */
  duration(d) {
    this._beat().duration = d;
    return this;
  }

  /* When this beat ends, migrate the current viz panel content
     inline into the notebook (zoom-out animation).
     Options: "figure" | "chart" | "svg" | true (auto-detect) */
  inline(opts) {
    this._beat().inlineViz = opts || true;
    return this;
  }
}


/* ═══════════════════════════════════════════════════════════════════
   ActBuilder — passed to L.act() callback
   ═══════════════════════════════════════════════════════════════════ */
class ActBuilder {
  constructor(id, title) {
    this._id = id;
    this._title = title;
    this._beats = [];
    this._vizPanel = null; // default viz panel mode for all beats in this act
  }

  /* Create a new beat with narration text. Returns BeatRef for chaining. */
  say(text) {
    var beat = {
      id: beatId(),
      say: text,
      card: null,
      vizActions: [],
      vizPanel: null,
      duration: null
    };
    this._beats.push(beat);
    return new BeatRef(this, this._beats.length - 1);
  }

  /* Shorthand: create a silent beat with only a title card (no narration).
     Accepts A.title(heading, subheading) or A.title(heading, {sub: "..."}) */
  title(heading, optsOrSub) {
    var sub = typeof optsOrSub === "string" ? optsOrSub
            : (optsOrSub && optsOrSub.sub) ? optsOrSub.sub : "";
    var beat = {
      id: beatId(),
      say: null,
      card: { type: "title", heading: heading, subheading: sub },
      vizActions: [],
      vizPanel: null,
      duration: null
    };
    this._beats.push(beat);
    return new BeatRef(this, this._beats.length - 1);
  }

  /* Set default viz panel mode for all beats in this act */
  vizPanel(mode) {
    this._vizPanel = mode;
    return this;
  }
}


/* ═══════════════════════════════════════════════════════════════════
   LessonBuilder — main builder, passed to MX.lesson() callback
   ═══════════════════════════════════════════════════════════════════ */
class LessonBuilder {
  constructor(title) {
    this._title = title;
    this._source = "";
    this._meta = {};
    this._problem = null;
    this._vizConfig = null;
    this._acts = [];
    this._milestones = [];
    this._branchActs = {};
    this._mainPath = [];
  }

  /* ── Metadata ── */
  source(s) { this._source = s; return this; }
  meta(obj) { Object.assign(this._meta, obj); return this; }

  /* ── Problem statement (pinned bar) ── */
  problem(text, opts) {
    opts = opts || {};
    this._problem = { text: text, highlight: opts.highlight || "" };
    return this;
  }

  /* ── Viz plugin config ── */
  vizConfig(cfg) { this._vizConfig = cfg; return this; }
  viz(cfg) { this._vizConfig = cfg; return this; }

  /* ── Create an act ── */
  act(title, fn) {
    var id = actId();
    var builder = new ActBuilder(id, title);
    fn(builder);

    // Apply default vizPanel to beats that don't have one
    if (builder._vizPanel) {
      builder._beats.forEach(function(beat) {
        if (!beat.vizPanel) beat.vizPanel = builder._vizPanel;
      });
    }

    var actDescriptor = {
      id: id,
      title: title,
      beats: builder._beats,
      duration: null, // filled by audio pipeline or estimated at runtime
      vizPanel: builder._vizPanel
    };

    this._acts.push(actDescriptor);
    this._mainPath.push(id);
    return this;
  }

  /* ── Passive milestone (section marker) ── */
  marker(label) {
    if (this._acts.length === 0) return this;
    var lastActId = this._acts[this._acts.length - 1].id;
    this._milestones.push({
      id: msId(),
      type: "marker",
      afterAct: lastActId,
      label: label
    });
    return this;
  }

  /* ── Interactive gate milestone ── */
  ask(opts) {
    if (this._acts.length === 0) return this;
    var lastActId = this._acts[this._acts.length - 1].id;

    var milestone = {
      id: msId(),
      type: "gate",
      afterAct: lastActId,
      label: opts.label || null,
      gate: {
        type: opts.type || "quiz",
        question: opts.question,
        options: opts.options,
        correct: opts.correct,
        explanations: opts.explain || opts.explanations || {},
        // fill-in specific
        prompt: opts.prompt,
        blank: opts.blank,
        hint: opts.hint,
        successMessage: opts.successMessage,
        // proof-builder specific
        instruction: opts.instruction,
        availablePieces: opts.availablePieces,
        correctOrder: opts.correctOrder,
        slots: opts.slots,
        // interactive gate specific
        title: opts.title,
        slider: opts.slider,
        compute: opts.compute,
        displays: opts.displays,
        challenge: opts.challenge
      },
      wrongPath: null
    };

    // Process wrong path branch
    if (opts.wrongPath) {
      var sub = new LessonBuilder("");
      opts.wrongPath(sub);
      // Merge sub's acts into branchActs
      var branchIds = [];
      sub._acts.forEach(function(branchAct) {
        branchAct._isBranch = true;
        branchAct.rejoinsAfter = milestone.id;
        this._branchActs[branchAct.id] = branchAct;
        branchIds.push(branchAct.id);
      }.bind(this));
      milestone.wrongPath = branchIds;
    }

    this._milestones.push(milestone);
    return this;
  }

  /* ── Fill-in gate shorthand ── */
  askFillIn(opts) {
    opts.type = "fill-in";
    return this.ask(opts);
  }

  /* ── Proof-builder gate shorthand ── */
  askProof(opts) {
    opts.type = "proof-builder";
    return this.ask(opts);
  }


  /* ═══════════════════════════════════════════════════════════════
     Build — compile to window.LESSON runtime format
     ═══════════════════════════════════════════════════════════════ */
  build() {
    // Estimate act durations from word count (~2.5 words/sec = 150 WPM)
    function estimateDuration(acts) {
      var WPS = 2.5;
      (Array.isArray(acts) ? acts : Object.values(acts)).forEach(function(act) {
        if (act.duration) return;
        var totalWords = 0;
        act.beats.forEach(function(beat) {
          if (beat.say) {
            totalWords += beat.say.split(/\s+/).length;
          }
        });
        act.duration = Math.max(2, Math.ceil(totalWords / WPS));
      });
    }

    estimateDuration(this._acts);
    estimateDuration(this._branchActs);

    var lesson = {
      meta: Object.assign({
        id: this._title.toLowerCase().replace(/[^a-z0-9]+/g, "_"),
        title: this._title,
        source: this._source
      }, this._meta),
      problem: this._problem,
      viz: this._vizConfig ? (this._vizConfig.plugin ? this._vizConfig : { plugin: "mx", config: this._vizConfig }) : null,
      acts: this._acts,
      milestones: this._milestones,
      branchActs: this._branchActs,
      mainPath: this._mainPath
    };

    window.LESSON = lesson;
    return lesson;
  }
}


/* ═══════════════════════════════════════════════════════════════════

        var graph = MX.plot(fn, ax, {
          color: params.color || MX.C.INDIGO,
          xRange: params.xRange || opts.xRange,
          strokeWidth: params.strokeWidth || 2.5
        });
        scene.add(graph);
        graph.moveTo(ax.x, ax.y);
        plots[params.id || ("fn" + Object.keys(plots).length)] = graph;
        MX.write(graph, { duration: params.duration || 1.5 }).apply(tl, t);
      },
      addDot: function(tl, params, t) {
        var p = ax.c2p(params.x, params.y);
        var dot = MX.dot({
          x: ax.x + p.x, y: ax.y + p.y,
          radius: params.radius || 5,
          fill: params.color || MX.C.AMBER
        });
        scene.add(dot);
        dot.opacity = 0;
        MX.growFromCenter(dot, { duration: 0.4 }).apply(tl, t);
      },
      addLabel: function(tl, params, t) {
        var p = ax.c2p(params.x, params.y);
        var label = MX.text(params.text, {
          x: ax.x + p.x + (params.offsetX || 0),

        });
        scene.add(label);

        MX.fadeIn(label, { duration: 0.4 }).apply(tl, t);
      }
    };
  });
};

/* Unit circle preset */
MX.presets.unitCircle = function(opts) {
  return MX.vizPlugin(function(scene, config) {
    var cx = 250, cy = 250, radius = 180;
    var ax = MX.axes({
      xRange: [-1.5, 1.5], yRange: [-1.5, 1.5],
      width: 360, height: 360, x: cx - 180, y: cy - 180,
      grid: false
    });
    var circle = MX.circle({ radius: radius, x: cx, y: cy, stroke: MX.C.INDIGO });
    scene.add(ax, circle);
    ax.opacity = 0; circle.opacity = 0;

    return {
      show: function(tl, params, t) {
        MX.fadeIn(ax, { duration: 0.5 }).apply(tl, t);
        MX.drawBorder(circle, { duration: 1.2 }).apply(tl, t + 0.3);
      },
      markAngle: function(tl, params, t) {
        var angle = (params.angle || 0) * Math.PI / 180;
        var px = cx + radius * Math.cos(angle);
        var py = cy - radius * Math.sin(angle);
        var line = MX.line({ from: [cx, cy], to: [px, py], stroke: MX.C.AMBER, strokeWidth: 1.5 });
        var dot = MX.dot({ x: px, y: py, radius: 4, fill: MX.C.AMBER });
        scene.add(line, dot);
        line.opacity = 0; dot.opacity = 0;
        MX.fadeIn(line, { duration: 0.3 }).apply(tl, t);
        MX.growFromCenter(dot, { duration: 0.3 }).apply(tl, t + 0.2);
      }
    };
  });
};


})();

window.EXPLAINER_VIZ = (function() {
  var svg, config;

  var RING_COLORS = [

    "rgba(139,92,246,0.50)",
    "rgba(79,70,229,0.55)",
    "rgba(124,58,237,0.50)"
  ];

  function svgEl(tag, attrs, parent) {
    var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (parent) parent.appendChild(e);
    return e;
  }

  return {
    name: "nested_circles_viz",

      /* Circles and labels */
      for (var r = 1; r <= config.circleCount; r++) {
        /* Strokes */
        var circ = 2 * Math.PI * r * S;
        strokes[r] = svgEl("circle", {
          cx: CX, cy: BY - r * S, r: r * S,
          fill: "none", stroke: config.strokeColor, "stroke-width": 1.5,

          tl.to(fills[r], { opacity: 1, duration: 0.5 }, t + 0.9);

          tl.to(fills[r2], { attr: { fill: "rgba(245,158,11,0.65)" }, duration: 0.4 }, t);
          break;

        case "fadeInFormula":

        case "drawGraph":
          /* Placeholder for graph drawing */
          break;

          /* Placeholder for intersection highlight */
          break;
      }
    },

    executeAction: function(actionDef, tl, t) {
      this.timelineAction(tl, actionDef.method, actionDef, t);
    }
  };
})();
