/* ═══════════════════════════════════════════════════════════════════
   Graph Card + Code Runner Card — Stage 1 expansion

   Registers two new card factories into CardSystem:
     "graph"       — JSXGraph interactive math (function plots, draggable points,
                     geometric constructions). Lazy-loads JSXGraph v1.9.2.
     "code-runner" — p5.js sandbox with live textarea editor. Runs in a
                     sandboxed iframe (allow-scripts, no parent DOM access).

   Load order: must come after engine/cards.js (needs EX.CardSystem)
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var K  = EX.K;

/* ─────────────────────────── lazy loaders ────────────────────────────── */

var _jsxLoaded  = false;
var _jsxPending = [];

function ensureJSX(cb) {
  if (typeof JXG !== "undefined") { cb(); return; }
  _jsxPending.push(cb);
  if (_jsxLoaded) return;
  _jsxLoaded = true;
  var link = document.createElement("link");
  link.rel  = "stylesheet";
  link.href = "https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css";
  document.head.appendChild(link);
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js";
  s.onload = function() {
    var q = _jsxPending.splice(0);
    q.forEach(function(fn) { fn(); });
  };
  document.head.appendChild(s);
}

/* ──────────────────────────── "graph" card ───────────────────────────── */

EX.CardSystem.factories["graph"] = function(id, data) {
  var el = document.createElement("div");
  el.className = "beat-card beat-card--graph";
  el.dataset.beatId = id;

  if (data.title) {
    var t = document.createElement("div");
    t.className = "plot-title";
    t.textContent = data.title;
    el.appendChild(t);
  }

  var w = data.width  || 360;
  var h = data.height || 220;

  // JSXGraph requires a unique DOM id — id can contain chars that break CSS,
  // so we sanitise it and add a timestamp to guarantee uniqueness.
  var boardId = "jsx-" + id.replace(/[^a-z0-9]/gi, "-") + "-" + Date.now();

  var boardDiv = document.createElement("div");
  boardDiv.id = boardId;
  boardDiv.style.cssText = "width:" + w + "px;height:" + h + "px;" +
    "border-radius:8px;overflow:hidden;background:#0f0e17;" +
    "border:1px solid rgba(99,102,241,0.25)";
  el.appendChild(boardDiv);

  ensureJSX(function() {
    var xR = data.xRange || [-5, 5];
    var yR = data.yRange || [-4, 4];

    var board = JXG.JSXGraph.initBoard(boardId, {
      boundingbox: [xR[0], yR[1], xR[1], yR[0]],
      axis: true,
      showCopyright: false,
      showNavigation: data.interactive !== false,
      pan:  { enabled: data.interactive !== false, needShift: false },
      zoom: { enabled: data.interactive !== false, wheel: true },
      defaultAxes: {
        x: {
          strokeColor: "rgba(224,231,255,0.25)",
          ticks: {
            strokeColor: "rgba(224,231,255,0.15)",
            label: { strokeColor: "rgba(224,231,255,0.55)", fontSize: 11 }
          }
        },
        y: {
          strokeColor: "rgba(224,231,255,0.25)",
          ticks: {
            strokeColor: "rgba(224,231,255,0.15)",
            label: { strokeColor: "rgba(224,231,255,0.55)", fontSize: 11 }
          }
        }
      }
    });

    // Background colour for the board (JSXGraph sets it on the SVG container)
    if (board.renderer && board.renderer.svgRoot) {
      board.renderer.svgRoot.style.background = "#0f0e17";
    }

    // Function graphs
    (data.functions || []).forEach(function(fnDef) {
      try {
        var fn = new Function("x", "return (" + fnDef.fn + ");");
        board.create("functiongraph", [fn, xR[0], xR[1]], {
          strokeColor: fnDef.color || "#818cf8",
          strokeWidth: 2.5,
          name: fnDef.name || ""
        });
      } catch (e) {
        console.warn("[graph-card] Bad function expr:", fnDef.fn, e);
      }
    });

    // Points
    (data.points || []).forEach(function(pt) {
      board.create("point", [pt.x, pt.y], {
        name:        pt.label || "",
        fixed:       !pt.draggable,
        size:        4,
        fillColor:   pt.color || "#f59e0b",
        strokeColor: "none",
        label: {
          strokeColor: "#e0e7ff",
          fontSize: 13,
          offset: [6, 6]
        }
      });
    });

    // Geometry objects (lines, circles)
    (data.geometryObjects || []).forEach(function(obj) {
      try {
        if (obj.type === "line") {
          board.create("line", [obj.p1, obj.p2], {
            strokeColor: obj.color || "#818cf8",
            strokeWidth: obj.strokeWidth || 1.5
          });
        } else if (obj.type === "circle") {
          board.create("circle", [obj.center, obj.radius], {
            strokeColor: obj.color || "#818cf8",
            fillColor: "none",
            strokeWidth: obj.strokeWidth || 1.5
          });
        } else if (obj.type === "segment") {
          board.create("segment", [obj.p1, obj.p2], {
            strokeColor: obj.color || "#818cf8",
            strokeWidth: obj.strokeWidth || 1.5
          });
        }
      } catch (e) {
        console.warn("[graph-card] Bad geometry object:", obj, e);
      }
    });
  });

  if (data.note) {
    var note = document.createElement("div");
    note.className = "plot-note";
    K.mixed(data.note, note);
    el.appendChild(note);
  }

  return el;
};

/* ─────────────────────────── "code-runner" card ─────────────────────── */

EX.CardSystem.factories["code-runner"] = function(id, data) {
  var el = document.createElement("div");
  el.className = "beat-card beat-card--code-runner";
  el.dataset.beatId = id;

  if (data.title) {
    var t = document.createElement("div");
    t.className = "plot-title";
    t.textContent = data.title;
    el.appendChild(t);
  }

  var canvasH = data.canvasHeight || (data.height ? data.height - 60 : 260);

  // ── Editor ──────────────────────────────────────────────────────────
  var defaultCode = data.initialCode ||
    "function setup() {\n  createCanvas(340, " + canvasH + ");\n  background(15, 14, 23);\n}\n\nfunction draw() {\n  // your code here\n}";

  var textarea = document.createElement("textarea");
  textarea.className = "code-runner-editor";
  textarea.value = defaultCode;
  textarea.rows  = 8;
  el.appendChild(textarea);

  // ── Toolbar ─────────────────────────────────────────────────────────
  var toolbar = document.createElement("div");
  toolbar.style.cssText = "display:flex;align-items:center;gap:8px;margin:6px 0 4px";

  var runBtn = document.createElement("button");
  runBtn.className = "code-runner-run-btn";
  runBtn.textContent = data.runLabel || "Run";
  toolbar.appendChild(runBtn);

  var errSpan = document.createElement("span");
  errSpan.style.cssText = "font-size:11px;color:#f87171;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis";
  toolbar.appendChild(errSpan);

  el.appendChild(toolbar);

  // ── Canvas wrap ─────────────────────────────────────────────────────
  var canvasWrap = document.createElement("div");
  canvasWrap.style.cssText = "border-radius:6px;overflow:hidden;background:#0f0e17;" +
    "border:1px solid rgba(99,102,241,0.25)";
  el.appendChild(canvasWrap);

  // ── iframe builder ──────────────────────────────────────────────────
  function buildHTML(code) {
    // Escape <\/script> tags inside user code so they don't close our script block
    var safeCode = code.replace(/<\/script/gi, "<\\/script");
    return [
      '<!DOCTYPE html><html><head>',
      '<meta charset="UTF-8">',
      '<style>',
      'html,body{margin:0;padding:0;overflow:hidden;background:#0f0e17}',
      'canvas{display:block}',
      '</style>',
      '<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"><\/script>',
      '</head><body>',
      '<script>\n' + safeCode + '\n<\/script>',
      '</body></html>'
    ].join("");
  }

  function runSketch() {
    errSpan.textContent = "";
    canvasWrap.innerHTML = "";
    var iframe = document.createElement("iframe");
    // allow-scripts: execute JS. No allow-same-origin → opaque origin,
    // so iframe cannot reach window.parent or lesson DOM.
    iframe.setAttribute("sandbox", "allow-scripts");
    iframe.style.cssText = "width:100%;height:" + canvasH + "px;border:none;border-radius:6px;display:block";
    try {
      iframe.srcdoc = buildHTML(textarea.value);
    } catch (e) {
      errSpan.textContent = "Error: " + e.message;
      return;
    }
    canvasWrap.appendChild(iframe);
  }

  runBtn.addEventListener("click", runSketch);

  if (data.autoRun !== false) {
    // Delay so the card is in the DOM before we create the iframe
    setTimeout(runSketch, 120);
  }

  if (data.note) {
    var note = document.createElement("div");
    note.className = "plot-note";
    K.mixed(data.note, note);
    el.appendChild(note);
  }

  return el;
};

})();

/* ═══════════════════════════════════════════════════════════════════
   VizPanel3D — Three.js 3D visualization mode (Stage 1 expansion)

   Creates a <canvas id="viz-3d"> inside #viz-wrap and manages the
   Three.js lifecycle. Activated when VizPanel.setMode("3d") is called.

   Plugin interface: lesson authors provide window.EXPLAINER_VIZ_3D with:
     init(canvasEl, vizConfig, THREE, renderer)  — build scene
     timelineAction(tl, method, params, t)        — GSAP-driven tweens
     dispose()                                    — cleanup (optional)
     _renderFn                                    — set by init(); called each frame

   Load order: after engine/viz-panel.js, before engine/init.js
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX       = window.EX;
var EventBus = EX.EventBus;
var $        = EX.$;

var VizPanel3D = {
  _canvas:   null,
  _renderer: null,
  _rafId:    null,
  _active:   false,
  _ready:    false,   // Three.js loaded and scene initialised

  /* Called from init.js after VizPanel.init() — safe to access #viz-wrap */
  init: function() {
    if (!window.EXPLAINER_VIZ_3D) return;  // skip if no 3D plugin

    var self = this;

    // Create canvas, absolutely positioned over the SVG
    var canvas = document.createElement("canvas");
    canvas.id = "viz-3d";
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;" +
      "display:none;z-index:3;border-radius:0";
    $("viz-wrap").appendChild(canvas);
    this._canvas = canvas;

    // Show/hide on mode changes (viz-panel.js hides the SVG, we show the canvas)
    EventBus.on("viz:setMode", function(mode) {
      if (mode === "3d") {
        canvas.style.display = "block";
        self._active = true;
        if (!self._ready) self._loadAndInit();
      } else {
        canvas.style.display = "none";
        self._active = false;
      }
    });

    // Dispose on reset
    EventBus.on("viz:reset", function() {
      canvas.style.display = "none";
      self._active = false;
      self._disposeScene();
    });

    // Route viz:runActions to EXPLAINER_VIZ_3D when active
    EventBus.on("viz:runActions", function(data) {
      if (!self._active || !self._ready) return;
      var V3D = window.EXPLAINER_VIZ_3D;
      if (!V3D || !V3D.timelineAction) return;

      var actions = data.actions;
      if (data.instant) {
        var tl = gsap.timeline();
        actions.forEach(function(a) {
          var offset = a.offset || a.delay || 0;
          if (typeof offset === "string" && offset.charAt(0) === "+") {
            offset = parseFloat(offset.substring(1));
          }
          V3D.timelineAction(tl, a.method, a.params || {}, offset);
        });
        tl.progress(1);
      } else {
        var tl2 = data.timeline;
        var base = data.time || 0;
        actions.forEach(function(a) {
          var offset = a.offset || a.delay || 0;
          if (typeof offset === "string" && offset.charAt(0) === "+") {
            offset = parseFloat(offset.substring(1));
          }
          V3D.timelineAction(tl2, a.method, a.params || {}, base + offset);
        });
      }
    });
  },

  /* Dynamically import Three.js (ES module) then initialise the plugin */
  _loadAndInit: function() {
    var self = this;
    var V3D  = window.EXPLAINER_VIZ_3D;
    if (!V3D) return;

    import("https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js")
      .then(function(THREE) {
        var canvas = self._canvas;
        var w = canvas.clientWidth  || 400;
        var h = canvas.clientHeight || 400;

        var renderer = new THREE.WebGLRenderer({
          canvas: canvas,
          antialias: true,
          alpha: false
        });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0f0e17, 1);
        self._renderer = renderer;

        // Resize renderer when viz panel resizes
        var ro = null;
        if (window.ResizeObserver) {
          ro = new ResizeObserver(function() {
            var nw = canvas.clientWidth  || 400;
            var nh = canvas.clientHeight || 400;
            renderer.setSize(nw, nh);
          });
          ro.observe($("viz-wrap"));
        }

        // Hand THREE + renderer to the plugin
        var vizConfig = window._graph ? window._graph.vizConfig : {};
        V3D.init(canvas, vizConfig, THREE, renderer);

        self._ready = true;
        self._startLoop(renderer, V3D);
      })
      .catch(function(e) {
        console.error("[VizPanel3D] Failed to load Three.js:", e);
      });
  },

  _startLoop: function(renderer, V3D) {
    var self = this;
    function loop() {
      self._rafId = requestAnimationFrame(loop);
      if (V3D._renderFn && self._active) {
        V3D._renderFn(renderer);
      }
    }
    loop();
  },

  _disposeScene: function() {
    if (this._rafId) {
      cancelAnimationFrame(this._rafId);
      this._rafId = null;
    }
    var V3D = window.EXPLAINER_VIZ_3D;
    if (V3D && V3D.dispose) V3D.dispose();
    if (this._renderer) {
      this._renderer.dispose();
      this._renderer = null;
    }
    this._ready = false;
  }
};

EX.VizPanel3D = VizPanel3D;

})();

/* ═══════════════════════════════════════════════════════════════════
   Gate System v2 — Interactive gate factories (quiz, fill-in, proof-builder)

   Fixes from v1:
   - Fill-in: after 3 wrong attempts, calls onResolve(false) → triggers wrongPath
   - Proof-builder: consistent with fill-in — wrong answers trigger wrongPath
   - All gate types: wrong answer always → wrongPath branch
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var K = EX.K;
var FillIn = EX.FillIn;
var $ = EX.$;

var GateSystem = {
  gateFactories: {},

  init: function() {
    var self = this;
    EventBus.on("gate:enter", function(data) {
      self.renderGate(data.milestone);
    });
    EventBus.on("gate:renderPassed", function(data) {
      self.renderPassedGate(data.milestone);
    });
  },

  renderGate: function(milestone) {
    var type = milestone.gate.type;
    var factory = this.gateFactories[type];
    if (!factory) {
      console.warn("[GateSystem] No factory for gate type:", type);
      EventBus.emit("gate:resolve", { correct: true, milestone: milestone });
      return null;
    }

    var onResolve = function(correct) {
      EventBus.emit("gate:resolve", { correct: correct, milestone: milestone });
    };

    var el = factory(milestone.id, milestone.gate, onResolve);
    if (el) {
      EventBus.emit("notebook:appendMilestone", { milestoneId: milestone.id, element: el });
      EventBus.emit("scroll:observe", { element: el });
      EX.Notebook.activate(milestone.id);
      EX.Notebook.scrollTo(milestone.id);
    }
    return el;
  },

  renderPassedGate: function(milestone) {
    var el = document.createElement("div");
    el.className = "beat-card beat-card--quiz past entered";
    var q = document.createElement("div"); q.className = "quiz-question";
    var qText = milestone.gate.question || milestone.gate.prompt || milestone.gate.instruction || "";
    K.mixed(qText, q);
    q.style.opacity = "0.5";
    el.appendChild(q);
    EventBus.emit("notebook:appendMilestone", { milestoneId: milestone.id + "-passed", element: el });
  }
};


/* ── Gate: quiz ── */
GateSystem.gateFactories.quiz = function(id, data, onResolve) {
  var el = document.createElement("div");
  el.className = "beat-card beat-card--quiz slide-card--quiz";
  var q = document.createElement("div"); q.className = "quiz-question";
  K.mixed(data.question, q);
  el.appendChild(q);
  var opts = document.createElement("div"); opts.className = "quiz-options";
  var letters = "ABCDEFGH";
  data.options.forEach(function(opt, i) {
    var btn = document.createElement("button"); btn.className = "quiz-opt"; btn.dataset.idx = i;
    var letter = document.createElement("span"); letter.className = "opt-letter"; letter.textContent = letters[i];
    btn.appendChild(letter);
    var text = document.createElement("span");
    K.mixed(opt, text);
    btn.appendChild(text);
    opts.appendChild(btn);
  });
  el.appendChild(opts);
  var explain = document.createElement("div"); explain.className = "quiz-explain";
  el.appendChild(explain);

  var resolved = false;
  var btns = el.querySelectorAll(".quiz-opt");
  function resolve(picked) {
    if (resolved) return;
    resolved = true;
    var ci = data.correct !== undefined ? data.correct : data.correctIndex;
    btns.forEach(function(b, i) {
      b.style.pointerEvents = "none";
      if (i === ci) b.classList.add("correct");
      else if (i === picked) b.classList.add("wrong-pick");
      else b.classList.add("dimmed");
    });
    var key = picked === ci ? "correct" : String(picked);
    var explanations = data.explanations || data.explain || {};
    explain.textContent = explanations[key] || explanations.correct || "";
    explain.classList.add("visible");
    var correct = picked === ci;
    setTimeout(function() { onResolve(correct); }, correct ? 2000 : 3000);
  }
  btns.forEach(function(btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      resolve(parseInt(btn.dataset.idx));
    });
  });
  return el;
};

/* ── Gate: fill-in ── (v2 fix: onResolve(false) after 3 wrong attempts) */
GateSystem.gateFactories["fill-in"] = function(id, data, onResolve) {
  var el = document.createElement("div");
  el.className = "beat-card beat-card--fill-in slide-card--fill-in";
  var prompt = document.createElement("div"); prompt.className = "fill-prompt";
  K.renderWithBlank(data.prompt, prompt, data.blank || {});
  el.appendChild(prompt);
  var hint = document.createElement("div"); hint.className = "fill-hint";
  hint.textContent = data.hint || "";
  el.appendChild(hint);
  var success = document.createElement("div"); success.className = "fill-success";
  success.textContent = data.successMessage || "Correct!";
  el.appendChild(success);

  var inp = el.querySelector(".fill-blank");
  var attempts = 0;
  function check() {
    var val = inp.value.trim();
    if (!val) return;
    var accepted = data.blank ? data.blank.answer : (data.answer || []);
    if (FillIn.validate(val, accepted)) {
      inp.classList.remove("wrong"); inp.classList.add("correct");
      inp.disabled = true;
      success.classList.add("visible");
      setTimeout(function() { onResolve(true); }, 1500);
    } else {
      attempts++;
      inp.classList.add("wrong");
      setTimeout(function() { inp.classList.remove("wrong"); }, 400);
      hint.classList.add("visible");
      if (attempts >= 3) {
        // v2 FIX: reveal answer but trigger wrongPath
        inp.value = accepted[0];
        inp.classList.add("correct"); inp.disabled = true;
        success.textContent = "The answer is " + accepted[0];
        success.classList.add("visible");
        setTimeout(function() { onResolve(false); }, 2000); // was onResolve(true) in v1!
      }
    }
  }
  inp.addEventListener("keydown", function(e) { if (e.key === "Enter") check(); });
  setTimeout(function() { inp.focus(); }, 300);
  return el;
};

/* ── Gate: proof-builder ── (v2 fix: consistent wrongPath triggering) */
GateSystem.gateFactories["proof-builder"] = function(id, data, onResolve) {
  var el = document.createElement("div");
  el.className = "beat-card beat-card--proof-builder slide-card--proof-builder";
  var inst = document.createElement("div"); inst.className = "pb-instruction";
  K.mixed(data.instruction, inst);
  el.appendChild(inst);

  var slotsDiv = document.createElement("div"); slotsDiv.className = "pb-slots";
  for (var i = 0; i < data.slots; i++) {
    var slot = document.createElement("div"); slot.className = "pb-slot"; slot.dataset.slotIdx = i;
    slotsDiv.appendChild(slot);
  }
  el.appendChild(slotsDiv);

  var tray = document.createElement("div"); tray.className = "pb-tray";
  data.availablePieces.forEach(function(p) {
    var piece = document.createElement("div"); piece.className = "pb-piece";
    piece.dataset.pieceId = p.id;
    piece.draggable = true;
    K.inline(p.latex, piece);
    tray.appendChild(piece);
  });
  el.appendChild(tray);

  var checkBtn = document.createElement("button"); checkBtn.className = "pb-check"; checkBtn.textContent = "Check";
  el.appendChild(checkBtn);
  var hintEl = document.createElement("div"); hintEl.className = "pb-hint";
  hintEl.textContent = data.hint || "Try rearranging the pieces.";
  el.appendChild(hintEl);

  var slots = el.querySelectorAll(".pb-slot");
  var pieces = el.querySelectorAll(".pb-piece");
  var slotContents = new Array(data.slots).fill(null);
  var checkAttempts = 0;

  function placePiece(pieceId, slotIdx) {
    for (var i = 0; i < slotContents.length; i++) {
      if (slotContents[i] === pieceId) {
        slotContents[i] = null;
        slots[i].innerHTML = ""; slots[i].classList.remove("filled");
      }
    }
    slotContents[slotIdx] = pieceId;
    var pieceData = data.availablePieces.find(function(p) { return p.id === pieceId; });
    slots[slotIdx].innerHTML = "";
    K.inline(pieceData.latex, slots[slotIdx]);
    slots[slotIdx].classList.add("filled");
    var p = el.querySelector('.pb-piece[data-piece-id="' + pieceId + '"]');
    if (p) p.classList.add("used");
  }

  pieces.forEach(function(piece) {
    piece.addEventListener("dragstart", function(e) {
      e.dataTransfer.setData("text/plain", piece.dataset.pieceId);
      piece.classList.add("dragging");
    });
    piece.addEventListener("dragend", function() { piece.classList.remove("dragging"); });
    piece.addEventListener("pointerdown", function(e) {
      if (e.pointerType === "mouse") return;
      e.preventDefault();
      var clone = piece.cloneNode(true);
      clone.style.cssText = "position:fixed;z-index:999;pointer-events:none;opacity:0.8";
      document.body.appendChild(clone);
      function move(ev) { clone.style.left = (ev.clientX - 20) + "px"; clone.style.top = (ev.clientY - 20) + "px"; }
      function up(ev) {
        document.removeEventListener("pointermove", move);
        document.removeEventListener("pointerup", up);
        clone.remove();
        var target = document.elementFromPoint(ev.clientX, ev.clientY);
        if (target && target.classList.contains("pb-slot")) placePiece(piece.dataset.pieceId, parseInt(target.dataset.slotIdx));
      }
      document.addEventListener("pointermove", move);
      document.addEventListener("pointerup", up);
      move(e);
    });
  });

  slots.forEach(function(slot) {
    slot.addEventListener("dragover", function(e) { e.preventDefault(); slot.classList.add("over"); });
    slot.addEventListener("dragleave", function() { slot.classList.remove("over"); });
    slot.addEventListener("drop", function(e) {
      e.preventDefault(); slot.classList.remove("over");
      placePiece(e.dataTransfer.getData("text/plain"), parseInt(slot.dataset.slotIdx));
    });
    slot.addEventListener("click", function() {
      var idx = parseInt(slot.dataset.slotIdx);
      if (slotContents[idx]) {
        var pid = slotContents[idx];
        slotContents[idx] = null;
        slot.innerHTML = ""; slot.classList.remove("filled");
        var p = el.querySelector('.pb-piece[data-piece-id="' + pid + '"]');
        if (p) p.classList.remove("used");
      }
    });
  });

  checkBtn.addEventListener("click", function() {
    checkAttempts++;
    var correct = true;
    for (var i = 0; i < data.correctOrder.length; i++) {
      if (slotContents[i] !== data.correctOrder[i]) {
        correct = false;
        slots[i].classList.add("wrong");
        setTimeout(function(s) { return function() { s.classList.remove("wrong"); }; }(slots[i]), 500);
      } else {
        slots[i].classList.add("correct");
      }
    }
    if (correct) {
      setTimeout(function() { onResolve(true); }, 1500);
    } else {
      hintEl.classList.add("visible");
      // v2 FIX: after 3 failed checks, trigger wrongPath
      if (checkAttempts >= 3) {
        // Show correct order
        for (var i = 0; i < data.correctOrder.length; i++) {
          var pid = data.correctOrder[i];
          var pd = data.availablePieces.find(function(p) { return p.id === pid; });
          slots[i].innerHTML = "";
          K.inline(pd.latex, slots[i]);
          slots[i].classList.add("correct");
        }
        checkBtn.disabled = true;
        setTimeout(function() { onResolve(false); }, 2000);
      }
    }
  });

  return el;
};

/* ── Gate: interactive (slider) ── */
GateSystem.gateFactories.interactive = function(id, data, onResolve) {
  var el = document.createElement("div");
  el.className = "beat-card beat-card--interactive slide-card--interactive";

  el.appendChild(info);

  if (data.challenge) {
    var ch = document.createElement("div"); ch.className = "int-challenge";
    K.mixed(data.challenge, ch);
    el.appendChild(ch);
  }

  var cont = document.createElement("button"); cont.className = "int-continue"; cont.textContent = "Continue \u2192";
  el.appendChild(cont);

  var computeFn = typeof data.compute === "function" ? data.compute : new Function("n", "return (" + data.compute + ")(n);");
  function update(n) {

    var html = "";
    if (data.displays) {
      data.displays.forEach(function(d) {

  }

  slider.addEventListener("input", function() { update(parseInt(this.value)); });
  cont.addEventListener("click", function() { onResolve(true); });
  update(parseInt(slider.value));
  return el;
};

/* ── Gate: practice ── */
GateSystem.gateFactories.practice = function(id, data, onResolve) {

  hint.textContent = data.hint || "";
  el.appendChild(hint);
  var success = document.createElement("div"); success.className = "fill-success";
  el.appendChild(success);

  var attempts = 0;
  inp.addEventListener("keydown", function(e) {
    if (e.key !== "Enter") return;
    var val = inp.value.trim();
    if (!val) return;
    if (FillIn.validate(val, data.answer || [])) {
      inp.classList.add("correct"); inp.disabled = true;
      success.textContent = data.explanation || "Correct!";
      success.classList.add("visible");
      if (onResolve) setTimeout(function() { onResolve(true); }, 1500);
    } else {
      attempts++;
      inp.classList.add("wrong");
      setTimeout(function() { inp.classList.remove("wrong"); }, 400);
      hint.classList.add("visible");
      if (attempts >= 3) {
        inp.value = (data.answer || [""])[0];
        inp.classList.add("correct"); inp.disabled = true;
        success.textContent = data.explanation || "Answer: " + (data.answer || [""])[0];
        success.classList.add("visible");
        // v2 FIX: trigger wrongPath
        if (onResolve) setTimeout(function() { onResolve(false); }, 2000);
      }
    }
  });
  setTimeout(function() { inp.focus(); }, 300);
  return el;
};

EX.GateSystem = GateSystem;

})();

/* ═══════════════════════════════════════════════════════════════════
   Player Controls v2 — Scrubber, milestone dots, keyboard navigation

   Fixes from v1:
   - Bug 1 fix: proper `this` binding (no stale `self` reference)
   - Bug 3 fix: scrubber locked during gate state
   - Scrubber maps to default path only (branch acts don't shift it)
   - Milestone dots use correct closure binding
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var $ = EX.$;

var PlayerControls = {
  playing: false,
  speeds: [0.5, 0.75, 1, 1.25, 1.5, 2],
  speedIdx: 2,
  firstDone: false,
  _scrubberLocked: false,
  _isDragging: false,
  _graph: null,
  _state: null,

  init: function(graph, state) {
    this._graph = graph;
    this._state = state;
    var self = this; // v2: properly scoped self for all closures in this method

    var pb = $("playBtn");
    var sb = $("speedBtn");

    pb.addEventListener("click", function(e) { e.stopPropagation(); self.toggle(); });

    sb.addEventListener("click", function() {
      self.speedIdx = (self.speedIdx + 1) % self.speeds.length;
      var rate = self.speeds[self.speedIdx];
      sb.textContent = rate + "x";
      EventBus.emit("audio:setRate", { rate: rate });
      EX.ActRunner.setTimeScale(rate);
    });

    $("subToggle").addEventListener("click", function() {
      var on = EX.Subtitles.enabled;
      EX.Subtitles.setEnabled(!on);
      this.classList.toggle("off", on);
    });

    $("narToggle").addEventListener("click", function() {
      var off = this.classList.contains("off");
      EventBus.emit("audio:setEnabled", { enabled: off });
      this.classList.toggle("off", !off);
      this.textContent = off ? "\u{1F50A}" : "\u{1F507}";
    });

    // Light/dark theme toggle
    var themeBtn = $("themeToggle");
    if (themeBtn) {
      var sunIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      var moonIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
      themeBtn.addEventListener("click", function() {
        document.body.classList.toggle("light-mode");
        var isLight = document.body.classList.contains("light-mode");
        themeBtn.innerHTML = isLight ? moonIcon : sunIcon;
      });
    }

    // Print notebook
    var printBtn = $("printBtn");
    if (printBtn) {
      printBtn.addEventListener("click", function() {
        window.print();
      });
    }

    // Scrubber: maps to default path global time
    var scrubber = $("scrubber");

    // Single recovery function used by all user interactions
    function doRecover() {
      console.log("[controls] triggering recovery from user interaction");
      EX.Orchestrator.recoverState(graph, state);
      self.playing = false;
      self._scrubberLocked = false;
      self._isDragging = false;
      pb.innerHTML = "\u25B6";
    }

    // Check if stuck and recover. Returns true if recovery was needed.
    function ensureReady() {
      if (self.firstDone && EX.Orchestrator.isStuck(state)) {
        doRecover();
        return true;
      }
      return false;
    }

    // Watchdog: every 1s, check if phase is "playing" but nothing is moving.
    // This catches stuck states that happen between user interactions.
    setInterval(function() {
      if (!self.firstDone) return;
      if (EX.Orchestrator.isStuck(state)) {
        console.log("[watchdog] stuck state detected, auto-recovering");
        doRecover();
      }
    }, 1000);

    function doSeek(pct) {
      ensureReady();
      if (self._scrubberLocked) return;
      // If at a gate, unlock scrubber — user wants to seek away from the gate
      if (state.phase === "gate") self._scrubberLocked = false;

      if (!self.firstDone) {
        self.firstDone = true;
        self.playing = true;
        pb.innerHTML = "\u23F8";
        if (window._collapseHero) window._collapseHero();
      }

      var totalDur = graph.totalDefaultDuration;
      EX.Orchestrator.seekToGlobalTime(pct * totalDur, graph, state);
      self.playing = true;
      pb.innerHTML = "\u23F8";
    }

    scrubber.addEventListener("mousedown", function() { self._isDragging = true; });
    scrubber.addEventListener("touchstart", function() { self._isDragging = true; }, { passive: true });
    document.addEventListener("mouseup", function() { self._isDragging = false; });
    document.addEventListener("touchend", function() { self._isDragging = false; });

    scrubber.addEventListener("input", function() {
      if (!self._isDragging) return;
      doSeek(parseInt(this.value) / 1000);
    });

    scrubber.addEventListener("click", function(e) {
      self._isDragging = false;
      var rect = scrubber.getBoundingClientRect();
      var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      scrubber.value = Math.round(pct * 1000);
      doSeek(pct);
    });

    // Keyboard navigation
    document.addEventListener("keydown", function(e) {
      if (e.target.tagName === "INPUT") return;
      if (e.code === "Space") {
        e.preventDefault();
        if (!self.firstDone) { self.firstDone = true; self.start(); return; }
        self.toggle();
      } else if (e.code === "ArrowRight") {
        e.preventDefault();
        if (!self.firstDone) { self.firstDone = true; self.start(); }
        var curTime = state.getScrubberTime();
        EX.Orchestrator.seekToGlobalTime(curTime + 5, graph, state);
      } else if (e.code === "ArrowLeft") {
        e.preventDefault();
        if (!self.firstDone) { self.firstDone = true; self.start(); }
        var curTime = state.getScrubberTime();
        EX.Orchestrator.seekToGlobalTime(curTime - 5, graph, state);
      }
    });

    // First click to start
    document.addEventListener("click", function handler(e) {
      if (self.firstDone) return;
      if (e.target.closest("#controls")) return;
      if (e.target.closest(".quiz-opt")) return;
      self.firstDone = true;
      self.start();
      document.removeEventListener("click", handler);
    });

    // Build milestone dots
    this._buildMilestoneDots();

    // Listen for state changes
    EventBus.on("state:change", function(data) {
      if (data.to === "gate") self.onGateEnter();
      else if (data.from === "gate") self.onGateExit();
      else if (data.to === "ended") self.onLessonEnd();
    });

    // Hard reset clears our lock flags too
    EventBus.on("recover:reset", function() {
      self._scrubberLocked = false;
      self._isDragging = false;
    });

    // Listen for tick updates
    EventBus.on("playback:tick", function() {
      self.updateProgress();
    });

    // Show total duration immediately so "0:00 / 5:24" is visible before play
    var totalDur = graph.totalDefaultDuration;
    if (totalDur > 0) {
      $("timeD").textContent = "0:00 / " + formatTime(totalDur);
    }
  },

  start: function() {
    this.playing = true;
    $("playBtn").innerHTML = "\u23F8";
    if (window._collapseHero) window._collapseHero();
    EX.Orchestrator.start(this._graph, this._state);
  },

  toggle: function() {
    if (!this.firstDone) { this.firstDone = true; this.start(); return; }
    var state = this._state;
    var graph = this._graph;

    // Recover from any stuck state before inspecting phase
    if (EX.Orchestrator.isStuck(state)) {
      console.log("[controls] toggle detected stuck, recovering");
      EX.Orchestrator.recoverState(graph, state);
      this.playing = false;
      this._scrubberLocked = false;
      $("playBtn").innerHTML = "\u25B6";
      return; // leave paused — next click will resume
    }

    // If waiting for gate audio to finish, don't toggle — let it complete
    if (EX.Orchestrator._pendingGateTimer) return;

    // Use actual state phase as the source of truth
    var isActive = (state.phase === "playing");
    if (isActive) {
      this.playing = false;
      $("playBtn").innerHTML = "\u25B6";
      EX.ActRunner.pause();
      EventBus.emit("audio:pause", {});
      state.transition("paused");
    } else if (state.phase === "gate") {
      // Dismiss the gate and advance to the next act
      console.log("[controls] play pressed during gate — dismissing gate, advancing");
      state.phase = "playing"; // force out of gate
      this.playing = true;
      this._scrubberLocked = false;
      $("playBtn").innerHTML = "\u23F8";
      EX.Orchestrator._gatePausedAudio = null;
      EX.Orchestrator._advanceToNext(graph, state);
    } else {
      // If state is "ended" or "idle", reset to beginning
      if (state.phase === "ended" || state.phase === "idle") {
        this.start();
        return;
      }
      this.playing = true;
      $("playBtn").innerHTML = "\u23F8";
      state.transition("playing");
      EX.ActRunner.play();
      EventBus.emit("audio:resume", {});
    }
  },

  onGateEnter: function() {
    this.playing = false;
    // Don't lock scrubber — user should be able to seek away from a gate
    this._scrubberLocked = false;
    $("playBtn").innerHTML = "\u25B6";
  },

  onGateExit: function() {
    this.playing = true;
    this._scrubberLocked = false;
    $("playBtn").innerHTML = "\u23F8";
  },

  onLessonEnd: function() {
    this.playing = false;
    $("playBtn").innerHTML = "\u25B6";
  },

  updateProgress: function() {
    var graph = this._graph;
    var state = this._state;
    var totalDur = graph.totalDefaultDuration;
    var cumTime = state.getScrubberTime();

    // Don't fight the user's drag — only update scrubber position when idle
    if (!this._isDragging) {
      var pct = totalDur > 0 ? Math.round(cumTime / totalDur * 1000) : 0;
      $("scrubber").value = pct;
    }
    $("timeD").textContent = formatTime(cumTime) + " / " + formatTime(totalDur);

    var fillPct = totalDur > 0 ? (cumTime / totalDur * 100) : 0;
    var fill = $("progress-fill");
    if (fill) fill.style.height = fillPct + "%";
  },

  /* v2 fix: milestone dots use proper closure binding */
  _buildMilestoneDots: function() {
    var dotsContainer = $("milestone-dots");
    if (!dotsContainer) return;
    dotsContainer.innerHTML = "";

    var graph = this._graph;
    var state = this._state;
    var self = this; // v2: properly bound

    var positions = graph.getMilestonePositions();
    positions.forEach(function(ms) {
      var dot = document.createElement("div");
      dot.className = "milestone-dot" + (ms.type === "gate" ? " gate" : "");
      dot.style.left = (ms.position * 100) + "%";
      dot.title = ms.label || ("Act " + (ms.defaultIndex + 1));
      dot.addEventListener("click", function(e) {
        e.stopPropagation();
        e.preventDefault();
        // Recover from stuck state before jumping
        if (self.firstDone && EX.Orchestrator.isStuck(state)) {
          console.log("[controls] milestone click detected stuck, recovering");
          EX.Orchestrator.recoverState(graph, state);
          self.playing = false;
          self._scrubberLocked = false;
          $("playBtn").innerHTML = "\u25B6";
        }
        self._scrubberLocked = true;
        setTimeout(function() { self._scrubberLocked = false; }, 300);
        if (!self.firstDone) {
          self.firstDone = true;
          if (window._collapseHero) window._collapseHero();
        }
        if (ms.type === "gate") {
          // Jump to the act just before the gate and seek to its end so the
          // gate fires immediately and playback pauses at the question.
          var gateActDur = graph.defaultDurations[ms.defaultIndex] || 9999;
          EX.Orchestrator.jumpToDefaultIndex(ms.defaultIndex, gateActDur, graph, state);
          // onGateEnter will set playing=false and update the button
        } else {
          // Marker — jump to the act immediately after it
          EX.Orchestrator.jumpToDefaultIndex(ms.defaultIndex + 1, 0, graph, state);
          self.playing = true;
          $("playBtn").innerHTML = "\u23F8";
        }
      });
      dotsContainer.appendChild(dot);
    });
  },

  rebuildProgress: function() {
    this._buildMilestoneDots();
  }
};

function formatTime(seconds) {
  var m = Math.floor(seconds / 60);
  var s = Math.floor(seconds % 60);
  return m + ":" + (s < 10 ? "0" : "") + s;
}

EX.PlayerControls = PlayerControls;

})();

/* ═══════════════════════════════════════════════════════════════════
   ScrollSync v2 — Bidirectional scroll ↔ timeline synchronization
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var $ = EX.$;

var ScrollSync = {
  observer: null,
  scrollLocked: false,
  timelineLocked: false,
  _lockTimeout: null,
  _intersectTimeout: null,

  init: function() {
    var nb = $("notebook");
    if (!nb) return;
    this.observer = new IntersectionObserver(
      this._onIntersect.bind(this),
      {
        root: nb,
        threshold: [0.5],
        rootMargin: "-20% 0px -20% 0px"
      }
    );

    var self = this;
    nb.addEventListener("wheel", function() {
      var state = window._state;
      if (!state || state.phase !== "playing") return;
      self.timelineLocked = true;
      clearTimeout(self._lockTimeout);
      self._lockTimeout = setTimeout(function() { self.timelineLocked = false; }, 800);
    }, { passive: true });

    // Listen for events
    EventBus.on("scroll:observe", function(data) {
      if (self.observer && data.element) self.observer.observe(data.element);
    });

    EventBus.on("scroll:toBeat", function(data) {
      self.scrollToBeat(data.beatId);
    });

    // Cancel any pending debounced seek when acts change or gates enter,
    // so a stale seek can't fire into a new context and corrupt state.
    EventBus.on("act:start", function() { self.cancelPendingSeek(); });
    EventBus.on("gate:enter", function() { self.cancelPendingSeek(); });
    EventBus.on("state:change", function() { self.cancelPendingSeek(); });

    // Hard reset: clear ALL locks and pending timeouts
    EventBus.on("recover:reset", function() {
      self.cancelPendingSeek();
      clearTimeout(self._lockTimeout);
      self._lockTimeout = null;
      self.scrollLocked = false;
      self.timelineLocked = false;
    });
  },

  cancelPendingSeek: function() {
    clearTimeout(this._intersectTimeout);
    this._intersectTimeout = null;
  },

  _onIntersect: function(entries) {
    if (this.scrollLocked) return;
    var state = window._state;
    if (!state || (state.phase !== "playing" && state.phase !== "paused")) return;

    var best = null, bestRatio = 0;
    entries.forEach(function(entry) {
      if (entry.isIntersecting && entry.intersectionRatio > bestRatio) {
        best = entry.target;
        bestRatio = entry.intersectionRatio;
      }
    });
    if (best && this.timelineLocked) {
      var beatId = best.dataset.beatId || best.dataset.milestoneId;
      if (!beatId) return;
      var self = this;
      // Capture the act that was playing when the scroll happened
      var actIdAtSchedule = EX.ActRunner._currentActId;
      clearTimeout(this._intersectTimeout);
      this._intersectTimeout = setTimeout(function() {
        self._intersectTimeout = null;
        // Re-check state: don't seek if act changed, state left playing, or timeline died
        var st = window._state;
        if (!st || (st.phase !== "playing" && st.phase !== "paused")) return;
        if (EX.ActRunner._currentActId !== actIdAtSchedule) return;
        if (!EX.ActRunner.masterTl) return;

        var cues = EX.ActRunner.beatCues;
        for (var i = 0; i < cues.length; i++) {
          if (cues[i].beatId === beatId) {
            self.scrollLocked = true;
            EX.ActRunner.seek(cues[i].startTime);
            self.scrollLocked = false;
            break;
          }
        }
      }, 50);
    }
  },

  scrollToBeat: function(beatId) {
    if (this.timelineLocked) return;
    this.scrollLocked = true;
    EX.Notebook.scrollTo(beatId);
    var self = this;
    setTimeout(function() { self.scrollLocked = false; }, 500);
  }
};

EX.ScrollSync = ScrollSync;

})();

/* ═══════════════════════════════════════════════════════════════════
   Init v2 — Wires all modules together and boots the lesson

   Load order: core → notebook → viz-panel → audio → subtitles →
               cards → gates → controls → scroll-sync → init
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var $ = EX.$;
var K = EX.K;

var L = window.LESSON;
if (!L) { console.error("No LESSON data found"); return; }

// Apply language/direction from lesson metadata
if (L.meta && L.meta.lang) {
  document.documentElement.lang = L.meta.lang;
}
if (L.meta && L.meta.dir) {
  document.documentElement.dir = L.meta.dir;
}

// ── Build the LessonGraph ──
var graph = new EX.LessonGraph(L);
window._graph = graph;

// ── Build the PlaybackState ──
var state = new EX.PlaybackState(graph);
window._state = state;

// ── Viz Plugin management ──
var VizManager = {
  plugin: null,
  init: function() {
    var V = window.EXPLAINER_VIZ;
    if (V && graph.vizConfig) {
      var config = graph.vizConfig.config || graph.vizConfig;
      V.init($("viz"), config);
      this.plugin = V;
    }
  },
  reinit: function() {
    var V = window.EXPLAINER_VIZ;
    if (V && graph.vizConfig) {
      var config = graph.vizConfig.config || graph.vizConfig;
      V.init($("viz"), config);
      this.plugin = V;
    }
  }
};

// Wire viz action events
EventBus.on("viz:runActions", function(data) {
  if (!VizManager.plugin) return;
  var actions = data.actions;
  var plugin = VizManager.plugin;
  if (!plugin.timelineAction) {
    console.warn("[Viz] Plugin has no timelineAction method — .do() calls will be ignored");
    return;
  }
  function runAction(a, tl, baseTime) {
    var offset = a.offset || a.delay || 0;
    if (typeof offset === "string" && offset.charAt(0) === "+") offset = parseFloat(offset.substring(1));
    var before = tl.getChildren().length;
    plugin.timelineAction(tl, a.method, a.params || {}, baseTime + offset);
    if (tl.getChildren().length === before) {
      console.warn("[Viz] Method \"" + a.method + "\" added no tweens — is the method name correct?");
    }
  }
  if (data.instant) {
    var instantTl = gsap.timeline();
    actions.forEach(function(a) { runAction(a, instantTl, 0); });
    instantTl.progress(1);
  } else {
    var tl = data.timeline;
    var baseTime = data.time || 0;
    actions.forEach(function(a) { runAction(a, tl, baseTime); });
  }
});

EventBus.on("viz:reset", function() {
  // Kill ALL tweens targeting old SVG elements BEFORE removing them,
  // so GSAP doesn't hold stale references from previous play sessions.
  var oldEls = Array.prototype.slice.call($("viz").querySelectorAll("*"));
  oldEls.forEach(function(el) {
    gsap.killTweensOf(el);
  });

  // Clear SVG, THEN rebuild from scratch
  EX.VizPanel.reset();
  VizManager.reinit();

  // Flush any GSAP entry animations the plugin started during init so that
  // snapshotAct() captures the correct final state rather than opacity:0.
  var newEls = Array.prototype.slice.call($("viz").querySelectorAll("*"));
  newEls.forEach(function(el) {
    gsap.getTweensOf(el).forEach(function(t) { t.progress(1); });
  });
});

// ── Initialize all modules ──
document.title = (L.meta.source || "") + " \u2014 " + (L.meta.title || "Math Explainer");

EX.Notebook.init();
EX.VizPanel.init(graph.vizConfig);
EX.Subtitles.init(graph);
EX.AudioManager.init(graph);
VizManager.init();
if (window.EXPLAINER_VIZ_3D && EX.VizPanel3D) {
  EX.VizPanel3D.init();
}
EX.ScrollSync.init();
EX.CardSystem.init();
EX.GateSystem.init();
EX.Orchestrator.init(graph, state);
EX.PlayerControls.init(graph, state);

// ── Render problem bar ──
if (L.problem) {
  var bar = $("problem-bar");
  bar.innerHTML = "";
  bar.classList.add("hero");

  if (L.meta && L.meta.source) {
    var src = document.createElement("div");
    src.className = "problem-source";
    src.textContent = L.meta.source;
    bar.appendChild(src);
  }

  var textDiv = document.createElement("div");
  textDiv.className = "problem-text";
  K.mixed(L.problem.text, textDiv);
  bar.appendChild(textDiv);

  if (L.problem.highlight) {
    var hl = document.createElement("span");
    hl.className = "problem-highlight";
    hl.textContent = L.problem.highlight;
    bar.appendChild(hl);
  }

  gsap.fromTo(bar, { opacity: 0 }, { opacity: 1, duration: 0.6 });

  window._collapseHero = function() {
    if (!bar.classList.contains("hero")) return;
    bar.classList.remove("hero");
    bar.innerHTML = "";
    K.mixed(L.problem.text, bar);
    if (L.problem.highlight) {
      var hl2 = document.createElement("span");
      hl2.className = "problem-highlight";
      hl2.textContent = " " + L.problem.highlight;
      bar.appendChild(hl2);
    }
    gsap.fromTo(bar, { opacity: 0.5, y: -8 }, { opacity: 1, y: 0, duration: 0.4 });
  };
}

// ── Script export (for TTS pipeline) ──
window.exportScripts = function() {
  var scripts = [];
  function processAct(act, isBranch) {
    var fullScript = act.beats.map(function(b) { return b.say; }).filter(Boolean).join(" ");
    if (fullScript) {
      scripts.push({
        actId: act.id,
        title: act.title,
        text: fullScript,
        branch: isBranch || false,
        beatScripts: act.beats.map(function(b) { return { beatId: b.id, say: b.say || "" }; })
      });
    }
  }
  L.acts.forEach(function(a) { processAct(a, false); });
  for (var k in L.branchActs) { processAct(L.branchActs[k], true); }
  console.log("=== NARRATION SCRIPTS ===");
  console.log(JSON.stringify(scripts, null, 2));
  return scripts;
};

})();


</script>
</body>
