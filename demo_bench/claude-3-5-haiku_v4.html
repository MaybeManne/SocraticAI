<script>
/* ═══════════════════════════════════════════════════════════════════
   Engine Core v2 — LessonGraph, PlaybackState, EventBus, ActRunner

   Architecture: The scrubber/timeline always maps to the immutable
   "default path" (all-correct answers). Branch acts are overlays
   that insert into the student's actual path but don't shift the
   scrubber position. This makes seeking deterministic.
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var $ = function(id) { return document.getElementById(id); };

/* ═══════════════════════════════════════════════════════════════════
   EventBus — simple pub/sub for decoupling modules
   ═══════════════════════════════════════════════════════════════════ */
var EventBus = {
  _handlers: {},

  on: function(event, fn) {
    if (!this._handlers[event]) this._handlers[event] = [];
    this._handlers[event].push(fn);
  },

  off: function(event, fn) {
    var arr = this._handlers[event];
    if (!arr) return;
    var idx = arr.indexOf(fn);
    if (idx >= 0) arr.splice(idx, 1);
  },

  emit: function(event, data) {
    var arr = this._handlers[event];
    if (!arr) return;
    for (var i = 0; i < arr.length; i++) {
      try { arr[i](data); } catch(e) { console.error("[EventBus]", event, e); }
    }
  }
};

/* ═══════════════════════════════════════════════════════════════════
   LessonGraph — immutable lesson structure built from window.LESSON
   ═══════════════════════════════════════════════════════════════════ */
function LessonGraph(lesson) {
  this.meta = lesson.meta;
  this.problem = lesson.problem;
  this.vizConfig = lesson.viz;

  // All acts (main + branch) keyed by id
  this.allActs = {};
  var self = this;
  lesson.acts.forEach(function(a) { self.allActs[a.id] = a; });
  for (var k in (lesson.branchActs || {})) {
    self.allActs[k] = lesson.branchActs[k];
  }

  // Default path: the main path (immutable, all-correct-answers path)
  this.defaultPath = (lesson.mainPath || []).slice();

  // Milestones indexed by afterAct
  this.milestoneAfter = {};
  (lesson.milestones || []).forEach(function(m) {
    self.milestoneAfter[m.afterAct] = m;
  });

  // Pre-compute default path durations
  this.defaultDurations = [];
  this.totalDefaultDuration = 0;
  for (var i = 0; i < this.defaultPath.length; i++) {
    var act = this.allActs[this.defaultPath[i]];
    var dur = (act && act.duration) ? act.duration : 5;
    this.defaultDurations.push(dur);
    this.totalDefaultDuration += dur;
  }

  // Audio/subtitle data references
  this.audio = lesson.audio || null;
  this.subtitles = lesson.subtitles || null;
  this.beatTimings = lesson.beatTimings || null;
}

/* Resolve a global time (on the default path) to {pathIndex, localTime} */
LessonGraph.prototype.resolveDefaultTime = function(globalTime) {
  globalTime = Math.max(0, Math.min(globalTime, this.totalDefaultDuration));
  var cumulative = 0;
  for (var i = 0; i < this.defaultPath.length; i++) {
    var dur = this.defaultDurations[i];
    if (globalTime < cumulative + dur) {
      return { pathIndex: i, localTime: globalTime - cumulative };
    }
    cumulative += dur;
  }
  var lastIdx = this.defaultPath.length - 1;
  return { pathIndex: lastIdx, localTime: this.defaultDurations[lastIdx] || 0 };
};

/* Get cumulative time on default path up to {pathIndex, localTime} */
LessonGraph.prototype.getDefaultCumulativeTime = function(pathIndex, localTime) {
  var total = 0;
  for (var i = 0; i < pathIndex && i < this.defaultPath.length; i++) {
    total += this.defaultDurations[i];
  }
  return total + (localTime || 0);
};

/* Get milestone positions as fractions of total default duration */
LessonGraph.prototype.getMilestonePositions = function() {
  var positions = [];
  var cumulative = 0;
  for (var i = 0; i < this.defaultPath.length; i++) {
    var dur = this.defaultDurations[i];
    var ms = this.milestoneAfter[this.defaultPath[i]];
    if (ms) {
      positions.push({
        defaultIndex: i,
        position: (cumulative + dur) / this.totalDefaultDuration,
        type: ms.type,
        label: ms.label || ""
      });
    }
    cumulative += dur;
  }
  return positions;
};


/* ═══════════════════════════════════════════════════════════════════
   PlaybackState — state machine for lesson playback

   States: idle → playing ↔ paused → gate → playing → ... → ended
   ═══════════════════════════════════════════════════════════════════ */
function PlaybackState(graph) {
  this.graph = graph;
  this.phase = "idle";           // idle | playing | paused | gate | ended
  this.pathHistory = [];          // actual act IDs visited in order
  this.cursorIndex = -1;          // index into pathHistory
  this.defaultIndex = -1;         // index into graph.defaultPath (for scrubber)
  this.localTime = 0;             // time within current act
  this.gateResults = {};          // milestoneId → true/false
  this.renderedUpTo = -1;         // highest pathHistory index fully rendered in notebook
  this._onBranchPath = false;     // true when playing branch acts
  this._branchReturnDefaultIdx = -1; // defaultPath index to return to after branch
}

/* Transition to a new phase with validation */
PlaybackState.prototype.transition = function(newPhase) {
  var valid = {
    "idle":    ["playing"],
    "playing": ["paused", "gate", "ended", "idle"],
    "paused":  ["playing", "idle"],
    "gate":    ["playing", "idle"],
    "ended":   ["idle", "playing"]
  };
  if (!valid[this.phase] || valid[this.phase].indexOf(newPhase) < 0) {
    console.warn("[PlaybackState] Invalid transition:", this.phase, "→", newPhase);
    return false;
  }
  var old = this.phase;
  this.phase = newPhase;
  EventBus.emit("state:change", { from: old, to: newPhase });
  return true;
};

/* Start from the beginning */
PlaybackState.prototype.start = function() {
  this.pathHistory = [];
  this.cursorIndex = -1;
  this.defaultIndex = -1;
  this.localTime = 0;
  this.gateResults = {};
  this.renderedUpTo = -1;
  this._onBranchPath = false;
  this._branchReturnDefaultIdx = -1;
  this.advanceToNextAct();
};

/* Advance to the next act in sequence */
PlaybackState.prototype.advanceToNextAct = function() {
  if (this._onBranchPath) {
    // We're on a branch — check if there are more branch acts
    var branchActId = this._nextBranchAct();
    if (branchActId) {
      this.pathHistory.push(branchActId);
      this.cursorIndex = this.pathHistory.length - 1;
      this.localTime = 0;
      return branchActId;
    }
    // Branch done — return to default path
    this._onBranchPath = false;
    this.defaultIndex = this._branchReturnDefaultIdx;
  } else {
    this.defaultIndex++;
  }

  if (this.defaultIndex >= this.graph.defaultPath.length) {
    this.transition("ended");
    EventBus.emit("lesson:end", {});
    return null;
  }

  var actId = this.graph.defaultPath[this.defaultIndex];
  this.pathHistory.push(actId);
  this.cursorIndex = this.pathHistory.length - 1;
  this.localTime = 0;
  return actId;
};

/* Enter a branch path after a wrong gate answer */
PlaybackState.prototype.enterBranch = function(branchActIds, returnDefaultIdx) {
  this._onBranchPath = true;
  this._branchReturnDefaultIdx = returnDefaultIdx;
  this._branchQueue = branchActIds.slice();
  // Start the first branch act
  var firstId = this._branchQueue.shift();
  this.pathHistory.push(firstId);
  this.cursorIndex = this.pathHistory.length - 1;
  this.localTime = 0;
  return firstId;
};

PlaybackState.prototype._nextBranchAct = function() {
  if (this._branchQueue && this._branchQueue.length > 0) {
    return this._branchQueue.shift();
  }
  return null;
};

/* Get global time on the default path for scrubber display */
PlaybackState.prototype.getScrubberTime = function() {
  if (this._onBranchPath) {
    // While on branch, show the position of the gate that triggered it
    return this.graph.getDefaultCumulativeTime(this._branchReturnDefaultIdx, 0);
  }
  return this.graph.getDefaultCumulativeTime(this.defaultIndex, this.localTime);
};

/* Get the current act descriptor */
PlaybackState.prototype.getCurrentAct = function() {
  if (this.cursorIndex < 0 || this.cursorIndex >= this.pathHistory.length) return null;
  return this.graph.allActs[this.pathHistory[this.cursorIndex]];
};

/* Get the current act ID */
PlaybackState.prototype.getCurrentActId = function() {
  if (this.cursorIndex < 0 || this.cursorIndex >= this.pathHistory.length) return null;
  return this.pathHistory[this.cursorIndex];
};


/* ═══════════════════════════════════════════════════════════════════
   ActRunner v2 — Compiles act beats into GSAP timeline
   Uses PlaybackState for all state management.
   ═══════════════════════════════════════════════════════════════════ */
var ActRunner = {
  masterTl: null,
  beatCues: [],
  activeBeatIdx: -1,
  _rafId: null,
  _renderedBeats: {},
  _currentActId: null,

  /* Load an act and build its GSAP timeline.
     options.instant: render everything at t=end (for snapshot replay)
     options.startTime: seek to this time after loading */
  loadAct: function(act, options) {
    options = options || {};
    this._stopTicker();
    if (this.masterTl) { this.masterTl.kill(); this.masterTl = null; }
    this._renderedBeats = {};
    this.activeBeatIdx = -1;
    this._currentActId = act.id;

    // Build beat timing cues
    this.beatCues = this._buildBeatCues(act);

    // Build GSAP master timeline
    var duration = this.getActDuration(act);
    this.masterTl = gsap.timeline({ paused: true });

    // Schedule beat card renders and viz actions
    for (var i = 0; i < act.beats.length; i++) {
      this._scheduleBeat(act.beats[i], this.beatCues[i], this.masterTl, options.instant);
    }

    // Ensure timeline covers full duration
    this.masterTl.to({}, { duration: 0.01 }, duration);

    // Set viz panel mode for the act
    if (act.vizPanel) EventBus.emit("viz:setMode", act.vizPanel);

    EventBus.emit("act:loaded", { act: act, duration: duration, instant: !!options.instant });
  },

  _buildBeatCues: function(act) {
    var graph = window._graph;
    if (graph && graph.beatTimings && graph.beatTimings[act.id]) {
      return graph.beatTimings[act.id];
    }
    var WPS = 2.5;
    var cues = [];
    var cursor = 0;
    for (var i = 0; i < act.beats.length; i++) {
      var beat = act.beats[i];
      var words = beat.say ? beat.say.split(/\s+/).length : 0;
      var dur = beat.duration || Math.max(1.5, words / WPS);
      cues.push({ beatId: beat.id, startTime: cursor, endTime: cursor + dur });
      cursor += dur;
    }
    return cues;
  },

  getActDuration: function(act) {
    if (act.duration) return act.duration;
    if (this.beatCues.length > 0) return this.beatCues[this.beatCues.length - 1].endTime;
    return 5;
  },

  _scheduleBeat: function(beat, cue, tl, instant) {
    var self = this;
    var t = cue.startTime;

    if (beat.card) {
      if (instant) {
        EventBus.emit("beat:render", { beat: beat, instant: true });
        self._renderedBeats[beat.id] = true;
      } else {
        tl.call(function() {
          if (!self._renderedBeats[beat.id]) {
            EventBus.emit("beat:render", { beat: beat, instant: false });
            self._renderedBeats[beat.id] = true;
          }
        }, [], t);
      }
    }

    // Schedule viz actions
    if (beat.vizActions && beat.vizActions.length > 0) {
      if (instant) {
        EventBus.emit("viz:runActions", { actions: beat.vizActions, time: 0, instant: true });
      } else {
        EventBus.emit("viz:runActions", { actions: beat.vizActions, timeline: tl, time: t, instant: false });
      }
    }

    // Viz panel mode override
    if (beat._explicitVizPanel && !instant) {
      tl.call(function() { EventBus.emit("viz:setMode", beat._explicitVizPanel); }, [], t);
    }

    // Inline migration at beat END — event-driven, not timeline-scheduled
    if (beat.inlineViz) {
      var inlineType = typeof beat.inlineViz === "string" ? beat.inlineViz : "auto";
      if (instant) {
        EventBus.emit("viz:migrateInline", { beatId: beat.id, type: inlineType });
      } else {
        var endTime = cue.endTime - 0.05;
        tl.call(function() {
          EventBus.emit("viz:migrateInline", { beatId: beat.id, type: inlineType });
        }, [], endTime);
      }
    }
  },

  play: function() {
    if (!this.masterTl) return;
    this.masterTl.play();
    this._startTicker();
  },

  pause: function() {
    if (this.masterTl) this.masterTl.pause();
    this._stopTicker();
  },

  seek: function(time) {
    if (!this.masterTl) return;
    var act = window._state.getCurrentAct();
    if (!act) return;
    time = Math.max(0, Math.min(time, this.getActDuration(act)));
    // Fire any beat renders / viz actions whose startTime <= time that were
    // NOT already rendered. Without this, seeking backwards (or jumping into
    // the middle of an act) leaves the viz empty / showing the intro state
    // until playback catches up — the "3-second intro flash" scrub bug.
    // GSAP .time() on a paused timeline does NOT invoke skipped .call() cbs,
    // so we must replay missed beats ourselves in instant mode.
    this._instantRenderUpTo(act, time);
    this.masterTl.time(time);
    this.masterTl.getChildren().forEach(function(c) {
      if (c.endTime && c.endTime() <= time) { try { c.progress(1, true); } catch(e){} }
    });
    this._updateActiveBeat(time);
    EventBus.emit("playback:tick", { time: time });
  },

  /* Render all beats of `act` whose cue.startTime <= time instantly (cards
     in instant mode, viz actions with instant:true) so the scene reflects
     the post-seek state immediately. Idempotent via _renderedBeats. */
  _instantRenderUpTo: function(act, time) {
    if (!act || !this.beatCues) return;
    for (var i = 0; i < act.beats.length; i++) {
      var beat = act.beats[i];
      var cue = this.beatCues[i];
      if (!cue || cue.startTime > time) break;
      if (this._renderedBeats[beat.id]) continue;
      if (beat.card) {
        EventBus.emit("beat:render", { beat: beat, instant: true });
      }
      if (beat.vizActions && beat.vizActions.length > 0) {
        EventBus.emit("viz:runActions", {
          actions: beat.vizActions, time: 0, instant: true
        });
      }
      if (beat.inlineViz && cue.endTime <= time) {
        var inlineType = typeof beat.inlineViz === "string" ? beat.inlineViz : "auto";
        EventBus.emit("viz:migrateInline", { beatId: beat.id, type: inlineType });
      }
      this._renderedBeats[beat.id] = true;
    }
  },

  getCurrentTime: function() {
    return this.masterTl ? this.masterTl.time() : 0;
  },

  setTimeScale: function(rate) {
    if (this.masterTl) this.masterTl.timeScale(rate);
  },

  cleanup: function() {
    this._stopTicker();
    if (this.masterTl) { this.masterTl.kill(); this.masterTl = null; }
    this.beatCues = [];
    this.activeBeatIdx = -1;
    this._renderedBeats = {};
    this._currentActId = null;
  },

  /* Snapshot an act: render all cards instantly, apply all viz at end state.
     Does NOT touch audio, does NOT create a playing timeline. */
  snapshotAct: function(act) {
    this.loadAct(act, { instant: true });
    // Kill the timeline immediately — we only wanted the side effects
    if (this.masterTl) { this.masterTl.kill(); this.masterTl = null; }
    this._renderedBeats = {};
    this._currentActId = null;
  },

  _startTicker: function() {
    this._stopTicker();
    var self = this;
    function tick() {
      var state = window._state;
      if (!state || state.phase !== "playing") {
        // Ticker is dying — clear _rafId so stuck detection can see it's dead
        self._rafId = null;
        return;
      }

      var t = self.masterTl ? self.masterTl.time() : 0;

      // Sync with audio if available
      var audioTime = null;
      EventBus.emit("audio:getTime", { callback: function(at) { audioTime = at; } });
      if (audioTime !== null && Math.abs(t - audioTime) > 0.1) {
        self.masterTl.time(audioTime);
        t = audioTime;
      }

      state.localTime = t;
      self._updateActiveBeat(t);
      EventBus.emit("playback:tick", { time: t });

      // Check act completion
      var act = state.getCurrentAct();
      var dur = act ? self.getActDuration(act) : 0;
      if (t >= dur - 0.05) {
        if (self.masterTl) self.masterTl.progress(1);
        self._stopTicker();
        EventBus.emit("act:complete", { actId: state.getCurrentActId() });
        return;
      }

      self._rafId = requestAnimationFrame(tick);
    }
    this._rafId = requestAnimationFrame(tick);
  },

  _stopTicker: function() {
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
  },

  _updateActiveBeat: function(t) {
    var newIdx = -1;
    for (var i = this.beatCues.length - 1; i >= 0; i--) {
      if (t >= this.beatCues[i].startTime) { newIdx = i; break; }
    }
    if (newIdx !== this.activeBeatIdx && newIdx >= 0) {
      this.activeBeatIdx = newIdx;
      EventBus.emit("beat:enter", { beatId: this.beatCues[newIdx].beatId, index: newIdx });
    }
  }
};


/* ═══════════════════════════════════════════════════════════════════
   Orchestrator — wires everything together, handles act sequencing
   ═══════════════════════════════════════════════════════════════════ */
var Orchestrator = {
  _gatePausedAudio: null,   // { actId, time } — stored when audio pauses for a gate
  _pendingGateTimer: null,  // safety timeout while waiting for audio to finish
  _gateWaitToken: 0,        // cancellation token for _enterGateWhenAudioDone callbacks

  init: function(graph, state) {
    var self = this;

    // When an act completes, check for milestone and advance
    EventBus.on("act:complete", function(data) {
      var actId = data.actId;
      var ms = graph.milestoneAfter[actId];

      if (ms && ms.type === "gate" && !state._onBranchPath) {
        // Let the last beat's audio finish before showing the gate
        self._enterGateWhenAudioDone(ms, actId, graph, state);
      } else {
        self._advanceToNext(graph, state);
      }
    });

    // When a gate is resolved
    EventBus.on("gate:resolve", function(data) {
      var correct = data.correct;
      var ms = data.milestone;

      state.gateResults[ms.id] = correct;
      self._gatePausedAudio = null; // clear — we're moving on

      if (!correct && ms.wrongPath && ms.wrongPath.length > 0) {
        // Enter branch path — audio starts from 0 for the branch act
        var returnIdx = state.defaultIndex + 1;
        var firstBranchId = state.enterBranch(ms.wrongPath, returnIdx);
        console.log("[gate] branch act " + firstBranchId + " starting audio from 0");
        state.transition("playing");
        self._playActById(firstBranchId, graph);
      } else {
        // Correct answer — advance to next act, audio starts from 0
        state.transition("playing");
        self._advanceToNext(graph, state);
      }
    });
  },

  /* Wait for the current audio to finish naturally (up to 3s), then enter
     gate state.  This prevents cutting off mid-sentence. */
  _enterGateWhenAudioDone: function(ms, actId, graph, state) {
    var self = this;
    var am = EX.AudioManager;
    // Cancellation token — incremented by cancelPendingGate() to invalidate stale callbacks
    var token = ++this._gateWaitToken;

    function doEnter() {
      // Clean up timer
      if (self._pendingGateTimer) { clearTimeout(self._pendingGateTimer); self._pendingGateTimer = null; }
      // Check: was this gate wait cancelled? (e.g. by recoverState or jumpTo)
      if (token !== self._gateWaitToken) {
        console.log("[gate] stale gate callback ignored (token mismatch)");
        return;
      }
      // Check: is the state still valid for entering a gate?
      if (state.phase !== "playing") {
        console.log("[gate] cannot enter gate — phase is now:", state.phase);
        return;
      }

      var pausedTime = (am.current && !isNaN(am.current.currentTime)) ? am.current.currentTime : 0;
      EventBus.emit("audio:pause", {});
      self._gatePausedAudio = { actId: actId, time: pausedTime };
      console.log("[gate] audio paused at " + pausedTime.toFixed(2) + "s in act " + actId);

      state.transition("gate");
      EventBus.emit("gate:enter", { milestone: ms });
    }

    // If no audio playing, enter immediately
    if (!am.current || am.current.paused || am.current.ended) {
      doEnter();
      return;
    }

    // Audio still playing — wait for it to end naturally
    var audioEl = am.current;
    function onFinish() {
      audioEl.removeEventListener("ended", onFinish);
      audioEl.removeEventListener("pause", onFinish);
      doEnter();
    }

    audioEl.addEventListener("ended", onFinish);
    audioEl.addEventListener("pause", onFinish);

    // Safety: don't wait more than 10 seconds (was 3s — cut off trailing
    // syllables when beatTimings endTime < actual audio duration).
    self._pendingGateTimer = setTimeout(function() {
      audioEl.removeEventListener("ended", onFinish);
      audioEl.removeEventListener("pause", onFinish);
      doEnter();
    }, 10000);
  },

  /* Cancel any pending gate-entry wait and invalidate its callbacks */
  cancelPendingGate: function() {
    this._gateWaitToken++;  // invalidates any in-flight doEnter callback
    if (this._pendingGateTimer) {
      clearTimeout(this._pendingGateTimer);
      this._pendingGateTimer = null;
    }
  },

  start: function(graph, state) {
    // Full reset for replay: clear all stale content from previous playthrough
    this.cancelPendingGate();
    this._gatePausedAudio = null;
    ActRunner.cleanup();
    EventBus.emit("audio:stop", {});
    EventBus.emit("notebook:clear", {});
    EventBus.emit("viz:reset", {});

    state.start();
    var actId = state.getCurrentActId();
    if (actId) {
      state.transition("playing");
      this._playActById(actId, graph);
    }
  },

  _advanceToNext: function(graph, state) {
    var actId = state.advanceToNextAct();
    if (actId) {
      if (state.phase !== "playing") state.transition("playing");
      this._playActById(actId, graph);
    }
    // If null, lesson ended (handled by PlaybackState.advanceToNextAct)
  },

  _playActById: function(actId, graph) {
    var act = graph.allActs[actId];
    if (!act) { console.warn("[Orchestrator] Act not found:", actId); return; }

    // Cancel any pending gate-entry wait (if we're being called during the wait)
    this.cancelPendingGate();

    var isBranch = act._isBranch;
    if (isBranch) {
      console.log("[gate] branch act " + actId + " starting audio from 0");
    } else if (this._gatePausedAudio) {
      console.log("[gate] returning from branch, resuming act " + actId + " at 0s");
      this._gatePausedAudio = null;
    }

    EventBus.emit("act:start", { act: act, actId: actId });

    // Load audio for this act — always from 0 (each act has its own audio track)
    EventBus.emit("audio:loadAndPlay", { actId: actId, startTime: 0 });
    EventBus.emit("subtitles:load", { actId: actId, beats: act.beats });

    ActRunner.loadAct(act);
    ActRunner.play();
  },

  /* Jump to a position on the default path.
     Clears everything and replays from scratch up to target. */
  jumpToDefaultIndex: function(targetIdx, localTime, graph, state) {
    // If at a gate, dismiss it — user chose to seek away
    if (state.phase === "gate") {
      console.log("[gate] dismissed by seek — forcing out of gate state");
      state.phase = "playing"; // bypass validation
    }

    // Cancel any pending gate-entry wait
    this.cancelPendingGate();
    this._gatePausedAudio = null;

    // Stop current playback
    ActRunner.cleanup();
    EventBus.emit("audio:stop", {});
    EventBus.emit("notebook:clear", {});
    EventBus.emit("viz:reset", {});

    // Reset state
    state.pathHistory = [];
    state.cursorIndex = -1;
    state.defaultIndex = -1;
    state.localTime = 0;
    state.renderedUpTo = -1;
    state._onBranchPath = false;

    // Snapshot all acts before target
    for (var i = 0; i < targetIdx; i++) {
      var actId = graph.defaultPath[i];
      var act = graph.allActs[actId];
      if (act) {
        ActRunner.snapshotAct(act);
        state.pathHistory.push(actId);
        state.renderedUpTo = state.pathHistory.length - 1;
      }
      // Render passed gates
      var ms = graph.milestoneAfter[actId];
      if (ms && ms.type === "gate") {
        EventBus.emit("gate:renderPassed", { milestone: ms });
      }
    }

    // Set default index and play target act
    state.defaultIndex = targetIdx;
    var targetActId = graph.defaultPath[targetIdx];
    var targetAct = targetActId ? graph.allActs[targetActId] : null;
    if (!targetAct) {
      // targetIdx is past the end of the path — treat as lesson end
      state.transition("ended");
      EventBus.emit("lesson:end", {});
      return;
    }
    state.pathHistory.push(targetActId);
    state.cursorIndex = state.pathHistory.length - 1;
    state.localTime = localTime || 0;

    if (state.phase !== "playing") state.transition("playing");

    EventBus.emit("act:start", { act: targetAct, actId: targetActId });
    EventBus.emit("audio:loadAndPlay", { actId: targetActId, startTime: localTime });
    EventBus.emit("subtitles:load", { actId: targetActId, beats: targetAct.beats });

    ActRunner.loadAct(targetAct);
    ActRunner.seek(localTime || 0);
    ActRunner.play();
  },

  /* Seek to a global time on the default path */
  seekToGlobalTime: function(globalTime, graph, state) {
    // If at a gate, dismiss it — user chose to seek away
    if (state.phase === "gate") {
      console.log("[gate] dismissed by scrubber seek");
      state.phase = "playing";
    }

    globalTime = Math.max(0, Math.min(globalTime, graph.totalDefaultDuration));
    var target = graph.resolveDefaultTime(globalTime);

    if (target.pathIndex !== state.defaultIndex || state._onBranchPath) {
      // Different act — need to jump
      this.jumpToDefaultIndex(target.pathIndex, target.localTime, graph, state);
    } else {
      // Same act — just seek within. Pause audio first so the old position
      // doesn't keep playing while we seek, then resume from the new spot.
      EventBus.emit("audio:pause", {});
      ActRunner.seek(target.localTime);
      EventBus.emit("audio:seekTo", { time: target.localTime });
      if (state.phase === "playing") EventBus.emit("audio:resume", {});
      state.localTime = target.localTime;
    }
  },

  /* Returns true if the engine appears stuck and needs recovery.
     Checks every known stuck pattern. */
  isStuck: function(state) {
    var phase = state.phase;
    // Waiting for audio to finish before showing gate — not stuck, just transitioning
    if (this._pendingGateTimer) return false;
    // Valid interactive states
    if (phase === "paused" || phase === "ended") return false;
    // Gate is shown — not stuck (user needs to answer)
    if (phase === "gate") return false;
    // "idle" with firstDone means something went wrong
    if (phase === "idle") return true;
    // "playing" but nothing is actually playing
    if (phase === "playing") {
      if (!ActRunner.masterTl) return true;
      if (!ActRunner._rafId) return true;
    }
    return false;
  },

  /* Hard reset: force the engine back to a known-good paused state at the
     current act + time position.  Called when user interaction detects that
     the player is stuck (e.g. after rapid scrolling). */
  recoverState: function(graph, state) {
    console.log("[recover] === HARD RESET ===");
    console.log("[recover] phase:", state.phase, "masterTl:", !!ActRunner.masterTl,
                "ticker:", !!ActRunner._rafId, "pendingGate:", !!this._pendingGateTimer,
                "actId:", state.getCurrentActId(), "localTime:", state.localTime);

    // 0. Cancel ALL pending timers — gate wait, debounce, anything
    this.cancelPendingGate();
    console.log("[recover] killed pending gate timer + invalidated callbacks");

    // 1. Kill everything in flight
    ActRunner.cleanup();
    EventBus.emit("audio:stop", {});
    console.log("[recover] killed ActRunner + audio");

    // 2. Reset all lock flags via event so ScrollSync hears it
    EventBus.emit("recover:reset", {});

    // 3. Determine where we are on the default path
    var actId = state.getCurrentActId();
    var act = actId ? graph.allActs[actId] : null;
    var localTime = state.localTime || 0;

    if (!act) {
      // No valid act — fall back to the act at defaultIndex, or the first act
      var idx = Math.max(0, Math.min(state.defaultIndex, graph.defaultPath.length - 1));
      actId = graph.defaultPath[idx];
      act = graph.allActs[actId];
      localTime = 0;
      state.defaultIndex = idx;
      if (!state.pathHistory.length || state.pathHistory[state.pathHistory.length - 1] !== actId) {
        state.pathHistory.push(actId);
      }
      state.cursorIndex = state.pathHistory.length - 1;
    }

    // 4. Check if we should be at a gate (act completed + gate milestone after it)
    var ms = graph.milestoneAfter[actId];
    var actDur = (act.duration) || 5;
    var atGate = ms && ms.type === "gate" && localTime >= actDur - 0.1
                 && !state.gateResults[ms.id];

    if (atGate) {
      // Re-enter the gate — audio stays stopped (already killed above)
      state.phase = "gate";
      state._onBranchPath = false;
      state.localTime = actDur;
      // Preserve gate audio state if it was stored before recovery
      if (!this._gatePausedAudio) {
        this._gatePausedAudio = { actId: actId, time: actDur };
      }
      EventBus.emit("gate:enter", { milestone: ms });
      console.log("[gate] recovered at gate — audio stays stopped, paused state:", JSON.stringify(this._gatePausedAudio));
      return;
    }

    // 5. Force phase to "paused" (bypass transition validation since we may be
    //    in an invalid state that rejects all transitions)
    state.phase = "paused";
    state._onBranchPath = false;
    state.localTime = localTime;

    // 6. Reload the current act and seek to the saved position
    EventBus.emit("act:start", { act: act, actId: actId });
    EventBus.emit("subtitles:load", { actId: actId, beats: act.beats });
    ActRunner.loadAct(act);
    if (localTime > 0) ActRunner.seek(localTime);

    // 7. Pre-load audio for this act so the next play/resume picks it up
    //    immediately from the correct position (don't auto-play — we're paused)
    EX.AudioManager.loadAct(actId).then(function(audio) {
      if (audio) {
        // Double-check we haven't entered a gate while the load was in flight
        if (state.phase === "gate") {
          console.log("[audio] recovered — skipping preload, gate is active");
          return;
        }
        EX.AudioManager.current = audio;
        audio.playbackRate = EX.AudioManager.rate;
        if (audio.readyState >= 1) {
          audio.currentTime = localTime;
        }
        console.log("[audio] recovered — preloaded", actId, "at", localTime.toFixed(2) + "s");
      }
    });
    // Leave paused — the next user click on play will resume normally
  }
};

/* ═══════════════════════════════════════════════════════════════════
   Notebook v2 — Card container, KaTeX helpers, FillIn validator

   Houses the shared KaTeX rendering utilities (K) and the FillIn
   validator since they're used by both cards and gates.
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var $ = EX.$;

/* ═══════════════════════════════════════════════════════════════════
   KaTeX Helper — shared rendering utilities
   ═══════════════════════════════════════════════════════════════════ */
var K = {
  inline: function(latex, el) {
    try { katex.render(latex, el, { throwOnError: false, displayMode: false }); }
    catch(e) { el.textContent = latex; }
  },
  display: function(latex, el) {
    try { katex.render(latex, el, { throwOnError: false, displayMode: true }); }
    catch(e) { el.textContent = latex; }
  },
  mixed: function(text, container) {
    var parts = text.split(/(\$\$[\s\S]*?\$\$|\$[^$]+?\$)/g);
    parts.forEach(function(part) {
      if (part.indexOf("$$") === 0 && part.lastIndexOf("$$") === part.length - 2) {
        var d = document.createElement("div");
        K.display(part.slice(2, -2), d);
        container.appendChild(d);
      } else if (part.indexOf("$") === 0 && part.lastIndexOf("$") === part.length - 1 && part.length > 2) {
        var s = document.createElement("span");
        K.inline(part.slice(1, -1), s);
        container.appendChild(s);
      } else if (part) {
        var html = part.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
        var s = document.createElement("span");
        s.innerHTML = html;
        container.appendChild(s);
      }
    });
  },
  renderWithBlank: function(text, container, blankCfg) {
    var parts = text.split("[___]");
    for (var i = 0; i < parts.length; i++) {
      if (parts[i]) K.mixed(parts[i], container);
      if (i < parts.length - 1) {
        var inp = document.createElement("input");
        inp.type = "text";
        inp.className = "fill-blank";
        inp.style.width = (blankCfg.width || 70) + "px";
        inp.placeholder = blankCfg.placeholder || "?";
        container.appendChild(inp);
      }
    }
  }
};

/* ═══════════════════════════════════════════════════════════════════
   FillIn Validator
   ═══════════════════════════════════════════════════════════════════ */
var FillIn = {
  normalize: function(s) {
    s = s.trim().toLowerCase().replace(/\s+/g, "");
    s = s.replace(/\\pi/g, "\u03c0").replace(/pi/gi, "\u03c0");
    s = s.replace(/\\times/g, "\u00d7").replace(/\*/g, "\u00d7");
    s = s.replace(/\\cdot/g, "\u00b7");
    s = s.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, "$1/$2");
    s = s.replace(/\\[a-zA-Z]+/g, "").replace(/[{}]/g, "");
    return s;
  },
  validate: function(input, accepted) {
    var n = FillIn.normalize(input);
    for (var i = 0; i < accepted.length; i++) {
      if (FillIn.normalize(accepted[i]) === n) return true;
    }
    return false;
  }
};

/* ═══════════════════════════════════════════════════════════════════
   Notebook — manages the right-panel card list
   ═══════════════════════════════════════════════════════════════════ */
var Notebook = {
  container: null,
  cards: {},

  init: function() {
    this.container = $("notebook");
    this._bindEvents();
  },

  _bindEvents: function() {
    var self = this;
    EventBus.on("notebook:appendBeat", function(data) {
      self.appendBeat(data.beatId, data.element);
    });
    EventBus.on("notebook:appendMilestone", function(data) {
      self.appendMilestone(data.milestoneId, data.element);
    });
    EventBus.on("notebook:clear", function() { self.clear(); });
    EventBus.on("beat:enter", function(data) {
      self.activate(data.beatId);
      if (window._state && window._state.phase === "playing") {
        EventBus.emit("scroll:toBeat", { beatId: data.beatId });
      }
    });
  },

  appendBeat: function(beatId, element) {
    if (this.cards[beatId]) return;
    element.dataset.beatId = beatId;
    this.cards[beatId] = element;
    this.container.appendChild(element);
    requestAnimationFrame(function() {
      element.classList.add("entered");
      element.classList.add("active");
    });
  },

  appendMilestone: function(milestoneId, element) {
    if (this.cards[milestoneId]) return;
    element.classList.add("milestone-card");
    element.dataset.milestoneId = milestoneId;
    this.cards[milestoneId] = element;
    this.container.appendChild(element);
    requestAnimationFrame(function() {
      element.classList.add("entered");
      element.classList.add("active");
    });
  },

  activate: function(id) {
    for (var k in this.cards) {
      var c = this.cards[k];
      c.classList.remove("active");
      if (c.classList.contains("entered")) c.classList.add("past");
    }
    if (this.cards[id]) {
      this.cards[id].classList.add("active");
      this.cards[id].classList.remove("past");
      this.cards[id].classList.add("entered");
    }
  },

  scrollTo: function(id) {
    var card = this.cards[id];
    if (!card) return;
    card.scrollIntoView({ behavior: "smooth", block: "center" });
  },

  clear: function() {
    this.container.innerHTML = "";
    this.cards = {};
  }
};

// Export
EX.K = K;
EX.FillIn = FillIn;
EX.Notebook = Notebook;

})();

/* ═══════════════════════════════════════════════════════════════════
   VizPanel v2 — SVG panel management, inline migration, configurable viewBox

   Fixes from v1:
   - viewBox is configurable via LESSON.viz.viewBox (not hardcoded 500x500)
   - Inline migration is event-driven (not timeline-scheduled)
   - _svgToImage fallback: uses inline SVG element when rasterization fails
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var $ = EX.$;
var EventBus = EX.EventBus;

var VizPanel = {
  vizWrap: null,
  mainSvg: null,
  overlayDiv: null,
  _viewBox: "0 0 500 500",

  init: function(vizConfig) {
    this.vizWrap = $("viz-wrap");
    this.mainSvg = $("viz");
    this.overlayDiv = document.createElement("div");
    this.overlayDiv.id = "viz-overlay";
    this.overlayDiv.style.cssText = "position:absolute;inset:0;z-index:5;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px";
    this.vizWrap.appendChild(this.overlayDiv);

    // Configurable viewBox — educator freedom
    if (vizConfig && vizConfig.viewBox) {
      this._viewBox = vizConfig.viewBox;
    } else if (vizConfig && vizConfig.config && vizConfig.config.viewBox) {
      this._viewBox = vizConfig.config.viewBox;
    }
    this.mainSvg.setAttribute("viewBox", this._viewBox);

    this._bindEvents();
  },

  getViewBox: function() {
    return this._viewBox;
  },

  getViewBoxDimensions: function() {
    var parts = this._viewBox.split(/[\s,]+/).map(Number);
    return { x: parts[0] || 0, y: parts[1] || 0, width: parts[2] || 500, height: parts[3] || 500 };
  },

  _bindEvents: function() {
    var self = this;
    EventBus.on("viz:setMode", function(mode) { self.setMode(mode); });
    EventBus.on("viz:migrateInline", function(data) { self.migrateToNotebook(data.beatId, data.type); });
    // NOTE: viz:reset is handled by init.js which calls reset() THEN reinit()
    // in the correct order. Do NOT register a separate handler here.
  },

  reset: function() {
    // Clear SVG contents
    var svg = this.mainSvg;
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    // Restore viewBox
    svg.setAttribute("viewBox", this._viewBox);
    // Reset overlay
    this.overlayDiv.style.display = "none";
    this.overlayDiv.innerHTML = "";
    this.setMode("svg");
  },

  setMode: function(mode) {
    mode = mode || "svg";
    var nb = $("notebook");
    switch (mode) {
      case "svg":
        this.mainSvg.style.display = "";
        this.overlayDiv.style.display = "none";
        this.vizWrap.style.display = "";
        nb.style.flex = "0 0 50%";
        break;
      case "chart":
      case "figure":
        this.mainSvg.style.display = "none";
        this.overlayDiv.style.display = "flex";
        this.overlayDiv.innerHTML = "";
        this.vizWrap.style.display = "";
        nb.style.flex = "0 0 50%";
        break;
      case "hidden":
        this.vizWrap.style.display = "none";
        nb.style.flex = "1 1 100%";
        break;
      case "wide":
        this.mainSvg.style.display = "";
        this.overlayDiv.style.display = "none";
        this.vizWrap.style.display = "";
        nb.style.flex = "0 0 42%";
        break;
      case "3d":
        this.mainSvg.style.display = "none";
        this.overlayDiv.style.display = "none";
        this.vizWrap.style.display = "";
        nb.style.flex = "0 0 42%";
        break;
    }
  },

  showFigure: function(figureData) {
    this.setMode("figure");
    var container = this.overlayDiv;
    container.innerHTML = "";
    if (figureData.title) {
      var t = document.createElement("div");
      t.className = "viz-overlay-title";
      t.textContent = figureData.title;
      container.appendChild(t);
    }
    if (figureData.svg) {
      var wrap = document.createElement("div");
      wrap.innerHTML = figureData.svg;
      container.appendChild(wrap);
    }
    if (figureData.caption) {
      var cap = document.createElement("div");
      cap.className = "viz-overlay-caption";
      EX.K.mixed(figureData.caption, cap);
      container.appendChild(cap);
    }
  },

  showChart: function(chartData) {
    this.setMode("chart");
    var container = this.overlayDiv;
    container.innerHTML = "";
    var t = document.createElement("div");
    t.className = "viz-overlay-title";
    t.textContent = chartData.title || "";
    container.appendChild(t);
    var row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:flex-end;gap:8px;height:140px;width:85%;max-width:400px";
    var colors = chartData.colors || ["#818cf8","#6366f1","#a78bfa","#7c3aed","#c4b5fd","#4f46e5","#8b5cf6","#6d28d9"];
    chartData.bars.forEach(function(b, i) {
      var col = document.createElement("div");
      col.style.cssText = "flex:1;display:flex;flex-direction:column;align-items:center;gap:4px";
      var val = document.createElement("div");
      val.className = "viz-overlay-bar-val";
      val.textContent = b.display || b.value;
      var fill = document.createElement("div");
      fill.style.cssText = "width:100%;border-radius:4px 4px 0 0;background:" + colors[i % colors.length] + ";height:0%;transition:height .6s cubic-bezier(.34,1.56,.64,1)";
      fill.dataset.target = Math.round(b.value / chartData.maxValue * 100);
      var lab = document.createElement("div");
      lab.className = "viz-overlay-bar-label";
      lab.textContent = b.label;
      col.appendChild(val); col.appendChild(fill); col.appendChild(lab);
      row.appendChild(col);
    });
    container.appendChild(row);
    if (chartData.pattern) {
      var pat = document.createElement("div");
      pat.className = "viz-overlay-pattern";
      EX.K.mixed(chartData.pattern, pat);
      container.appendChild(pat);
    }
    setTimeout(function() {
      row.querySelectorAll("[data-target]").forEach(function(f, i) {
        setTimeout(function() { f.style.height = f.dataset.target + "%"; }, i * 250);
      });
    }, 200);
  },

  /* Migrate current viz panel content into the notebook as an inline card.
     Strategy: always append synchronously (clone) first, then optionally
     upgrade to a rasterized image if the async conversion succeeds.
     This guarantees the inline content is visible immediately. */
  migrateToNotebook: function(beatId, type) {
    type = type || "auto";

    var useOverlay = (type === "figure" || type === "chart") ||
                     (type === "auto" && this.overlayDiv.style.display !== "none" && this.overlayDiv.children.length > 0);
    var useSvg = (type === "svg") ||
                 (type === "auto" && !useOverlay && this.mainSvg.style.display !== "none");

    if (useSvg) {
      // Immediately append SVG clone (synchronous, always works)
      this._appendInlineSvgClone(beatId);
    } else if (useOverlay && this.overlayDiv.children.length > 0) {
      // Clone overlay HTML directly — reliable, no async race
      this._appendOverlayClone(beatId);
    }
  },

  /* Clone the overlay (figure/chart) HTML directly into the notebook.
     Synchronous — no foreignObject/Canvas pipeline, no race conditions. */
  _appendOverlayClone: function(beatId) {
    var el = document.createElement("div");
    el.className = "beat-card beat-card--viz-inline viz-inline";
    var inner = document.createElement("div");
    inner.className = "viz-inline-content";
    inner.className = "viz-overlay-inner";
    // Deep clone overlay children
    for (var i = 0; i < this.overlayDiv.children.length; i++) {
      inner.appendChild(this.overlayDiv.children[i].cloneNode(true));
    }
    el.appendChild(inner);
    el.style.opacity = "1";
    el.style.transform = "none";
    EventBus.emit("notebook:appendBeat", { beatId: beatId + "-viz", element: el });
  },

  /* Rasterize SVG into a PNG image and append to the notebook.
     Canvas rasterization bypasses all SVG DOM issues (namespace, ID
     conflicts, GSAP state, sizing). Falls back to SVG data-URL <img>. */
  _inlineCounter: 0,
  _appendInlineSvgClone: function(beatId) {
    this._inlineCounter++;
    var vb = this._viewBox.split(/[\s,]+/).map(Number);
    var vw = vb[2] || 500, vh = vb[3] || 500;
    var scale = 2; // retina

    // 1. Clone from the LIVE SVG and bake GSAP state
    var clone = this.mainSvg.cloneNode(true);
    clone.removeAttribute("id");
    clone.setAttribute("viewBox", this._viewBox);
    clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
    clone.setAttribute("width", String(vw));
    clone.setAttribute("height", String(vh));

    var origEls = this.mainSvg.querySelectorAll("*");
    var cloneEls = clone.querySelectorAll("*");
    for (var i = 0; i < origEls.length && i < cloneEls.length; i++) {
      var cs = origEls[i].style;
      if (cs.opacity !== "") cloneEls[i].setAttribute("opacity", cs.opacity);
      if (cs.strokeDashoffset !== "") cloneEls[i].setAttribute("stroke-dashoffset", cs.strokeDashoffset);
      if (cs.strokeDasharray !== "") cloneEls[i].setAttribute("stroke-dasharray", cs.strokeDasharray);
      if (cs.transform !== "" && cs.transform !== "none") cloneEls[i].setAttribute("transform", cs.transform);
      if (cs.fill !== "") cloneEls[i].setAttribute("fill", cs.fill);
      if (cs.stroke !== "") cloneEls[i].setAttribute("stroke", cs.stroke);
    }

    // 2. Serialize (IDs don't matter — this goes into an <img>, not the DOM)
    var svgStr = new XMLSerializer().serializeToString(clone);

    // 3. Build container immediately so notebook position is reserved
    var el = document.createElement("div");
    el.className = "beat-card beat-card--viz-inline viz-inline";
    // Set explicit height from viewBox aspect ratio so layout is stable before image loads
    var inner = document.createElement("div");
    inner.className = "viz-inline-content";
    inner.className = "viz-overlay-inner";
    el.appendChild(inner);
    // Make visible immediately — no GSAP fade that fights with CSS !important
    el.style.opacity = "1";
    el.style.transform = "none";
    EventBus.emit("notebook:appendBeat", { beatId: beatId + "-viz", element: el });

    // 4. Rasterize via Canvas → PNG
    var blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function() {
      try {
        var canvas = document.createElement("canvas");
        canvas.width = vw * scale;
        canvas.height = vh * scale;
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, vw * scale, vh * scale);
        URL.revokeObjectURL(url);
        var pngImg = document.createElement("img");
        pngImg.src = canvas.toDataURL("image/png");
        pngImg.style.cssText = "width:100%;height:auto;display:block;border-radius:6px";
        inner.appendChild(pngImg);
      } catch(e) {
        console.warn("[VizPanel] Canvas rasterize failed, using SVG data URL:", e);
        URL.revokeObjectURL(url);
        var fallback = document.createElement("img");
        fallback.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgStr)));
        fallback.style.cssText = "width:100%;height:auto;display:block;border-radius:6px";
        inner.appendChild(fallback);
      }
    };
    img.onerror = function() {
      console.warn("[VizPanel] SVG blob load failed, using data URL fallback");
      URL.revokeObjectURL(url);
      var fallback = document.createElement("img");
      fallback.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgStr)));
      fallback.style.cssText = "width:100%;height:auto;display:block;border-radius:6px";
      inner.appendChild(fallback);
    };
    img.src = url;
  }
};

EX.VizPanel = VizPanel;

})();

/* ═══════════════════════════════════════════════════════════════════
   Audio Manager v2 — Async-safe audio loading and playback

   Fixes from v1:
   - loadAct() returns a Promise (resolves on canplaythrough)
   - play(actId, startTime) loads then seeks then plays — no race condition
   - seekTo() checks readyState before seeking
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;

var AudioManager = {
  current: null,
  enabled: true,
  rate: 1,
  cache: {},
  _graph: null,
  _loadToken: 0,

  init: function(graph) {
    this._graph = graph;
    this._bindEvents();
  },

  _bindEvents: function() {
    var self = this;
    EventBus.on("audio:loadAndPlay", function(data) {
      self.loadAndPlay(data.actId, data.startTime || 0);
    });
    EventBus.on("audio:stop", function() { self.stop(); });
    EventBus.on("audio:pause", function() { self.pause(); });
    EventBus.on("audio:resume", function() { self.resume(); });
    EventBus.on("audio:seekTo", function(data) { self.seekTo(data.time); });
    EventBus.on("audio:setRate", function(data) { self.setRate(data.rate); });
    EventBus.on("audio:setEnabled", function(data) { self.setEnabled(data.enabled); });
    EventBus.on("audio:getTime", function(data) {
      if (data.callback && self.current && !self.current.paused && self.current.duration) {
        data.callback(self.current.currentTime);
      }
    });

    // Hard reset: stop everything and invalidate in-flight loads
    EventBus.on("recover:reset", function() {
      console.log("[audio] recovered — killing current audio and invalidating pending loads");
      self.stop();
      self._loadToken++;  // any in-flight loadAct promise will see a stale token and bail
    });
  },

  /* Load audio for an act — returns a Promise */
  loadAct: function(actId) {
    var self = this;
    return new Promise(function(resolve) {
      if (!self._graph || !self._graph.audio) { resolve(null); return; }
      var audioDef = self._graph.audio[actId];
      if (!audioDef) { resolve(null); return; }

      // Check cache
      if (self.cache[actId]) { resolve(self.cache[actId]); return; }

      var src = audioDef.b64 ? "data:audio/mpeg;base64," + audioDef.b64 : audioDef.src;
      if (!src) { resolve(null); return; }

      var a = new window.Audio(src);
      a.preload = "auto";

      var _done = false;
      function onReady() {
        if (_done) return;
        _done = true;
        self.cache[actId] = a;
        resolve(a);
      }

      a.addEventListener("canplaythrough", onReady, { once: true });
      // Fallback timeout — don't block forever
      setTimeout(function() { if (!_done) { _done = true; self.cache[actId] = a; resolve(a); } }, 5000);
    });
  },

  /* Load, seek, then play — async-safe sequence */
  loadAndPlay: function(actId, startTime) {
    var self = this;
    this.stop();
    if (!this.enabled) return;

    var token = ++this._loadToken;
    this.loadAct(actId).then(function(audio) {
      if (!audio || self._loadToken !== token) return;
      self.current = audio;
      audio.currentTime = startTime || 0;
      audio.playbackRate = self.rate;
      audio.play().catch(function() {});
    });
  },

  stop: function() {
    if (this.current) {
      this.current.pause();
      this.current.currentTime = 0;
    }
    this.current = null;
  },

  pause: function() {
    if (this.current && !this.current.paused) this.current.pause();
  },

  resume: function() {
    if (!this.enabled || !this.current) return;
    this.current.playbackRate = this.rate;
    this.current.play().catch(function() {});
  },

  seekTo: function(time) {
    if (!this.current) return;
    // v2 fix: check readyState before seeking
    if (this.current.readyState >= 1) {
      this.current.currentTime = time;
    } else {
      // Queue the seek for when audio is ready
      var self = this;
      this.current.addEventListener("canplay", function handler() {
        self.current.removeEventListener("canplay", handler);
        self.current.currentTime = time;
      }, { once: true });
    }
  },

  getTime: function() {
    return this.current ? this.current.currentTime : 0;
  },

  getDuration: function(actId) {
    // v2 fix: return duration for a specific act, not the global current
    if (actId && this.cache[actId]) {
      var d = this.cache[actId].duration;
      return (d && !isNaN(d)) ? d : 0;
    }
    return (this.current && this.current.duration && !isNaN(this.current.duration)) ? this.current.duration : 0;
  },

  setRate: function(r) {
    this.rate = r;
    if (this.current) this.current.playbackRate = r;
  },

  setEnabled: function(on) {
    this.enabled = on;
    if (!on) this.stop();
  }
};

EX.AudioManager = AudioManager;

})();

/* ═══════════════════════════════════════════════════════════════════
   Subtitle Manager v2 — Per-act subtitle rendering with word highlight
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var $ = EX.$;

var Subtitles = {
  track: null,
  cues: [],
  currentIdx: -1,
  enabled: true,
  _graph: null,

  init: function(graph) {
    this.track = $("subtitle-track");
    this._graph = graph;
    this._bindEvents();
  },

  _bindEvents: function() {
    var self = this;
    EventBus.on("subtitles:load", function(data) {
      self.loadAct(data.actId, data.beats);
    });
    EventBus.on("playback:tick", function(data) {
      self.update(data.time);
    });
    EventBus.on("audio:stop", function() { self.hide(); });
    // Hide subtitles when a gate takes over — otherwise the last cue from
    // the preceding act stays frozen on screen while the student answers.
    EventBus.on("gate:enter", function() { self.hide(); });
    EventBus.on("audio:pause", function() { self.hide(); });
  },

  loadAct: function(actId, beats) {
    // Try TTS pipeline subtitles first
    if (this._graph && this._graph.subtitles && this._graph.subtitles[actId]) {
      this.cues = this._graph.subtitles[actId];
      this.currentIdx = -1;
      this.hide();
      return;
    }

    // Auto-generate cues from beats
    this.cues = [];
    if (!beats) { this.currentIdx = -1; return; }

    // Build beat cues for timing
    var WPS = 2.5;
    var cursor = 0;
    for (var i = 0; i < beats.length; i++) {
      var beat = beats[i];
      if (!beat.say) continue;
      var words = beat.say.split(/\s+/).length;
      var dur = beat.duration || Math.max(1.5, words / WPS);
      var startTime = cursor;
      var endTime = cursor + dur;

      // Split into sentences for subtitle display
      var sentences = beat.say.match(/[^.!?]+[.!?]+/g) || [beat.say];
      var sentDur = dur / sentences.length;
      for (var s = 0; s < sentences.length; s++) {
        this.cues.push({
          start: startTime + s * sentDur,
          end: startTime + (s + 1) * sentDur,
          text: sentences[s].trim()
        });
      }
      cursor += dur;
    }
    this.currentIdx = -1;
    this.hide();
  },

  update: function(currentTime) {
    if (!this.enabled || !this.cues.length) return;
    var t = currentTime;
    var newIdx = -1;
    for (var i = 0; i < this.cues.length; i++) {
      if (t >= this.cues[i].start && t < this.cues[i].end) { newIdx = i; break; }
    }
    if (newIdx !== this.currentIdx) {
      this.currentIdx = newIdx;
      if (newIdx >= 0) {
        var cue = this.cues[newIdx];
        if (cue.words) {
          this._renderWords(cue, t);
        } else {
          this.track.textContent = cue.text;
        }
        this.track.classList.add("visible");
      } else {
        this.track.classList.remove("visible");
      }
    } else if (newIdx >= 0 && this.cues[newIdx].words) {
      this._renderWords(this.cues[newIdx], t);
    }
  },

  _renderWords: function(cue, t) {
    var off = t - cue.start, html = "";
    for (var w = 0; w < cue.words.length; w++) {
      var word = cue.words[w];
      var next = w + 1 < cue.words.length ? cue.words[w + 1].offset : Infinity;
      html += (off >= word.offset && off < next)
        ? '<span class="active-word">' + word.word + "</span> "
        : word.word + " ";
    }
    this.track.innerHTML = html.trim();
  },

  hide: function() {
    if (this.track) this.track.classList.remove("visible");
    this.currentIdx = -1;
  },

  setEnabled: function(on) {
    this.enabled = on;
    if (!on) this.hide();
  }
};

EX.Subtitles = Subtitles;

})();

/* ═══════════════════════════════════════════════════════════════════
   Card System v2 — Card type factories for beat rendering

   Listens for "beat:render" events and creates the appropriate
   notebook card based on the beat's card type.
   ═══════════════════════════════════════════════════════════════════ */
(function() {
"use strict";

var EX = window.EX;
var EventBus = EX.EventBus;
var K = EX.K;
var $ = EX.$;

function beatCard(beatId, type) {
  var el = document.createElement("div");
  el.className = "beat-card beat-card--" + type;
  el.dataset.beatId = beatId;
  return el;
}

var CardSystem = {
  factories: {},

  init: function() {
    var self = this;
    EventBus.on("beat:render", function(data) {
      self.renderBeat(data.beat);
    });
  },

  renderBeat: function(beat) {
    if (!beat.card) return null;
    var factory = this.factories[beat.card.type];
    if (!factory) {
      console.warn("[CardSystem] No factory for type: " + beat.card.type);
      return null;
    }
    var el = factory(beat.id, beat.card);
    if (el) {
      EventBus.emit("notebook:appendBeat", { beatId: beat.id, element: el });
      EventBus.emit("scroll:observe", { element: el });
    }
    return el;
  }
};

// ── Card: text ──
CardSystem.factories.text = function(id, data) {
  var el = beatCard(id, "text");
  var div = document.createElement("div"); div.className = "slide-text";
  K.mixed(data.content, div);
  el.appendChild(div);
  return el;
};

// ── Card: latex ──
CardSystem.factories.latex = function(id, data) {
  var el = beatCard(id, "derivation");
  var row = document.createElement("div");
  row.className = "deriv-step visible" + (data.highlight ? " highlight" : "");
  K.display(data.content || data.latex, row);
  el.appendChild(row);
  return el;
};

// ── Card: derivation ──
CardSystem.factories.derivation = function(id, data) {
  var el = beatCard(id, "derivation");
  if (data.title) {
    var t = document.createElement("div"); t.className = "derivation-title"; t.textContent = data.title;
    el.appendChild(t);
  }
  var steps = data.steps || [];
  steps.forEach(function(step) {
    var s = typeof step === "string" ? { latex: step } : step;
    var row = document.createElement("div");
    row.className = "deriv-step visible" + (s.highlight ? " highlight" : "") + (s.wrong ? " wrong" : "");
    // Accept both `latex` (canonical) and `expr` (DSL shorthand)
    K.display(s.latex || s.expr || "", row);
    if (s.note) {
      var noteEl = document.createElement("span");
      noteEl.style.cssText = "font-size:.75rem;color:var(--text-muted);margin-left:10px;font-style:italic";
      K.mixed(s.note, noteEl);
      row.appendChild(noteEl);
    }
    el.appendChild(row);
  });
  return el;
};

// ── Card: title ──
CardSystem.factories.title = function(id, data) {
  var overlay = $("title-overlay");
  // Cancel any pending hide from a prior render of this overlay
  clearTimeout(overlay._hideTimeout);
  gsap.killTweensOf(overlay);
  var oldItems = overlay.querySelectorAll("h1,h2,p");
  for (var j = 0; j < oldItems.length; j++) gsap.killTweensOf(oldItems[j]);

  var content = overlay.querySelector(".title-content");
  content.innerHTML = "";
  var h1 = document.createElement("h1"); h1.textContent = data.heading; content.appendChild(h1);
  var h2 = document.createElement("h2"); h2.textContent = data.subheading || ""; content.appendChild(h2);
  if (data.paragraphs) data.paragraphs.forEach(function(p) {
    var el = document.createElement("p");
    if (typeof p === "string") { el.textContent = p; }
    else { el.textContent = p.text; if (p.style === "highlight") { el.style.color = "#818cf8"; el.style.fontWeight = "500"; } }
    content.appendChild(el);
  });
  overlay.classList.add("active");
  gsap.to(overlay, { opacity: 1, duration: 0.5 });
  var items = overlay.querySelectorAll("h1,h2,p");
  for (var i = 0; i < items.length; i++) {
    gsap.fromTo(items[i], { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.8, delay: 0.3 + i * 0.8 });
  }
  overlay._hideTimeout = setTimeout(function() {
    gsap.to(overlay, { opacity: 0, duration: 0.6, onComplete: function() { overlay.classList.remove("active"); } });
  }, 4000);
  return null;
};

// ── Card: recap ──
CardSystem.factories.recap = function(id, data) {
  var el = beatCard(id, "recap");

  var header = document.createElement("div"); header.className = "recap-header";
  var h4 = document.createElement("h4"); h4.textContent = data.title || "Quick Review";
  header.appendChild(h4);
  var chev = document.createElement("span"); chev.className = "recap-chevron"; chev.innerHTML = "&#9660;";
  header.appendChild(chev);
  el.appendChild(header);
  var body = document.createElement("div"); body.className = "recap-body";
  // Accept `items: [string, ...]` (DSL shorthand) or `content: [{type,value}, ...]` (canonical)
  var rawItems = data.items || data.content || [];
  var content = rawItems.map(function(item) {
    if (typeof item === "string") return { type: "text", value: item };
    return item;
  });
  content.forEach(function(item) {
    if (typeof item === "string") item = { type: "text", value: item };

      var p = document.createElement("p"); K.mixed(item.value, p); body.appendChild(p);
    } else if (item.type === "latex") {

      ex.style.cssText = "background:rgba(99,102,241,0.06);border-left:3px solid #6366f1;padding:8px 12px;border-radius:6px;margin:6px 0";

      var num = document.createElement("span");
      num.style.cssText = "color:#818cf8;font-weight:600;font-size:.9rem;flex-shrink:0";
      num.textContent = (item.num || "") + ".";
      step.appendChild(num);
      var txt = document.createElement("span");
      K.mixed(item.value, txt);
      step.appendChild(txt);
      body.appendChild(step);
    }
  });
  el.appendChild(body);
  header.addEventListener("click", function() {
    body.classList.toggle("open");
    chev.classList.toggle("open");

  setTimeout(function() { body.classList.add("open"); chev.classList.add("open"); }, 300);
  if (data.figure) EX.VizPanel.showFigure(data.figure);

};

// ── Card: bar-chart ──
CardSystem.factories["bar-chart"] = function(id, data) {
  // Normalise shorthand format: `labels`+`values` → `bars` array
  var bars = data.bars;
  if (!bars && data.labels && data.values) {
    bars = data.labels.map(function(lbl, i) {
      return { label: lbl, value: data.values[i] || 0 };
    });
  }
  bars = bars || [];

  var el = beatCard(id, "bar-chart");
  el.classList.add("slide-card--bar-chart");
  var t = document.createElement("div"); t.className = "chart-title"; t.textContent = data.title;
  el.appendChild(t);
  var maxH = 60;
  var row = document.createElement("div"); row.className = "bar-row";
  var maxVal = data.maxValue || (bars.length ? Math.max.apply(null, bars.map(function(b) { return b.value; })) : 1);
  if (!maxVal) maxVal = 1; // guard against all-zero data
  bars.forEach(function(b, i) {
    var col = document.createElement("div"); col.className = "bar-col";
    var val = document.createElement("div"); val.className = "bar-val"; val.textContent = b.display !== undefined ? b.display : b.value;
    var fill = document.createElement("div"); fill.className = "bar-fill";
    fill.style.background = data.colors ? data.colors[i % data.colors.length] : "#818cf8";
    fill.style.height = "0";
    fill.dataset.target = Math.round(b.value / maxVal * maxH);
    var lab = document.createElement("div"); lab.className = "bar-label";
    K.mixed(String(b.label || ""), lab);
    col.appendChild(val); col.appendChild(fill); col.appendChild(lab);
    row.appendChild(col);
  });
  el.appendChild(row);
  if (data.pattern) {
    var pat = document.createElement("div"); pat.className = "chart-pattern";
    K.mixed(data.pattern, pat);
    el.appendChild(pat);
  }
  // Pass normalised bars so VizPanel doesn't crash on the old labels/values format
  EX.VizPanel.showChart(Object.assign({}, data, { bars: bars, maxValue: maxVal }));
  setTimeout(function() {
    var fills = el.querySelectorAll(".bar-fill");
    fills.forEach(function(f, i) {
      setTimeout(function() { f.style.height = f.dataset.target + "px"; }, 300 + i * 300);
    });
  }, 100);
  return el;
};

// ── Card: split ──
CardSystem.factories.split = function(id, data) {

// ── Card: plot-2d ──
CardSystem.factories["plot-2d"] = function(id, data) {
  var el = beatCard(id, "plot-2d");
  if (data.title) {
    var t = document.createElement("div"); t.className = "plot-title"; t.textContent = data.title;
    el.appendChild(t);
  }
  var W = 360, H = 210;
  var pad = { t: 16, r: 20, b: 32, l: 40 };
  var pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;
  var ns = "http://www.w3.org/2000/svg";

  // Resolve axis bounds — accept xRange/yRange (DSL) or xMin/xMax/yMin/yMax (canonical)
  var xMin = data.xMin !== undefined ? data.xMin : (data.xRange ? data.xRange[0] : 0);
  var xMax = data.xMax !== undefined ? data.xMax : (data.xRange ? data.xRange[1] : 10);
  var yMin = data.yMin !== undefined ? data.yMin : (data.yRange ? data.yRange[0] : 0);
  var yMax = data.yMax !== undefined ? data.yMax : (data.yRange ? data.yRange[1] : 10);
  // If only points are provided, infer bounds from them
  var pts = data.points || [];
  if (!data.xRange && !data.xMin && pts.length) {
    xMin = Math.min.apply(null, pts.map(function(p){ return p.x; }));
    xMax = Math.max.apply(null, pts.map(function(p){ return p.x; }));
    var xPad = (xMax - xMin) * 0.1 || 1;
    xMin -= xPad; xMax += xPad;
  }
  if (!data.yRange && !data.yMin && pts.length) {
    yMin = Math.min.apply(null, pts.map(function(p){ return p.y; }));
    yMax = Math.max.apply(null, pts.map(function(p){ return p.y; }));
    var yPad = (yMax - yMin) * 0.15 || 1;
    yMin -= yPad; yMax += yPad;
  }
  // Guard: ensure valid, non-degenerate range
  if (xMax <= xMin) xMax = xMin + 1;
  if (yMax <= yMin) yMax = yMin + 1;

  var xSpan = xMax - xMin, ySpan = yMax - yMin;

  function sx(v) { return pad.l + (v - xMin) / xSpan * pw; }
  function sy(v) { return pad.t + ph - (v - yMin) / ySpan * ph; }

  var svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", "0 0 " + W + " " + H);
  svg.setAttribute("class", "plot-svg");

  // Grid lines + axis labels for y
  var yStep = data.yStep || Math.max(1, Math.ceil(ySpan / 5));
  var yStepMag = Math.pow(10, Math.floor(Math.log10(yStep)));
  yStep = Math.ceil(yStep / yStepMag) * yStepMag;
  if (yStep <= 0) yStep = 1; // safety: prevent infinite loop
  var yStart = Math.ceil(yMin / yStep) * yStep;
  for (var yv = yStart; yv <= yMax + 1e-9; yv += yStep) {
    var gl = document.createElementNS(ns, "line");
    gl.setAttribute("x1", pad.l); gl.setAttribute("x2", W - pad.r);
    gl.setAttribute("y1", sy(yv).toFixed(1)); gl.setAttribute("y2", sy(yv).toFixed(1));
    gl.setAttribute("class", "plot-grid-line");
    svg.appendChild(gl);
    var yl = document.createElementNS(ns, "text");
    yl.setAttribute("x", pad.l - 5); yl.setAttribute("y", (sy(yv) + 3).toFixed(1));
    yl.setAttribute("text-anchor", "end"); yl.setAttribute("class", "plot-axis-text");
    yl.textContent = Math.round(yv * 100) / 100;
    svg.appendChild(yl);
  }

  // x-axis ticks — use xTicks if provided, otherwise generate
  var xTicks = data.xTicks;
  if (!xTicks) {
    var xStep = Math.max(1, Math.ceil(xSpan / 6));
    var xStepMag = Math.pow(10, Math.floor(Math.log10(xStep)));
    xStep = Math.ceil(xStep / xStepMag) * xStepMag;
    if (xStep <= 0) xStep = 1;
    xTicks = [];
    var xStart = Math.ceil(xMin / xStep) * xStep;
    for (var xv = xStart; xv <= xMax + 1e-9; xv += xStep) xTicks.push(Math.round(xv * 100) / 100);
  }
  xTicks.forEach(function(xv) {
    var xl = document.createElementNS(ns, "text");
    xl.setAttribute("x", sx(xv).toFixed(1)); xl.setAttribute("y", H - pad.b + 14);
    xl.setAttribute("text-anchor", "middle"); xl.setAttribute("class", "plot-axis-text");
    xl.textContent = xv;
    svg.appendChild(xl);
  });

  if (data.xLabel) {
    var xLab = document.createElementNS(ns, "text");
    xLab.setAttribute("x", pad.l + pw / 2); xLab.setAttribute("y", H - 2);
    xLab.setAttribute("text-anchor", "middle"); xLab.setAttribute("class", "plot-label-text");
    xLab.textContent = data.xLabel; svg.appendChild(xLab);
  }
  if (data.yLabel) {
    var yLab = document.createElementNS(ns, "text");
    yLab.setAttribute("x", 10); yLab.setAttribute("y", pad.t + ph / 2);
    yLab.setAttribute("text-anchor", "middle"); yLab.setAttribute("class", "plot-label-text");
    yLab.setAttribute("transform", "rotate(-90,10," + (pad.t + ph / 2) + ")");
    yLab.textContent = data.yLabel; svg.appendChild(yLab);
  }

  // Draw zero axes if visible
  if (yMin <= 0 && 0 <= yMax) {
    var xAxis = document.createElementNS(ns, "line");
    xAxis.setAttribute("x1", pad.l); xAxis.setAttribute("x2", W - pad.r);
    xAxis.setAttribute("y1", sy(0).toFixed(1)); xAxis.setAttribute("y2", sy(0).toFixed(1));
    xAxis.setAttribute("stroke", "rgba(255,255,255,0.2)"); xAxis.setAttribute("stroke-width", "1");
    svg.appendChild(xAxis);
  }
  if (xMin <= 0 && 0 <= xMax) {
    var yAxis = document.createElementNS(ns, "line");
    yAxis.setAttribute("x1", sx(0).toFixed(1)); yAxis.setAttribute("x2", sx(0).toFixed(1));
    yAxis.setAttribute("y1", pad.t); yAxis.setAttribute("y2", H - pad.b);
    yAxis.setAttribute("stroke", "rgba(255,255,255,0.2)"); yAxis.setAttribute("stroke-width", "1");
    svg.appendChild(yAxis);
  }

  // Threshold line
  if (data.threshold) {
    var tl2 = document.createElementNS(ns, "line");
    tl2.setAttribute("x1", pad.l); tl2.setAttribute("x2", W - pad.r);
    tl2.setAttribute("y1", sy(data.threshold.value).toFixed(1)); tl2.setAttribute("y2", sy(data.threshold.value).toFixed(1));
    tl2.setAttribute("class", "plot-threshold-line"); svg.appendChild(tl2);
    var tlb = document.createElementNS(ns, "text");
    tlb.setAttribute("x", W - pad.r + 4); tlb.setAttribute("y", (sy(data.threshold.value) + 3).toFixed(1));
    tlb.setAttribute("class", "plot-threshold-text"); tlb.textContent = data.threshold.label;
    svg.appendChild(tlb);
  }

  // Function curves — accept `functions: [{fn, color, name, style}]`
  var allPaths = [];
  (data.functions || []).forEach(function(fnDef) {
    try {
      var fn = new Function("x", "return (" + fnDef.fn + ");");
      var steps = 200;
      var dx = xSpan / steps;
      var d = "";
      for (var i = 0; i <= steps; i++) {
        var x = xMin + i * dx;
        var y = fn(x);
        if (!isFinite(y)) { d += " "; continue; } // break path on asymptotes
        var px = sx(x).toFixed(1), py = sy(Math.max(yMin - ySpan, Math.min(yMax + ySpan, y))).toFixed(1);
        d += (d === "" || d.slice(-1) === " " ? "M" : "L") + px + "," + py;
      }
      if (d && d !== " ") {
        var curve = document.createElementNS(ns, "path");
        curve.setAttribute("d", d);
        curve.setAttribute("fill", "none");
        curve.setAttribute("stroke", fnDef.color || "#818cf8");
        curve.setAttribute("stroke-width", "2");
        if (fnDef.style === "dashed") curve.setAttribute("stroke-dasharray", "4 3");
        svg.appendChild(curve);
        allPaths.push(curve);
      }
    } catch(e) { /* skip bad function */ }
  });

  // Legacy single-curve from points array
  var dotsG = document.createElementNS(ns, "g");
  var path = null;
  if (pts.length) {
    var pathD = "";
    pts.forEach(function(p, i) {
      pathD += (i === 0 ? "M" : "L") + sx(p.x).toFixed(1) + "," + sy(p.y).toFixed(1);
    });
    path = document.createElementNS(ns, "path");
    path.setAttribute("d", pathD);
    path.setAttribute("class", "plot-curve");
    svg.appendChild(path);
    allPaths.push(path);
    pts.forEach(function(p) {
      var dot = document.createElementNS(ns, "circle");
      dot.setAttribute("cx", sx(p.x).toFixed(1)); dot.setAttribute("cy", sy(p.y).toFixed(1));
      dot.setAttribute("r", p.highlight ? 5 : 3);
      dot.setAttribute("fill", p.color || (p.highlight ? "#f59e0b" : "#818cf8"));
      dot.setAttribute("class", "plot-dot" + (p.highlight ? " highlight" : ""));
      dotsG.appendChild(dot);
      if (p.label) {
        var lb = document.createElementNS(ns, "text");
        lb.setAttribute("x", sx(p.x).toFixed(1));
        lb.setAttribute("y", (sy(p.y) - 8).toFixed(1));
        lb.setAttribute("text-anchor", "middle");
        lb.setAttribute("class", "plot-dot-text" + (p.highlight ? " highlight" : ""));
        lb.textContent = p.label;
        dotsG.appendChild(lb);
      }
    });
  }
  svg.appendChild(dotsG);
  el.appendChild(svg);

  if (data.note) {
    var note = document.createElement("div"); note.className = "plot-note";
    K.mixed(data.note, note);
    el.appendChild(note);
  }
  setTimeout(function() {
    allPaths.forEach(function(p) {
      try {
        var len = p.getTotalLength ? p.getTotalLength() : 500;
        if (len > 0) {
          p.style.strokeDasharray = len;
          p.style.strokeDashoffset = len;
          p.getBoundingClientRect();
          p.style.transition = "stroke-dashoffset 1.5s ease";
          p.style.strokeDashoffset = "0";
        }
      } catch(e) {}
    });
    var items = dotsG.children;
    for (var i = 0; i < items.length; i++) {
      (function(item, idx) {
        setTimeout(function() { item.style.transition = "opacity .3s"; item.style.opacity = "1"; }, 400 + idx * 100);
      })(items[i], i);
    }
  }, 200);
  return el;
};

EX.CardSystem = CardSystem;
