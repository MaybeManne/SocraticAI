<!-- Test runner -->
<script>
(function() {
"use strict";

/* ── Test runner ─────────────────────────────────────────────────── */
var suites = [];
var currentSuite = null;

function suite(name) {
  currentSuite = { name: name, tests: [] };
  suites.push(currentSuite);
}

function test(name, fn) {
  var result = { name: name, status: "pass", detail: "" };
  try {
    var msg = fn();
    if (msg) { result.status = "warn"; result.detail = msg; }
  } catch(e) {
    result.status = "fail";
    result.detail = e.message || String(e);
    console.error("[FAIL]", name, e);
  }
  currentSuite.tests.push(result);
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "Assertion failed");
}

function assertEq(a, b, msg) {
  if (a !== b) throw new Error((msg || "Expected equality") + ": got " + JSON.stringify(a) + ", expected " + JSON.stringify(b));
}

function assertHas(obj, key, msg) {
  if (obj == null || !(key in obj)) throw new Error((msg || "Missing key") + ": " + key);
}


/* ════════════════════════════════════════════════════════════════════

   ════════════════════════════════════════════════════════════════════ */
suite("DSL — MX.lesson() output");

var testLesson = null;
test("MX.lesson() runs without error", function() {
  // Build a simple lesson using the same API as the examples
  testLesson = MX.lesson("Test Lesson", function(L) {
    L.source("Test Suite");
    L.problem("This is a test problem.");
    L.act("Act One", function(A) {
      A.vizPanel("hidden");
      A.say("Hello world.").show("**Bold** text with $x^2$");
    });
    L.act("Act Two", function(A) {
      A.say("Second act.").card("derivation", {
        title: "Test Derivation",
        steps: [{ expr: "a^2 + b^2", note: "Start" }]
      });
    });
    L.ask({
      question: "What is $1 + 1$?",
      options: ["$1$", "$2$", "$3$"],
      correct: 1,
      explain: { correct: "Correct!", 0: "Too small." }
    });
  });
});

test("window.LESSON is set after MX.lesson()", function() {
  assert(window.LESSON != null, "window.LESSON is null/undefined after MX.lesson() call");
});

test("LESSON.meta is populated", function() {
  assertHas(LESSON, "meta", "LESSON.meta missing");
  assertHas(LESSON.meta, "title", "LESSON.meta.title missing");
  assertEq(LESSON.meta.title, "Test Lesson", "LESSON.meta.title wrong value");
  assertEq(LESSON.meta.source, "Test Suite", "LESSON.meta.source wrong value");
});

test("LESSON.problem is set", function() {
  assertHas(LESSON, "problem", "LESSON.problem missing");
  assert(LESSON.problem.text === "This is a test problem.", "LESSON.problem.text wrong");
});

test("LESSON.acts has correct count", function() {
  assertEq(LESSON.acts.length, 2, "Expected 2 main acts");
});

test("LESSON.mainPath has correct length", function() {
  assertEq(LESSON.mainPath.length, 2, "Expected 2 act IDs in mainPath");
});

test("LESSON.milestones has the gate", function() {
  assertEq(LESSON.milestones.length, 1, "Expected 1 milestone (the gate)");
  assertEq(LESSON.milestones[0].type, "gate", "Expected gate type");
  assertEq(LESSON.milestones[0].gate.correct, 1, "Expected correct index 1");
});

test("Act beats are structured correctly", function() {
  var act = LESSON.acts[0];
  assertHas(act, "beats", "act.beats missing");
  assertEq(act.beats.length, 1, "Act One should have 1 beat");
  var beat = act.beats[0];
  assertHas(beat, "id", "beat.id missing");
  assertHas(beat, "say", "beat.say missing");
  assertHas(beat, "card", "beat.card missing");
  assertEq(beat.card.type, "text", "beat.card.type should be 'text'");
  assertHas(beat.card, "content", "beat.card.content missing");

test("Act durations are estimated", function() {
  LESSON.acts.forEach(function(act, i) {
    assert(act.duration > 0, "Act " + i + " has zero/missing duration");
  });

/* ════════════════════════════════════════════════════════════════════
   SUITE 6: PlaybackState transitions
   ════════════════════════════════════════════════════════════════════ */
suite("PlaybackState transitions");

var graph = null, state = null;
test("LessonGraph builds from LESSON", function() {
  graph = new EX.LessonGraph(LESSON);
  assert(graph.defaultPath.length === 2, "defaultPath should have 2 entries");
  assert(graph.totalDefaultDuration > 0, "totalDefaultDuration should be > 0");
});

test("PlaybackState initializes in 'idle' phase", function() {
  state = new EX.PlaybackState(graph);
  assertEq(state.phase, "idle", "Initial phase should be 'idle'");
});

test("PlaybackState.start() advances to first act", function() {
  state.start();
  assert(state.pathHistory.length === 1, "pathHistory should have 1 entry after start");
  assert(state.cursorIndex === 0, "cursorIndex should be 0");
  assert(state.getCurrentActId() === graph.defaultPath[0],
         "getCurrentActId() should return first act ID");
});

test("Invalid transition is rejected gracefully", function() {
  // Try to go back to idle (which would be valid) then try an invalid one
  var testState = new EX.PlaybackState(graph);
  // idle → ended is invalid; should not throw
  testState.transition("ended");
  assertEq(testState.phase, "idle", "Phase should remain 'idle' after invalid transition");
});

test("Valid transition succeeds", function() {
  var testState = new EX.PlaybackState(graph);
  var ok = testState.transition("playing");
  assert(ok === true, "transition('playing') from 'idle' should return true");
  assertEq(testState.phase, "playing", "Phase should be 'playing'");
});

    yRange: [-5, 5],
    functions: [

         "State phase is '" + s.phase + "' — expected playing/paused/ended after clicking play. " +

test("ActRunner has a live timeline after play", function() {

/* ════════════════════════════════════════════════════════════════════
   SUITE 9: EventBus
   ════════════════════════════════════════════════════════════════════ */
suite("EventBus");

test("on() and emit() work correctly", function() {
  var received = false;
  var payload = null;
  EX.EventBus.on("test:ping", function(data) {
    received = true;
    payload = data;
  });
  EX.EventBus.emit("test:ping", { value: 42 });
  assert(received, "Handler was not called");
  assertEq(payload.value, 42, "Payload value wrong");
});

test("emit() catches handler errors without crashing", function() {
  EX.EventBus.on("test:boom", function() {
    throw new Error("intentional test error");
  });
  var threw = false;
  try {
    EX.EventBus.emit("test:boom", {});
  } catch(e) {
    threw = true;
  }
  assert(!threw, "EventBus.emit() let an error escape — handler errors should be caught");
});

test("off() removes handler", function() {
  var count = 0;
  var handler = function() { count++; };
  EX.EventBus.on("test:count", handler);
  EX.EventBus.emit("test:count", {});
  EX.EventBus.off("test:count", handler);
  EX.EventBus.emit("test:count", {});
  assertEq(count, 1, "Handler should only have fired once (before off())");
});


/* ════════════════════════════════════════════════════════════════════
   Render results
   ════════════════════════════════════════════════════════════════════ */
var totalPass = 0, totalFail = 0, totalWarn = 0;

var html = "";
suites.forEach(function(s) {
  html += '<div class="suite">';
  html += '<div class="suite-name">' + s.name + '</div>';
  s.tests.forEach(function(t) {
    totalPass += t.status === "pass" ? 1 : 0;
    totalFail += t.status === "fail" ? 1 : 0;
    totalWarn += t.status === "warn" ? 1 : 0;
    html += '<div class="test ' + t.status + '">';
    html += '<span class="badge ' + t.status + '">' + t.status.toUpperCase() + '</span>';
    html += '<span class="test-name">' + t.name + '</span>';
    html += '</div>';
    if (t.detail) {
      html += '<div class="test-detail">' + t.detail + '</div>';
    }
  });
  html += '</div>';
});

var allOk = totalFail === 0;
html += '<div class="summary ' + (allOk ? "ok" : "errors") + '">';
html += totalPass + " passed";
if (totalWarn > 0) html += " · " + totalWarn + " warning" + (totalWarn > 1 ? "s" : "");
if (totalFail > 0) html += " · " + totalFail + " FAILED";
html += "</div>";

document.getElementById("results").innerHTML = html;

})();
</script>
</body>
</html>
